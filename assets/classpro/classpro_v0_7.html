// IndexedDB helper for storing full PDF binaries
const DB_NAME='ClassProDB';const DB_STORE='manuels';
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(DB_STORE))db.createObjectStore(DB_STORE,{keyPath:'id'});};
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbSave(id,name,buf){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put({id,name,buf});
    tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);
  });
}
async function idbGet(id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const req=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(id);
    req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);
  });
}
async function idbDelete(id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);
  });
}

function ManuelPDF(){
  const[docs,setDocs]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-manuels-meta')||'[]')}catch{return[]}});
  const[selDoc,setSelDoc]=useState(null);
  const[pdf,setPdf]=useState(null);
  const[numPages,setNumPages]=useState(0);
  const[spread,setSpread]=useState(1);
  const[scale,setScale]=useState(1.2);
  const[loading,setLoading]=useState(false);
  const[showImport,setShowImport]=useState(false);
  const[importForm,setImportForm]=useState({nom:'',file:null});
  const[gotoPage,setGotoPage]=useState('');
  const[rendering,setRendering]=useState(false);
  const[sidebarOpen,setSidebarOpen]=useState(true);
  const cvLeft=useRef(null);const cvRight=useRef(null);

  const saveMeta=d=>{localStorage.setItem('cdc-manuels-meta',JSON.stringify(d));};

  const renderSpread=useCallback(async(pdfObj,leftIdx,sc)=>{
    if(!pdfObj||rendering)return;
    setRendering(true);
    try{
      const renderPage=async(idx,cvRef)=>{
        if(!cvRef.current)return;
        if(idx<1||idx>pdfObj.numPages){
          const cv=cvRef.current;const ctx=cv.getContext('2d');
          cv.width=2;cv.height=2;ctx.clearRect(0,0,2,2);return;
        }
        const page=await pdfObj.getPage(idx);
        const vp=page.getViewport({scale:sc});
        const cv=cvRef.current;if(!cv)return;
        cv.width=vp.width;cv.height=vp.height;
        await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
      };
      await renderPage(leftIdx,cvLeft);
      await renderPage(leftIdx+1,cvRight);
    }finally{setRendering(false);}
  },[]);

  useEffect(()=>{if(pdf&&!rendering)renderSpread(pdf,spread,scale);},[spread,scale,pdf]);

  // Load a doc from IndexedDB by id
  const loadDocById=async(meta)=>{
    setLoading(true);
    try{
      const rec=await idbGet(meta.id);
      if(!rec){alert('Document introuvable en base. Veuillez le réimporter.');setLoading(false);return;}
      const pdfObj=await pdfjsLib.getDocument(rec.buf.slice(0)).promise;
      setPdf(pdfObj);setNumPages(pdfObj.numPages);setSpread(1);setSelDoc(meta);
      setTimeout(()=>renderSpread(pdfObj,1,scale),80);
    }catch(e){alert('Erreur de chargement : '+e.message);}
    setLoading(false);
  };

  const submitImport=async()=>{
    if(!importForm.file||!importForm.nom.trim())return;
    setLoading(true);
    try{
      const buf=await importForm.file.arrayBuffer();
      const pdfObj=await pdfjsLib.getDocument(buf.slice(0)).promise;
      const id='m'+Date.now();
      const meta={id,name:importForm.nom.trim(),pages:pdfObj.numPages,size:importForm.file.size};
      await idbSave(id,meta.name,buf);
      const newDocs=[meta,...docs.filter(d=>d.name!==meta.name)];
      setDocs(newDocs);saveMeta(newDocs);
      setPdf(pdfObj);setNumPages(pdfObj.numPages);setSpread(1);setSelDoc(meta);
      setShowImport(false);setImportForm({nom:'',file:null});
      setTimeout(()=>renderSpread(pdfObj,1,scale),80);
    }catch(e){alert('Erreur : '+e.message);}
    setLoading(false);
  };

  const deleteDoc=async(id,e)=>{
    e.stopPropagation();
    if(!confirm('Supprimer ce manuel ?'))return;
    await idbDelete(id);
    const newDocs=docs.filter(d=>d.id!==id);
    setDocs(newDocs);saveMeta(newDocs);
    if(selDoc?.id===id){setPdf(null);setSelDoc(null);setNumPages(0);}
  };

  const prevSpread=()=>setSpread(s=>Math.max(1,s-2));
  const nextSpread=()=>setSpread(s=>{const next=s+2;return next>numPages?s:next;});

  const goToPage=()=>{
    const p=parseInt(gotoPage);
    if(isNaN(p)||p<1||p>numPages)return;
    // align to odd page (left side of spread)
    setSpread(p%2===0?p-1:p);
    setGotoPage('');
  };

  const fmtSize=b=>b>1024*1024?(b/1024/1024).toFixed(1)+' Mo':(b/1024).toFixed(0)+' Ko';

  return(<>
    <div className="page-hd">
      <div>
        <div className="phd-badge">📚 Manuel</div>
        <div className="phd-title">Lecteur de manuel</div>
        <div className="phd-sub">{selDoc?selDoc.name+' · '+numPages+' pages · p.'+spread+(spread+1<=numPages?'–'+(spread+1):''):'Sélectionnez ou importez un PDF'}</div>
      </div>
      <div className="phd-actions">
        <button className="btn btn-white" onClick={()=>{setImportForm({nom:'',file:null});setShowImport(true);}}>+ Importer un manuel</button>
        {pdf&&<>
          <button className="btn btn-ghost" onClick={()=>setScale(s=>Math.min(s+.15,2.5))} title="Zoom +">🔍+</button>
          <button className="btn btn-ghost" onClick={()=>setScale(s=>Math.max(s-.15,.4))} title="Zoom −">🔍−</button>
          {/* Aller à la page */}
          <div style={{display:'flex',alignItems:'center',gap:'.28rem'}}>
            <input value={gotoPage} onChange={e=>setGotoPage(e.target.value)} onKeyDown={e=>e.key==='Enter'&&goToPage()}
              placeholder="p.…" title="Aller à la page"
              style={{width:52,padding:'.3rem .45rem',border:'1.5px solid rgba(255,255,255,.25)',borderRadius:'var(--r-xs)',background:'rgba(255,255,255,.12)',color:'#fff',fontFamily:'Roboto,sans-serif',fontSize:'.78rem',textAlign:'center'}}/>
            <button className="btn btn-ghost" onClick={goToPage} style={{padding:'.3rem .6rem',fontSize:'.75rem'}}>Aller</button>
          </div>
        </>}
      </div>
    </div>

    <div className="manuel-outer" style={{flexDirection:'row'}}>
      {/* Sidebar : liste des manuels */}
      <div style={{width:sidebarOpen?220:42,flexShrink:0,borderRight:'1px solid var(--border)',background:'var(--surface2)',display:'flex',flexDirection:'column',overflow:'hidden',transition:'width .22s ease'}}>
        <div onClick={()=>setSidebarOpen(o=>!o)}
          style={{padding:'.5rem .875rem',fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',borderBottom:'1px solid var(--border)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',userSelect:'none',flexShrink:0}}
          title={sidebarOpen?'Rabattre la liste':'Afficher la liste'}>
          <span style={{whiteSpace:'nowrap',overflow:'hidden',opacity:sidebarOpen?1:0,transition:'opacity .15s'}}>Manuels ({docs.length})</span>
          <span style={{fontSize:'.65rem',flexShrink:0,transform:sidebarOpen?'':'rotate(180deg)',transition:'transform .22s'}}>{sidebarOpen?'◀':'▶'}</span>
        </div>
        {sidebarOpen&&<>
        <div style={{flex:1,overflowY:'auto'}}>
          {docs.length===0&&<div style={{padding:'.875rem',fontSize:'.76rem',color:'var(--text3)',fontStyle:'italic'}}>Aucun manuel importé</div>}
          {docs.map(d=>(
            <div key={d.id}
              onClick={()=>loadDocById(d)}
              style={{display:'flex',alignItems:'center',gap:'.45rem',padding:'.55rem .875rem',borderBottom:'1px solid var(--border)',cursor:'pointer',background:selDoc?.id===d.id?'var(--surface)':'transparent',borderLeft:'3px solid '+(selDoc?.id===d.id?'var(--accent)':'transparent'),transition:'all .15s'}}>
              <span style={{fontSize:'1.1rem',flexShrink:0}}>📚</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'.78rem',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text)'}}>{d.name}</div>
                <div style={{fontSize:'.63rem',color:'var(--text3)'}}>{d.pages} p.{d.size&&' · '+fmtSize(d.size)}</div>
              </div>
              <button onClick={e=>deleteDoc(d.id,e)}
                style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:'.8rem',padding:'.1rem .22rem',borderRadius:4,flexShrink:0}}
                title="Supprimer">🗑️</button>
            </div>
          ))}
        </div>
        <div style={{padding:'.65rem .875rem',borderTop:'1px solid var(--border)',flexShrink:0}}>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',fontSize:'.75rem'}}
            onClick={()=>{setImportForm({nom:'',file:null});setShowImport(true);}}>+ Importer</button>
        </div>
        </>}
      </div>

      {/* Viewer */}
      {loading?(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'.65rem',color:'var(--text2)'}}>
          <div style={{fontSize:'2rem',animation:'spin 1s linear infinite'}}>⏳</div>
          <div style={{fontWeight:600}}>Chargement…</div>
        </div>
      ):!pdf?(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'.75rem',color:'var(--text2)'}}>
          <div style={{fontSize:'3rem',opacity:.2}}>📚</div>
          <div style={{fontWeight:700}}>{docs.length>0?'Sélectionnez un manuel à gauche':'Importez votre premier manuel'}</div>
          <div style={{fontSize:'.8rem',color:'var(--text3)'}}>Double page côte à côte — vue livre ouvert</div>
          {docs.length===0&&<button className="btn btn-primary" onClick={()=>{setImportForm({nom:'',file:null});setShowImport(true);}}>📂 Importer un PDF</button>}
        </div>
      ):(
        <div className="manuel-viewer" style={{flex:1}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'1rem'}}>
            <div className="manuel-book">
              <canvas ref={cvLeft} className="manuel-page"/>
              {spread+1<=numPages&&<><div className="manuel-divider"/><canvas ref={cvRight} className="manuel-page"/></>}
            </div>
            {/* Nav bar */}
            <div style={{display:'flex',gap:'.55rem',alignItems:'center',background:'rgba(0,0,0,.35)',padding:'.5rem .875rem',borderRadius:99,backdropFilter:'blur(8px)'}}>
              <button onClick={()=>setSpread(1)} className="btn btn-ghost" style={{padding:'.3rem .55rem',fontSize:'.72rem'}} disabled={spread<=1} title="Première page">⏮</button>
              <button onClick={prevSpread} className="btn btn-ghost" style={{padding:'.3rem .65rem'}} disabled={spread<=1}>◀</button>
              <span style={{color:'rgba(255,255,255,.85)',fontSize:'.8rem',fontWeight:600,minWidth:80,textAlign:'center'}}>
                p.{spread}{spread+1<=numPages?'–'+(spread+1):''} <span style={{opacity:.55}}>/ {numPages}</span>

              <button onClick={nextSpread} className="btn btn-ghost" style={{padding:'.3rem .65rem'}} disabled={spread+1>=numPages}>▶</button>
              <button onClick={()=>setSpread(numPages%2===0?numPages-1:numPages)} className="btn btn-ghost" style={{padding:'.3rem .55rem',fontSize:'.72rem'}} disabled={spread+1>=numPages} title="Dernière page">⏭</button>
            </div>

    {/* Modal import */}

              </label>

            </div>

              <button className="btn" onClick={()=>setShowImport(false)}>Annuler</button>

                {loading?'Import en cours…':'Importer'}
              </button>
            </div>
          </div>
        </div>
      </div>
    )}
  </>);
}

    {id:'suivi',label:'Points de suivi / Actions',type:'textarea'},
    {id:'docs',label:'Documents / Pièces jointes',type:'textarea'},
  ];
  const SPEC={
    famille:[{id:'eleve',label:'Élève concerné(e)',type:'text'},{id:'motif',label:'Motif de convocation',type:'textarea'},{id:'decisions',label:'Décisions prises',type:'textarea'},{id:'suivi_el',label:'Suivi prévu',type:'textarea'}],
    pedagogique:[{id:'discipline',label:'Discipline(s)',type:'text'},{id:'objectifs',label:'Objectifs',type:'textarea'},{id:'dec_ped',label:'Décisions pédagogiques',type:'textarea'},{id:'repartition',label:'Répartition séquences',type:'textarea'}],
    equipe:[{id:'niveaux',label:'Niveau(x)',type:'text'},{id:'thematique',label:'Thématique',type:'text'},{id:'actions',label:'Actions / Responsable / Échéance',type:'textarea'}],
    'conseil-ped':[{id:'odj_chef',label:"Ordre du jour chef d'étal.",type:'textarea'},{id:'discussion',label:'Discussion',type:'textarea'},{id:'votes',label:'Votes',type:'textarea'},{id:'qdiv',label:'Questions diverses',type:'textarea'}],
    commission:[{id:'eleve',label:'Élève',type:'text'},{id:'mesures',label:'Mesures envisagées',type:'textarea'},{id:'engagement',label:"Engagement élève",type:'textarea'},{id:'decision',label:'Décision',type:'textarea'}],
    discipline:[{id:'eleve',label:'Élève',type:'text'},{id:'faits',label:'Faits reprochés',type:'textarea'},{id:'sanctions',label:'Sanctions proposées',type:'textarea'},{id:'decision',label:'Décision finale',type:'textarea'}],
    ca:[{id:'quorum',label:'Quorum',type:'text'},{id:'resolutions',label:'Résolutions adoptées',type:'textarea'},{id:'votes',label:'Résultats des votes',type:'textarea'}],
  };

  const load=()=>{try{return JSON.parse(localStorage.getItem('cdc-reunions')||'[]')}catch{return[]}};
  const[reunions,setReunions]=useState(load);
  const[vue,setVue]=useState('liste');
  const[draft,setDraft]=useState(null);
  const[selId,setSelId]=useState(null);

  useEffect(()=>{localStorage.setItem('cdc-reunions',JSON.stringify(reunions));},[reunions]);

  const typeInfo=id=>TYPES.find(t=>t.id===id)||TYPES[0];
  const fmtD=iso=>{if(!iso)return'—';return new Date(iso+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})};

  const newReunion=typeId=>{
    const champs={};
    COMMUNS.forEach(c=>{champs[c.id]='';});
    (SPEC[typeId]||[]).forEach(c=>{champs[c.id]='';});
    const r={id:'reun-'+Date.now(),type:typeId,titre:'',createdAt:new Date().toISOString(),champs};
    setDraft(r);setVue('edit');
  };

  const saveDraft=()=>{
    if(!draft||!draft.titre.trim()){alert('Le titre est obligatoire.');return;}
    const exists=reunions.find(r=>r.id===draft.id);
    setReunions(exists?reunions.map(r=>r.id===draft.id?draft:r):[...reunions,draft]);
    setSelId(draft.id);setVue('detail');
  };

  const del=id=>{if(!confirm('Supprimer ?'))return;setReunions(reunions.filter(r=>r.id!==id));setVue('liste');};

  const is={padding:'.55rem .75rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-s)',background:'var(--surface2)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.85rem',outline:'none',width:'100%',boxSizing:'border-box'};
  const ta={...is,resize:'vertical',minHeight:72,lineHeight:1.6};

  const reunion=reunions.find(r=>r.id===selId)||null;
  const type=reunion?typeInfo(reunion.type):null;
  const draftType=draft?typeInfo(draft.type):null;

  if(vue==='new') return(
    <>
      <div className="page-hd"><div><div className="phd-badge">🤝 Réunions</div><div className="phd-title">Nouvelle réunion</div></div><div className="phd-actions"><button className="btn" onClick={()=>setVue('liste')}>← Retour</button></div></div>
      <div className="page-content"><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:'1rem',maxWidth:800}}>
        {TYPES.map(t=>(
          <button key={t.id} onClick={()=>newReunion(t.id)}
            style={{display:'flex',alignItems:'center',gap:'.875rem',padding:'1.1rem',border:`1.5px solid ${t.color}33`,borderRadius:12,background:`${t.color}08`,cursor:'pointer',textAlign:'left',fontFamily:'Roboto,sans-serif',transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=t.color;e.currentTarget.style.background=`${t.color}15`;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=`${t.color}33`;e.currentTarget.style.background=`${t.color}08`;}}>
            <div style={{width:40,height:40,borderRadius:10,background:`${t.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',flexShrink:0}}>{t.icon}</div>
            <div style={{fontWeight:700,fontSize:'.88rem',color:'var(--text)'}}>{t.label}</div>
          </button>
        ))}
      </div></div>
    </>
  );

  if(vue==='edit'&&draft) return(
    <>
      <div className="page-hd">
        <div><div className="phd-badge" style={{background:draftType?.color+'22',color:draftType?.color}}>{draftType?.icon} {draftType?.label}</div><div className="phd-title">{reunions.find(r=>r.id===draft.id)?'Modifier':'Nouvelle réunion'}</div></div>
        <div className="phd-actions"><button className="btn" onClick={()=>setVue(reunions.find(r=>r.id===draft.id)?'detail':'liste')}>Annuler</button><button className="btn btn-primary" onClick={saveDraft}>💾 Sauvegarder</button></div>
      </div>
      <div className="page-content"><div style={{maxWidth:680}}>
        <div style={{marginBottom:'1rem'}}>
          <label style={{fontSize:'.7rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:'.28rem'}}>Titre *</label>
          <input value={draft.titre} onChange={e=>setDraft(d=>({...d,titre:e.target.value}))} placeholder={`${draftType?.label} — `} style={{...is,fontSize:'1rem',fontWeight:600}}/>
        </div>
        <div style={{padding:'.75rem 1rem',background:'rgba(59,91,219,.05)',border:'1px solid rgba(59,91,219,.15)',borderRadius:10,marginBottom:'1rem'}}>
          <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.75rem'}}>Informations générales</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 1rem'}}>
            {COMMUNS.slice(0,3).map(c=>(
              <div key={c.id} style={{marginBottom:'.65rem'}}>
                <label style={{fontSize:'.7rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:'.22rem'}}>{c.label}</label>
                <input type={c.type} value={draft.champs[c.id]||''} onChange={e=>setDraft(d=>({...d,champs:{...d.champs,[c.id]:e.target.value}}))} style={is}/>
              </div>
            ))}
          </div>
          {COMMUNS.slice(3).map(c=>(
            <div key={c.id} style={{marginBottom:'.65rem'}}>
              <label style={{fontSize:'.7rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:'.22rem'}}>{c.label}</label>
              <textarea value={draft.champs[c.id]||''} onChange={e=>setDraft(d=>({...d,champs:{...d.champs,[c.id]:e.target.value}}))} rows={3} style={ta}/>
            </div>
          ))}
        </div>
        {(SPEC[draft.type]||[]).length>0&&(
          <div style={{padding:'.75rem 1rem',background:`${draftType?.color}08`,border:`1px solid ${draftType?.color}25`,borderRadius:10}}>
            <div style={{fontSize:'.65rem',fontWeight:700,color:draftType?.color,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.75rem'}}>{draftType?.icon} {draftType?.label}</div>
            {(SPEC[draft.type]||[]).map(c=>(
              <div key={c.id} style={{marginBottom:'.65rem'}}>
                <label style={{fontSize:'.7rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:'.22rem'}}>{c.label}</label>
                {c.type==='textarea'
                  ?<textarea value={draft.champs[c.id]||''} onChange={e=>setDraft(d=>({...d,champs:{...d.champs,[c.id]:e.target.value}}))} rows={3} style={ta}/>
                  :<input type={c.type} value={draft.champs[c.id]||''} onChange={e=>setDraft(d=>({...d,champs:{...d.champs,[c.id]:e.target.value}}))} style={is}/>
                }
              </div>
            ))}
          </div>
        )}
      </div></div>
    </>
  );

  if(vue==='detail'&&reunion) return(
    <>
      <div className="page-hd">
        <div><div className="phd-badge" style={{background:type.color+'22',color:type.color}}>{type.icon} {type.label}</div><div className="phd-title">{reunion.titre||type.label}</div><div className="phd-sub">{fmtD(reunion.champs?.date)}{reunion.champs?.lieu?' · '+reunion.champs.lieu:''}</div></div>
        <div className="phd-actions">
          <button className="btn" onClick={()=>setVue('liste')}>← Retour</button>
          <button className="btn btn-ghost" onClick={()=>{setDraft({...reunion,champs:{...reunion.champs}});setVue('edit');}}>✏️ Modifier</button>
          <button className="btn btn-danger" style={{opacity:.8}} onClick={()=>del(reunion.id)}>🗑️</button>
        </div>
      </div>
      <div className="page-content"><div style={{maxWidth:680}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.5rem',marginBottom:'1.25rem'}}>
          {[['📅 Date',fmtD(reunion.champs?.date)],['🕐 Heure',reunion.champs?.heure||'—'],['📍 Lieu',reunion.champs?.lieu||'—']].map(([l,v])=>(
            <div key={l} style={{padding:'.55rem .75rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10}}>
              <div style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',marginBottom:'.2rem'}}>{l}</div>
              <div style={{fontSize:'.85rem',fontWeight:600,color:'var(--text)'}}>{v}</div>
            </div>
          ))}
        </div>
        {[...COMMUNS.slice(3),...(SPEC[reunion.type]||[])].map(c=>{
          const v=reunion.champs?.[c.id];
          if(!v?.trim())return null;
          return(
            <div key={c.id} style={{marginBottom:'.875rem'}}>
              <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>{c.label}</div>
              <div style={{fontSize:'.87rem',color:'var(--text)',lineHeight:1.7,whiteSpace:'pre-wrap',padding:'.6rem .875rem',background:'var(--surface2)',borderRadius:8,border:'1px solid var(--border)'}}>{v}</div>
            </div>
          );
        })}
      </div></div>
    </>
  );

  return(
    <>
      <div className="page-hd">
        <div><div className="phd-badge">🤝 Réunions</div><div className="phd-title">Réunions</div><div className="phd-sub">{reunions.length} réunion{reunions.length>1?'s':''}</div></div>
        <div className="phd-actions"><button className="btn btn-primary" onClick={()=>setVue('new')}>+ Nouvelle réunion</button></div>
      </div>
      <div className="page-content">
        {reunions.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'4rem',gap:'1rem',color:'var(--text3)'}}>
            <div style={{fontSize:'3rem',opacity:.15}}>🤝</div>
            <div style={{fontWeight:700,color:'var(--text2)'}}>Aucune réunion</div>
            <div style={{fontSize:'.83rem'}}>Créez votre première réunion avec le bouton ci-dessus.</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:'.5rem'}}>
            {reunions.slice().sort((a,b)=>(b.champs?.date||b.createdAt)>(a.champs?.date||a.createdAt)?1:-1).map(r=>{
              const t=typeInfo(r.type);
              return(
                <div key={r.id} onClick={()=>{setSelId(r.id);setVue('detail');}}
                  style={{display:'flex',alignItems:'center',gap:'1rem',padding:'.875rem 1.25rem',background:'var(--surface)',border:`1.5px solid var(--border)`,borderRadius:12,cursor:'pointer',transition:'all .15s',borderLeft:`4px solid ${t.color}`}}
                  onMouseEnter={e=>e.currentTarget.style.background=`${t.color}06`}
                  onMouseLeave={e=>e.currentTarget.style.background='var(--surface)'}>
                  <div style={{width:40,height:40,borderRadius:10,background:`${t.color}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',flexShrink:0}}>{t.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:'.9rem',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.titre||t.label}</div>
                    <div style={{fontSize:'.73rem',color:'var(--text3)',display:'flex',gap:'.5rem'}}>
                      <span style={{color:t.color,fontWeight:600}}>{t.label}</span>
                      {r.champs?.date&&<span>📅 {fmtD(r.champs.date)}</span>}
                    </div>
                  </div>
                  <span style={{color:'var(--text3)',fontSize:'.8rem'}}>→</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}

/* ══ MODULE — RENCONTRES PARENTS-PROFS ══════════════════════════════════ */
// Field helper — défini HORS du composant pour éviter le démontage à chaque render
function RencField({label,children}){
  return(
    <div style={{marginBottom:'.75rem'}}>
      <label style={{fontSize:'.68rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:'.25rem'}}>{label}</label>
      {children}
    </div>
  );
}

function RencontreParents({onNav}){
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const load=()=>{try{return JSON.parse(localStorage.getItem('cdc-rencontres')||'[]')}catch{return[]}};
  const[rencontres,setRencontres]=useState(load);
  const[vue,setVue]=useState('liste');
  const[draft,setDraft]=useState(null);
  const[selId,setSelId]=useState(null);
  const[filtreCls,setFiltreCls]=useState('');

  useEffect(()=>{localStorage.setItem('cdc-rencontres',JSON.stringify(rencontres));},[rencontres]);

  // Tous les élèves de toutes les classes pour l'autocomplete
  const tousLesEleves=classes.flatMap(c=>c.eleves.map(e=>({nom:e.nom,classeId:c.id,classeNom:c.name})));

  const fmtD=iso=>{if(!iso)return'—';return new Date(iso+'T12:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'long',year:'numeric'});};

  const newRencontre=()=>{
    const d={id:'renc-'+Date.now(),
      eleveNom:'',classeId:'',date:isoDate(new Date()),heure:'',lieu:'',
      motif:'',resume:'',decisions:'',suivi:'',
      alerte:false,alerteVue:false,
      createdAt:new Date().toISOString()};
    setDraft(d);setVue('edit');
  };

  const save=()=>{
    if(!draft.eleveNom.trim()){alert('Le nom de l\'élève est obligatoire.');return;}
    const exists=rencontres.find(r=>r.id===draft.id);
    setRencontres(exists?rencontres.map(r=>r.id===draft.id?draft:r):[...rencontres,draft]);
    setSelId(draft.id);setVue('detail');
  };

  const del=id=>{setRencontres(rencontres.filter(r=>r.id!==id));setVue('liste');setSelId(null);};
  const dismissAlerte=id=>setRencontres(rencontres.map(r=>r.id===id?{...r,alerteVue:true}:r));

  // Quand on choisit un élève depuis la datalist, auto-remplir la classe
  const onEleveChange=e=>{
    const nom=e.target.value;
    const found=tousLesEleves.find(el=>el.nom===nom);
    setDraft(d=>({...d,eleveNom:nom,...(found&&!d.classeId?{classeId:found.classeId}:{})}));
  };

  const is={padding:'.55rem .75rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-s)',background:'var(--surface2)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.85rem',outline:'none',width:'100%',boxSizing:'border-box',transition:'border-color .15s'};
  const ta={...is,resize:'vertical',minHeight:72,lineHeight:1.6};

  const rencontre=rencontres.find(r=>r.id===selId)||null;
  const listeFiltered=filtreCls?rencontres.filter(r=>r.classeId===filtreCls):rencontres;
  const alertesActives=rencontres.filter(r=>r.alerte&&!r.alerteVue);

  // ── Vue EDIT ──
  if(vue==='edit'&&draft) return(<>
    <div className="page-hd">
      <div>
        <div className="phd-badge">👨‍👩‍👧 Rencontres parents</div>
        <div className="phd-title">{rencontres.find(r=>r.id===draft.id)?'Modifier la rencontre':'Nouvelle rencontre'}</div>
      </div>
      <div className="phd-actions">
        <button className="btn" onClick={()=>setVue(rencontres.find(r=>r.id===draft.id)?'detail':'liste')}>Annuler</button>
        <button className="btn btn-primary" onClick={save}>💾 Sauvegarder</button>
      </div>
    </div>
    <div className="page-content"><div style={{maxWidth:640}}>
      {/* Datalist élèves pour l'autocomplete */}
      <datalist id="renc-eleves-list">
        {tousLesEleves.map((e,i)=><option key={i} value={e.nom}>{e.nom} ({e.classeNom})</option>)}
      </datalist>

      {/* Infos élève */}
      <div style={{padding:'.875rem 1rem',background:'rgba(59,91,219,.05)',border:'1px solid rgba(59,91,219,.15)',borderRadius:10,marginBottom:'1rem'}}>
        <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.75rem'}}>👤 Élève concerné</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 1rem'}}>
          <RencField label="Nom de l'élève *">
            <input
              value={draft.eleveNom}
              onChange={onEleveChange}
              list="renc-eleves-list"
              placeholder="Tapez un nom…"
              style={is}
              autoComplete="off"/>
          </RencField>
          <RencField label="Classe">
            <select value={draft.classeId} onChange={e=>setDraft(d=>({...d,classeId:e.target.value}))} style={is}>
              <option value="">— Choisir —</option>
              {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </RencField>
        </div>
      </div>
      {/* Infos pratiques */}
      <div style={{padding:'.875rem 1rem',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,marginBottom:'1rem'}}>
        <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.75rem'}}>📅 Informations pratiques</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'0 1rem'}}>
          <RencField label="Date"><input type="date" value={draft.date} onChange={e=>setDraft(d=>({...d,date:e.target.value}))} style={is}/></RencField>
          <RencField label="Heure"><input type="time" value={draft.heure} onChange={e=>setDraft(d=>({...d,heure:e.target.value}))} style={is}/></RencField>
          <RencField label="Lieu"><input value={draft.lieu} onChange={e=>setDraft(d=>({...d,lieu:e.target.value}))} placeholder="Salle des profs…" style={is}/></RencField>
        </div>
        <RencField label="Motif de la rencontre">
          <input value={draft.motif} onChange={e=>setDraft(d=>({...d,motif:e.target.value}))} placeholder="Résultats, comportement, orientation…" style={is}/>
        </RencField>
      </div>
      {/* Contenu */}
      <div style={{padding:'.875rem 1rem',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,marginBottom:'1rem'}}>
        <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.75rem'}}>📝 Compte-rendu</div>
        <RencField label="Résumé de l'échange"><textarea value={draft.resume} onChange={e=>setDraft(d=>({...d,resume:e.target.value}))} rows={4} placeholder="Points abordés, éléments de contexte…" style={ta}/></RencField>
        <RencField label="Décisions prises"><textarea value={draft.decisions} onChange={e=>setDraft(d=>({...d,decisions:e.target.value}))} rows={3} placeholder="Actions convenues, engagements…" style={ta}/></RencField>
        <RencField label="Suivi prévu"><textarea value={draft.suivi} onChange={e=>setDraft(d=>({...d,suivi:e.target.value}))} rows={2} placeholder="Prochaine étape, date de bilan…" style={ta}/></RencField>
      </div>
      {/* Alerte dashboard */}
      <div style={{padding:'.875rem 1rem',background:draft.alerte?'rgba(220,38,38,.06)':'var(--surface)',border:`1.5px solid ${draft.alerte?'rgba(220,38,38,.3)':'var(--border)'}`,borderRadius:10,transition:'all .2s'}}>
        <label style={{display:'flex',alignItems:'center',gap:'.75rem',cursor:'pointer',userSelect:'none'}}>
          <div onClick={()=>setDraft(d=>({...d,alerte:!d.alerte}))}
            style={{width:40,height:22,borderRadius:99,background:draft.alerte?'var(--danger)':'var(--border)',position:'relative',transition:'background .2s',flexShrink:0}}>
            <div style={{position:'absolute',top:2,left:draft.alerte?20:2,width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/>
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:'.85rem',color:draft.alerte?'var(--danger)':'var(--text)'}}>🔔 Déclencher une alerte sur le tableau de bord</div>
            <div style={{fontSize:'.73rem',color:'var(--text2)',marginTop:'.1rem'}}>Visible jusqu'à ce que vous la marquiez comme vue</div>
          </div>
        </label>
      </div>
    </div></div>
  </>);

  // ── Vue DETAIL ──
  if(vue==='detail'&&rencontre) return(<>
    <div className="page-hd">
      <div>
        <div className="phd-badge">👨‍👩‍👧 Rencontre parents</div>
        <div className="phd-title">{rencontre.eleveNom||'Rencontre'}</div>
        <div className="phd-sub">{fmtD(rencontre.date)}{rencontre.heure?' à '+rencontre.heure:''}{rencontre.lieu?' · '+rencontre.lieu:''}</div>
      </div>
      <div className="phd-actions">
        <button className="btn" onClick={()=>setVue('liste')}>← Retour</button>
        <button className="btn btn-ghost" onClick={()=>{setDraft({...rencontre});setVue('edit');}}>✏️ Modifier</button>

function FeedbackBlock(){
  const[note,setNote]=useState(0);
  const[hover,setHover]=useState(0);
  const[points,setPoints]=useState('');
  const[amelio,setAmelio]=useState('');
  const[sent,setSent]=useState(false);

  const LABELS=['','Décevant','Peut mieux faire','Correct','Bien !','Excellent !'];
  const STAR_COLORS=['','#dc2626','#d97706','#ca8a04','#16a34a','#15803d'];

  const sendFeedback=()=>{
    if(!note)return;
    const stars='★'.repeat(note)+'☆'.repeat(5-note);
    const noteLabel=LABELS[note];
    const body=
      `Bonjour Lucas,\n\nVoici mon retour sur ClassPro v0.9 :\n\n`+
      `Note globale : ${stars} (${note}/5 — ${noteLabel})\n\n`+
      (points.trim()?`✅ Points forts :\n${points.trim()}\n\n`:'')+
      (amelio.trim()?`🔧 Axes d'amélioration :\n${amelio.trim()}\n\n`:'')+
      `---\nEnvoyé depuis ClassPro v0.9`;
    const subject=encodeURIComponent(`[ClassPro] Feedback ${stars} — ${noteLabel}`);
    const bodyEnc=encodeURIComponent(body);
    window.location.href=`mailto:lucas.le-coadou@ac-montpellier.fr?subject=${subject}&body=${bodyEnc}`;
    setSent(true);
  };

  const reset=()=>{setNote(0);setHover(0);setPoints('');setAmelio('');setSent(false);};

  const taStyle={width:'100%',padding:'.5rem .7rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.78rem',lineHeight:1.55,resize:'vertical',outline:'none',transition:'border-color .15s',boxSizing:'border-box'};

  return(
    <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'1rem 1.1rem',display:'flex',flexDirection:'column',gap:'.75rem'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontWeight:700,fontSize:'.88rem'}}>💬 Donner mon avis</div>
          <div style={{fontSize:'.72rem',color:'var(--text2)',marginTop:'.1rem'}}>Votre retour aide à améliorer ClassPro</div>
        </div>
        {sent&&<button onClick={reset} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:'.72rem',textDecoration:'underline'}}>Nouveau feedback</button>}
      </div>

      {sent?(
        <div style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.65rem .875rem',background:'#dcfce7',border:'1px solid #86efac',borderRadius:'var(--r-xs)'}}>
          <span style={{fontSize:'1.1rem'}}>✅</span>
          <div style={{fontSize:'.8rem',color:'#166534',fontWeight:600}}>Merci ! Votre client mail va s'ouvrir pour envoyer le feedback.</div>
        </div>
      ):(
        <>
          {/* Étoiles */}
          <div>
            <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Note globale *</div>
            <div style={{display:'flex',alignItems:'center',gap:'.35rem'}}>
              {[1,2,3,4,5].map(i=>(
                <span key={i}
                  onMouseEnter={()=>setHover(i)}
                  onMouseLeave={()=>setHover(0)}
                  onClick={()=>setNote(i)}
                  style={{fontSize:'1.6rem',cursor:'pointer',transition:'transform .1s',transform:(hover||note)>=i?'scale(1.15)':'scale(1)',color:(hover||note)>=i?(STAR_COLORS[hover||note]):'var(--border)',userSelect:'none'}}>
                  {(hover||note)>=i?'★':'☆'}
                </span>
              ))}
              {(hover||note)>0&&<span style={{fontSize:'.78rem',fontWeight:600,color:STAR_COLORS[hover||note],marginLeft:'.3rem'}}>{LABELS[hover||note]}</span>}
            </div>
          </div>

          {/* Points forts */}
          <div>
            <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>✅ Ce qui fonctionne bien</div>
            <textarea rows={2} value={points} onChange={e=>setPoints(e.target.value)}
              placeholder="Ex : le suivi de classe est très intuitif, le carnet de bord me fait gagner du temps…"
              style={taStyle}
              onFocus={e=>e.target.style.borderColor='var(--accent)'}
              onBlur={e=>e.target.style.borderColor='var(--border)'}/>
          </div>

          {/* Améliorations */}
          <div>
            <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>🔧 Ce qui pourrait être amélioré</div>
            <textarea rows={2} value={amelio} onChange={e=>setAmelio(e.target.value)}
              placeholder="Ex : j'aimerais pouvoir imprimer le plan de classe, l'EDT manque de…"
              style={taStyle}
              onFocus={e=>e.target.style.borderColor='var(--accent)'}
              onBlur={e=>e.target.style.borderColor='var(--border)'}/>
          </div>

          <button onClick={sendFeedback} disabled={!note}
            className="btn btn-primary"
            style={{alignSelf:'flex-end',opacity:note?1:.5,cursor:note?'pointer':'not-allowed'}}>
            ✉️ Envoyer par mail
          </button>
        </>
      )}
    </div>
  );
}

function Shell(){
  const[profile,setProfile]=useState(()=>{try{const p=localStorage.getItem('cdc-profile');return p?JSON.parse(p):null}catch{return null}});
  const[module,setModule]=useState('dashboard');
  const[collapsed,setCollapsed]=useState(false);
  const[theme,setTheme]=useState(()=>localStorage.getItem('cdc-theme')||'light');
  const[installReady,setInstallReady]=useState(false);
  const[showEditProfile,setShowEditProfile]=useState(false);
  const[editForm,setEditForm]=useState(null);
  const[showAbout,setShowAbout]=useState(false);
  const[showBackup,setShowBackup]=useState(false);
  const[showWelcome,setShowWelcome]=useState(false);
  const[restoreStatus,setRestoreStatus]=useState(null);
  // Le briefing ne se déclenche au montage QUE si un profil existe déjà (retour sur la même machine)
  const[showDayBriefing,setShowDayBriefing]=useState(()=>{
    const profExist=!!localStorage.getItem('cdc-profile');
    if(!profExist) return false; // localStorage vide → pas de briefing au montage
    const today=isoDate(new Date());
    const lastLaunch=localStorage.getItem('cdc-last-launch');
    if(lastLaunch!==today){
      localStorage.setItem('cdc-last-launch',today);
      return true;
    }
    return false;
  });
  // Données EDT pour le briefing (peuplées après import ou depuis localStorage)
  const[briefingData,setBriefingData]=useState(null); // {blocks, refA} ou null = lire localStorage
  const sections=[...new Set(NAV.map(n=>n.section))];
  const[openSections,setOpenSections]=useState(()=>Object.fromEntries(sections.map(s=>[s,true])));

  // ── Clés localStorage à sauvegarder ──
  const BACKUP_KEYS=[
    'cdc-profile','cdc-theme',
    'cdc-data',           // bulletins conseil
    'sc-classes',         // classes suivi
    'sc-sessions',        // séances suivi
    'cdc-devoirs',        // travaux non rendus
    'cdc-fiches',         // carnet de bord
    'cdc-plans',          // plan de classe
    'cdc-progs',          // progression annuelle
    'cdc-programmes',     // thèmes du programme
    'cdc-edt',            // emploi du temps
    'cdc-edt-refA',       // référence semaine A/B
    'cdc-liens',          // liens & raccourcis
    'cdc-manuels-meta',   // métadonnées manuels (pas les PDF)
    'dash-notes',
    'dash-taches',
    'dash-travail-rapide',
    'cdc-cours',          // cours prepares (Desktop)
    'cdc-jours-annules',  // journees annulees (Desktop)
    'cdc-reunions',       // reunions (Desktop + Web)
  ];

  const exportBackup=()=>{
    const data={version:'6.5',date:new Date().toISOString(),entries:{}};
    BACKUP_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!=null)data.entries[k]=v;});
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    const p=profile||{prenom:'',nom:''};
    const nom=(p.prenom+p.nom).replace(/\s+/g,'_').toUpperCase()||'export';
    const dateStr=new Date().toLocaleDateString('fr-FR').replace(/\//g,'-');
    const timeStr=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}).replace(':','h');
    a.href=URL.createObjectURL(blob);
    a.download=`ClassPro_${nom}_${dateStr}_${timeStr}.json`;
    a.click();URL.revokeObjectURL(a.href);
  };

  const importBackup=file=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.entries)throw new Error('Format invalide');
        Object.entries(data.entries).forEach(([k,v])=>localStorage.setItem(k,v));
        setRestoreStatus('ok');
        setTimeout(()=>{setRestoreStatus(null);window.location.reload();},1500);
      }catch(err){setRestoreStatus('err');}
    };
    reader.readAsText(file);
  };

  // Import JSON au démarrage (avant profil) — pas de reload, on charge l'état React directement
  const importOnStartup=file=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.entries)throw new Error('Format invalide');
        // Écrire toutes les entrées dans localStorage
        Object.entries(data.entries).forEach(([k,v])=>localStorage.setItem(k,v));
        // Marquer le lancement du jour
        localStorage.setItem('cdc-last-launch',isoDate(new Date()));
        // Charger le profil directement dans React
        const rawProfile=data.entries['cdc-profile'];
        if(rawProfile){
          const p=JSON.parse(rawProfile);
          setProfile(p);
          // Préparer les données EDT pour le briefing (depuis le JSON importé)
          const rawBlocks=data.entries['cdc-edt'];
          const rawRefA=data.entries['cdc-edt-refA'];
          setBriefingData({
            blocks: rawBlocks ? JSON.parse(rawBlocks) : [],
            refA: rawRefA||null,
          });
          setShowDayBriefing(true); // déclencher le briefing en confirmation
        } else {
          // Pas de profil dans le JSON → setup normal
          setProfile('setup');
        }
      }catch(err){
        alert('Fichier JSON invalide ou corrompu.');
      }
    };
    reader.readAsText(file);
  };

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme)},[theme]);
  useEffect(()=>{const chk=()=>{if(window.__installPrompt)setInstallReady(true)};chk();window.addEventListener('beforeinstallprompt',chk);return()=>window.removeEventListener('beforeinstallprompt',chk)},[]);

  const toggleTheme=()=>{const t=theme==='light'?'dark':'light';setTheme(t);localStorage.setItem('cdc-theme',t)};
  const confirm_=p=>{localStorage.setItem('cdc-profile',JSON.stringify(p));setProfile(p);setShowWelcome(true)};
  const resetProfile=()=>{if(!confirm('Réinitialiser complètement le profil ? Toutes les données seront perdues.'))return;localStorage.clear();setProfile(null)};
  const openEditProfile=()=>{setEditForm({...profile});setShowEditProfile(true)};
  const saveEditProfile=()=>{
    if(!editForm.prenom?.trim()||!editForm.nom?.trim())return;
    localStorage.setItem('cdc-profile',JSON.stringify(editForm));
    setProfile(editForm);
    // Persist refWeekA to its dedicated key if provided
    if(editForm.refWeekA){
      const d=getMondayOf(new Date(editForm.refWeekA+'T12:00'));
      localStorage.setItem('cdc-edt-refA',d.toISOString());
    }
    setShowEditProfile(false);
  };
  const doInstall=async()=>{if(!window.__installPrompt)return;window.__installPrompt.prompt();const{outcome}=await window.__installPrompt.userChoice;if(outcome==='accepted'){setInstallReady(false);window.__installPrompt=null}};
  const toggleSection=sec=>setOpenSections(s=>({...s,[sec]:!s[sec]}));

  const initials=profile?`${profile.prenom?.[0]||''}${profile.nom?.[0]||''}`.toUpperCase():'?';

  if(!profile) return(
    <div className="setup-screen">
      <div className="setup-card" style={{maxWidth:520}}>
        <div className="setup-logo" style={{background:'none',boxShadow:'none'}} dangerouslySetInnerHTML={{__html:LOGO_SVG_LG}}/>
        <div className="setup-title">ClassPro</div>
        <div className="setup-sub">Logiciel de gestion de classe</div>

        <div style={{display:'flex',flexDirection:'column',gap:'1rem',marginTop:'1.5rem'}}>

          {/* Import JSON */}
          <label htmlFor="startup-import" style={{display:'flex',alignItems:'center',gap:'1rem',padding:'1.1rem 1.25rem',borderRadius:'var(--r)',border:'2px solid var(--accent)',background:'rgba(59,91,219,.05)',cursor:'pointer',transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(59,91,219,.1)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(59,91,219,.05)';}}>
            <div style={{width:44,height:44,borderRadius:12,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.35rem',flexShrink:0}}>📂</div>
            <div>
              <div style={{fontWeight:700,fontSize:'.95rem',color:'var(--accent)'}}>Charger mon fichier ClassPro</div>
              <div style={{fontSize:'.78rem',color:'var(--text2)',marginTop:'.18rem',lineHeight:1.5}}>Importez votre JSON de la dernière session pour reprendre où vous en étiez.</div>
            </div>
          </label>
          <input id="startup-import" type="file" accept="application/json" style={{display:'none'}} onChange={e=>e.target.files[0]&&importOnStartup(e.target.files[0])}/>

          {/* Séparateur */}
          <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
            <span style={{fontSize:'.72rem',color:'var(--text3)',fontWeight:600}}>OU</span>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
          </div>

          {/* Nouvelle configuration */}
          <button onClick={()=>setProfile('setup')}
            style={{display:'flex',alignItems:'center',gap:'1rem',padding:'1.1rem 1.25rem',borderRadius:'var(--r)',border:'2px solid var(--border)',background:'var(--surface2)',cursor:'pointer',transition:'all .15s',width:'100%',textAlign:'left'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--text2)';e.currentTarget.style.background='var(--surface)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface2)';}}>
            <div style={{width:44,height:44,borderRadius:12,background:'var(--surface)',border:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.35rem',flexShrink:0}}>✨</div>
            <div>
              <div style={{fontWeight:700,fontSize:'.95rem',color:'var(--text)'}}>Nouvelle configuration</div>
              <div style={{fontSize:'.78rem',color:'var(--text2)',marginTop:'.18rem',lineHeight:1.5}}>Première utilisation ou nouveau profil — configurez ClassPro en 3 étapes.</div>
            </div>
          </button>
        </div>

        <div className="setup-footer" style={{marginTop:'1.5rem'}}>© {new Date().getFullYear()} Lucas Le Coadou · ClassPro v0.9 · Données stockées localement</div>
      </div>
    </div>
  );

  if(profile==='setup') return <SetupScreen onConfirm={confirm_}/>;

  return(
    <div className="shell">
      {/* DAY BRIEFING — premier lancement du jour ou confirmation post-import */}
      {showDayBriefing&&profile&&profile!=='setup'&&(()=>{
        const now=new Date();
        const dayIdx=now.getDay()===0?6:now.getDay()-1;
        // Utiliser briefingData (post-import) ou lire depuis localStorage (même machine)
        const rawBlocks=briefingData?briefingData.blocks:(()=>{try{return JSON.parse(localStorage.getItem('cdc-edt')||'[]')}catch{return[];}})();
        const rawRefA=briefingData?briefingData.refA:localStorage.getItem('cdc-edt-refA');
        const todayBlocks=(()=>{
          const todayMonday=getMondayOf(now);
          const weekType=rawRefA?getWeekType(todayMonday,getMondayOf(new Date(rawRefA))):'AB';
          return rawBlocks.filter(b=>{
            if(b.day!==dayIdx)return false;
            const w=b.weeks||'AB';
            return w==='AB'||w===weekType;
          }).sort((a,b)=>a.startH*60+a.startM-(b.startH*60+b.startM));
        })();
        const dayLabel=now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        const dayLabel0=dayLabel.charAt(0).toUpperCase()+dayLabel.slice(1);
        const isPostImport=!!briefingData; // true = vient d'un import → mode confirmation
        return(
          <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowDayBriefing(false)}>
            <div className="modal" style={{maxWidth:480,animation:'slideUp .3s ease'}}>
              {/* Header */}
              <div style={{background:'linear-gradient(135deg,#0f1b4d 0%,#1e3a8a 40%,#3b5bdb 70%,#7c3aed 100%)',padding:'1.25rem 1.5rem',borderRadius:'var(--r) var(--r) 0 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontFamily:'Roboto Slab,serif',fontSize:'1.05rem',fontWeight:800,color:'#fff',lineHeight:1.2}}>
                    {isPostImport?'✅ Fichier chargé avec succès !':'☀️ Bonjour '+profile.prenom+' !'}
                  </div>
                  <div style={{fontSize:'.78rem',color:'rgba(255,255,255,.65)',marginTop:'.18rem'}}>{dayLabel0}</div>
                </div>
                <button className="close-btn" style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.22)',color:'#fff'}} onClick={()=>setShowDayBriefing(false)}>×</button>
              </div>

              <div style={{padding:'1.1rem 1.5rem',display:'flex',flexDirection:'column',gap:'1rem'}}>

                {/* Bloc import — confirmation si post-import, rappel sinon */}
                {isPostImport?(
                  <div style={{display:'flex',gap:'.65rem',alignItems:'center',padding:'.75rem 1rem',background:'rgba(15,155,110,.08)',border:'1px solid rgba(15,155,110,.25)',borderRadius:'var(--r-s)'}}>
                    <span style={{fontSize:'1.3rem'}}>📂</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:'.85rem',color:'var(--success)'}}>Vos données ont été restaurées</div>
                      <div style={{fontSize:'.75rem',color:'var(--text2)',marginTop:'.15rem'}}>Profil, classes, fiches, EDT, progressions… tout est là.</div>
                    </div>
                  </div>
                ):(
                  <div style={{display:'flex',gap:'.75rem',alignItems:'flex-start',padding:'.875rem 1rem',background:'rgba(245,158,11,.07)',border:'1px solid rgba(245,158,11,.25)',borderRadius:'var(--r-s)'}}>
                    <span style={{fontSize:'1.2rem',flexShrink:0,marginTop:'.05rem'}}>📂</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:'.85rem',color:'#92400e'}}>Avez-vous chargé votre fichier ClassPro ?</div>
                      <div style={{fontSize:'.76rem',color:'#78350f',marginTop:'.2rem',lineHeight:1.5}}>Sur un poste de l'établissement, pensez à importer votre JSON de la veille.</div>
                      <label htmlFor="briefing-import" style={{display:'inline-flex',alignItems:'center',gap:'.35rem',marginTop:'.55rem',padding:'.32rem .75rem',background:'#d97706',color:'#fff',borderRadius:'var(--r-xs)',fontSize:'.76rem',fontWeight:700,cursor:'pointer'}}>
                        📂 Importer mon fichier
                      </label>
                      <input id="briefing-import" type="file" accept="application/json" style={{display:'none'}} onChange={e=>{if(e.target.files[0]){importOnStartup(e.target.files[0]);}}}/>
                    </div>
                  </div>
                )}

                {/* Cours du jour */}
                <div>
                  <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>
                    📅 Vos cours aujourd'hui
                  </div>
                  {dayIdx>=5?(
                    <div style={{fontSize:'.82rem',color:'var(--text3)',fontStyle:'italic',padding:'.5rem 0'}}>C'est le week-end 🎉</div>
                  ):todayBlocks.length===0?(
                    <div style={{fontSize:'.82rem',color:'var(--text3)',fontStyle:'italic',padding:'.5rem 0'}}>Aucun cours planifié aujourd'hui dans l'EDT.</div>
                  ):(
                    <div style={{display:'flex',flexDirection:'column',gap:'.38rem'}}>
                      {todayBlocks.map(b=>{
                        const col=EDT_COLORS[b.colorIdx||0];
                        return(
                          <div key={b.id} style={{display:'flex',alignItems:'center',gap:'.65rem',padding:'.5rem .75rem',background:'var(--surface2)',borderRadius:'var(--r-xs)',borderLeft:`3px solid ${col.border}`}}>
                            <div style={{fontWeight:700,fontSize:'.8rem',color:'var(--text)',flex:1}}>{b.title}</div>
                            <div style={{fontSize:'.72rem',color:'var(--text2)',flexShrink:0}}>
                              {b.startH}:{String(b.startM).padStart(2,'0')}–{b.endH}:{String(b.endM).padStart(2,'0')}
                            </div>
                            {b.room&&<div style={{fontSize:'.68rem',color:'var(--text3)',flexShrink:0}}>📍{b.room}</div>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                <button className="btn btn-primary" style={{justifyContent:'center',padding:'.6rem'}} onClick={()=>setShowDayBriefing(false)}>
                  C'est parti ! →
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* WELCOME MODAL — affiché uniquement après la première inscription */}
      {showWelcome&&(
        <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowWelcome(false)}>
          <div className="modal" style={{maxWidth:480,animation:'slideUp .3s ease'}}>
            {/* Header coloré */}
            <div style={{background:'linear-gradient(135deg,#0f1b4d 0%,#1e3a8a 40%,#3b5bdb 70%,#7c3aed 100%)',padding:'1.5rem 1.75rem 1.25rem',borderRadius:'var(--r) var(--r) 0 0',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'1rem'}}>
              <div style={{display:'flex',alignItems:'center',gap:'.875rem'}}>
                <div style={{width:44,height:44,borderRadius:12,background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}} dangerouslySetInnerHTML={{__html:LOGO_SVG}}/>
                <div>
                  <div style={{fontFamily:'Roboto Slab,serif',fontSize:'1.15rem',fontWeight:800,color:'#fff',letterSpacing:'-.02em',lineHeight:1.2}}>Bienvenue dans ClassPro !</div>
                  <div style={{fontSize:'.74rem',color:'rgba(255,255,255,.65)',marginTop:'.18rem'}}>Version Beta · {new Date().getFullYear()}</div>
                </div>
              </div>
              <button className="close-btn" style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.22)',color:'#fff',flexShrink:0}} onClick={()=>setShowWelcome(false)}>×</button>
            </div>
            {/* Corps */}
            <div style={{padding:'1.35rem 1.75rem',display:'flex',flexDirection:'column',gap:'.875rem'}}>
              {/* Message principal */}
              <p style={{fontSize:'.88rem',color:'var(--text)',lineHeight:1.7,margin:0}}>
                <strong>ClassPro</strong> est un programme développé par <strong>Lucas Le Coadou</strong> pour aider les enseignants dans leur quotidien.
              </p>
              {/* Encart Beta */}
              <div style={{display:'flex',gap:'.65rem',padding:'.875rem 1rem',background:'rgba(59,91,219,.07)',border:'1px solid rgba(59,91,219,.2)',borderRadius:'var(--r-s)'}}>
                <span style={{fontSize:'1.2rem',flexShrink:0,marginTop:'.05rem'}}>🧪</span>
                <div style={{fontSize:'.82rem',color:'var(--text)',lineHeight:1.65}}>
                  Cette version est encore une <strong style={{color:'var(--accent)'}}>Beta</strong>. Vos retours sont précieux pour faire évoluer et améliorer ClassPro — n'hésitez pas à signaler tout bug ou suggestion !
                </div>
              </div>
              {/* Contact */}
              <div style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.75rem 1rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)'}}>
                <span style={{fontSize:'1rem',flexShrink:0}}>✉️</span>
                <div style={{fontSize:'.8rem',color:'var(--text2)'}}>
                  Vos retours par mail :{' '}
                  <a href="mailto:lucas.le-coadou@ac-montpellier.fr" style={{color:'var(--accent)',fontWeight:600,textDecoration:'none'}}>
                    lucas.le-coadou@ac-montpellier.fr
                  </a>
                </div>
              </div>
              {/* Bouton fermer */}
              <button className="btn btn-primary" style={{alignSelf:'stretch',justifyContent:'center',padding:'.7rem',fontSize:'.88rem',marginTop:'.1rem'}} onClick={()=>setShowWelcome(false)}>
                C'est parti ! →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT PROFILE MODAL */}
      {showEditProfile&&editForm&&(
        <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowEditProfile(false)}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-hd">
              <div><h2>✏️ Modifier le profil</h2><div className="modal-hd-sub">Vos informations personnelles</div></div>
              <button className="close-btn" onClick={()=>setShowEditProfile(false)}>×</button>
            </div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.875rem'}}>
              <div className="field-row">
                <div className="field"><label>Prénom *</label><input type="text" value={editForm.prenom||''} onChange={e=>setEditForm(f=>({...f,prenom:e.target.value}))}/></div>
                <div className="field"><label>Nom *</label><input type="text" value={editForm.nom||''} onChange={e=>setEditForm(f=>({...f,nom:e.target.value.toUpperCase()}))}/></div>
              </div>
              <div className="field"><label>Établissement</label><input type="text" placeholder="Collège Alfred Crouzet" value={editForm.etablissement||''} onChange={e=>setEditForm(f=>({...f,etablissement:e.target.value}))}/></div>
              <div className="field-row">
                <div className="field"><label>Classe principale</label><input type="text" placeholder="3C" value={editForm.classe||''} onChange={e=>setEditForm(f=>({...f,classe:e.target.value}))}/></div>
                <div className="field"><label>Année scolaire</label><select value={editForm.annee||'2025/2026'} onChange={e=>setEditForm(f=>({...f,annee:e.target.value}))}>{ANNEES.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
              </div>
              <div style={{display:'flex',gap:'.5rem',justifyContent:'space-between',alignItems:'center',marginTop:'.25rem',flexWrap:'wrap'}}>
                <button className="btn btn-danger" style={{fontSize:'.73rem'}} onClick={resetProfile}>🗑️ Réinitialiser tout</button>
                <div style={{display:'flex',gap:'.5rem'}}>
                  <button className="btn" onClick={()=>setShowEditProfile(false)}>Annuler</button>
                  <button className="btn btn-primary" onClick={saveEditProfile} disabled={!editForm.prenom?.trim()||!editForm.nom?.trim()}>Enregistrer</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* BACKUP MODAL */}
      {showBackup&&(
        <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowBackup(false)}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-hd">
              <div><h2>💾 Sauvegarde & Restauration</h2><div className="modal-hd-sub">Protégez vos données entre les sessions</div></div>
              <button className="close-btn" onClick={()=>setShowBackup(false)}>×</button>
            </div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'1rem'}}>

              {/* Alerte session */}
              <div style={{display:'flex',gap:'.6rem',padding:'.75rem .875rem',background:'rgba(217,119,6,.1)',border:'1px solid rgba(217,119,6,.3)',borderRadius:'var(--r-s)'}}>
                <span style={{fontSize:'1.1rem',flexShrink:0}}>⚠️</span>
                <div style={{fontSize:'.78rem',color:'var(--warning)',lineHeight:1.6}}>
                  <strong style={{display:'block',marginBottom:'.18rem'}}>Sessions temporaires détectées</strong>
                  Sur un poste de collège, localStorage et IndexedDB sont effacés à la déconnexion. Exportez votre sauvegarde <strong>avant de fermer la session</strong> et restaurez-la à votre prochaine connexion.
                </div>
              </div>

              {/* Export */}
              <div style={{padding:'1rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)',display:'flex',flexDirection:'column',gap:'.65rem'}}>
                <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
                  <span style={{fontSize:'1.4rem'}}>📥</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:'.88rem'}}>Exporter la sauvegarde</div>
                    <div style={{fontSize:'.73rem',color:'var(--text2)'}}>Classes, séances, fiches, EDT, travaux, progressions… tout sauf les PDF des manuels.</div>
                  </div>
                </div>
                <button className="btn btn-primary" style={{alignSelf:'flex-start'}} onClick={()=>{exportBackup();setShowBackup(false);}}>
                  💾 Télécharger ClassPro_backup.json
                </button>
              </div>

              {/* Import */}
              <div style={{padding:'1rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)',display:'flex',flexDirection:'column',gap:'.65rem'}}>
                <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
                  <span style={{fontSize:'1.4rem'}}>📤</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:'.88rem'}}>Restaurer une sauvegarde</div>
                    <div style={{fontSize:'.73rem',color:'var(--text2)'}}>L'application se rechargera automatiquement après la restauration.</div>
                  </div>
                </div>
                {restoreStatus==='ok'&&<div style={{color:'var(--success)',fontWeight:600,fontSize:'.82rem'}}>✅ Restauration réussie — rechargement en cours…</div>}
                {restoreStatus==='err'&&<div style={{color:'var(--danger)',fontWeight:600,fontSize:'.82rem'}}>❌ Fichier invalide ou corrompu.</div>}
                <label style={{display:'inline-flex',alignItems:'center',gap:'.5rem',padding:'.46rem .9rem',borderRadius:'var(--r-s)',border:'1px solid var(--border)',background:'var(--surface)',cursor:'pointer',fontSize:'.77rem',fontWeight:500,width:'fit-content',transition:'all .15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.background='var(--surface2)';}}
                  onMouseLeave={e=>{e.currentTarget.style.background='var(--surface)';}}>
                  📂 Choisir un fichier .json
                  <input type="file" accept="application/json" style={{display:'none'}} onChange={e=>importBackup(e.target.files[0])}/>
                </label>
              </div>

              {/* Note PDF */}
              <div style={{fontSize:'.72rem',color:'var(--text3)',display:'flex',alignItems:'flex-start',gap:'.4rem',padding:'.55rem .75rem',background:'var(--surface2)',borderRadius:'var(--r-xs)',border:'1px solid var(--border)'}}>
                <span>📚</span>
                <span>Les <strong>manuels PDF</strong> sont stockés dans IndexedDB et non inclus dans ce fichier. Conservez vos PDF sur clé USB et réimportez-les via le module Manuel après restauration.</span>
              </div>

            </div>
          </div>
        </div>
      )}

      {/* SIDEBAR */}
      <div className={`sidebar ${collapsed?'collapsed':''}`}>
        {/* Logo + theme toggle */}
        <div className="sb-logo">
          <div className="sb-logo-icon" dangerouslySetInnerHTML={{__html:LOGO_SVG}}/>
          <div className="sb-logo-text">ClassPro</div>
          <button className="sb-theme-btn" onClick={toggleTheme}
            data-tip={theme==='light'?'Mode sombre':'Mode clair'}
            title={theme==='light'?'Mode sombre':'Mode clair'}>
            {theme==='light'?'🌙':'☀️'}
          </button>
        </div>

        {/* Nav with collapsible sections */}
        <div className="sb-nav">
          {sections.map(sec=>{
            const isOpen=openSections[sec]!==false;
            return(
              <React.Fragment key={sec}>
                <div className="sb-section-hd" onClick={()=>toggleSection(sec)}>
                  <span>{sec}</span>
                  <span className={`sb-section-arrow ${isOpen?'open':''}`}>▶</span>
                </div>
                {isOpen&&NAV.filter(n=>n.section===sec).map(n=>(
                  <button key={n.id} className={`sb-item ${module===n.id?'on':''}`} onClick={()=>setModule(n.id)} title={collapsed?n.label:undefined}>
                    <span className="sb-item-icon">{n.icon}</span>
                    <span className="sb-item-label">{n.label}</span>
                  </button>
                ))}
              </React.Fragment>
            );
          })}
        </div>

        {/* Footer */}
        <div className="sb-footer">
          <div className="sb-profile" title={collapsed?`${profile.prenom} ${profile.nom}`:undefined} onClick={openEditProfile} style={{cursor:'pointer'}}>
            <div className="sb-avatar">{initials}</div>
            <div className="sb-profile-name">{profile.prenom} {profile.nom}</div>
          </div>
          {installReady&&<button className="sb-item" onClick={doInstall} title={collapsed?'Installer':undefined}>
            <span className="sb-item-icon">📲</span>
            <span className="sb-item-label">Installer l'app</span>
          </button>}
          <button className="sb-collapse" onClick={()=>setCollapsed(c=>!c)} title={collapsed?'Étendre':'Réduire'}>
            {collapsed?'→':'←'}
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main-area">
        {module==='dashboard'   &&<Dashboard profile={profile} onNav={setModule}/>}
        {module==='conseil'     &&<ConseilModule profile={profile}/>}
        {module==='suivi'       &&<SuiviClasse/>}
        {module==='cahier'      &&<CahierSeance/>}
        {module==='rencontres'  &&<RencontreParents onNav={setModule}/>}
        {module==='plan'        &&<PlanClasse onNav={setModule}/>}
        {module==='progression' &&<ProgressionAnnuelle profile={profile}/>}
        {module==='whiteboard'  &&<TableauBlanc/>}
        {module==='doc'         &&<EtudeDocument/>}
        {module==='edt'         &&<EmploiDuTemps/>}
        {module==='reunions'    &&<ReunionsModule/>}
        {module==='liens'       &&<LiensRaccourcis/>}
        {module==='manuel'      &&<ManuelPDF/>}

        {/* FOOTER */}
        {/* ABOUT MODAL */}
        {showAbout&&(
          <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowAbout(false)}>
            <div className="modal" style={{maxWidth:520,overflowY:'auto'}}>
              {/* Header gradient */}
              <div style={{background:'linear-gradient(135deg,#0f1b4d 0%,#1e3a8a 40%,#3b5bdb 70%,#7c3aed 100%)',padding:'1.75rem 1.75rem 1.4rem',position:'relative'}}>
                <button className="close-btn" onClick={()=>setShowAbout(false)}
                  style={{position:'absolute',top:'1rem',right:'1rem',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.2)',color:'#fff'}}>×</button>
                <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
                  <div style={{width:54,height:60,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}} dangerouslySetInnerHTML={{__html:LOGO_SVG_LG}}/>
                  <div>
                    <div style={{fontFamily:'Roboto Slab,serif',fontSize:'1.35rem',fontWeight:800,color:'#fff',letterSpacing:'-.02em',lineHeight:1.2}}>ClassPro</div>
                    <div style={{fontSize:'.78rem',color:'rgba(255,255,255,.65)',marginTop:'.2rem'}}>Logiciel de gestion de classe · v0.9</div>
                  </div>
                </div>
                <p style={{marginTop:'1rem',fontSize:'.82rem',color:'rgba(255,255,255,.78)',lineHeight:1.65}}>
                  Outil de gestion pédagogique conçu pour les enseignants — bulletins, suivi de classe, carnet de bord, plan de classe, progressions, emploi du temps et plus encore. Tout fonctionne localement, sans serveur, sans connexion obligatoire.
                </p>
              </div>

              {/* Body */}
              <div style={{padding:'1.25rem 1.75rem',display:'flex',flexDirection:'column',gap:'1rem'}}>

                {/* Auteur */}
                <div style={{display:'flex',alignItems:'center',gap:.875+'rem',padding:'.875rem 1rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r)'}}>
                  <div style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,#3b5bdb,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',fontWeight:800,color:'#fff',flexShrink:0,fontFamily:'Roboto Slab,serif'}}>LL</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:'.9rem'}}>Lucas Le Coadou</div>
                    <div style={{fontSize:'.73rem',color:'var(--text2)',marginTop:'.08rem'}}>Professeur d'Espagnol · Collège Alfred Crouzet, Servian</div>
                    <div style={{fontSize:'.73rem',color:'var(--text2)'}}>Développeur de ClassPro</div>
                  </div>
                </div>

                {/* Infos */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.6rem'}}>
                  <div style={{padding:'.65rem .875rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)'}}>
                    <div style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.28rem'}}>Matière</div>
                    <div style={{display:'flex',alignItems:'center',gap:'.38rem',fontSize:'.82rem',fontWeight:600}}>🇪🇸 Espagnol</div>
                  </div>
                  <div style={{padding:'.65rem .875rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)'}}>
                    <div style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.28rem'}}>Établissement</div>
                    <div style={{display:'flex',alignItems:'center',gap:'.38rem',fontSize:'.82rem',fontWeight:600}}>🏫 Collège Alfred Crouzet</div>
                    <div style={{fontSize:'.67rem',color:'var(--text3)'}}>Servian</div>
                  </div>
                  <div style={{padding:'.65rem .875rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)'}}>
                    <div style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.28rem'}}>Contact</div>
                    <a href="mailto:lucas.le-coadou@ac-montpellier.fr"
                      style={{display:'flex',alignItems:'center',gap:'.38rem',fontSize:'.78rem',fontWeight:600,color:'var(--accent)',textDecoration:'none',wordBreak:'break-all'}}>
                      ✉️ lucas.le-coadou@ac-montpellier.fr
                    </a>
                  </div>
                  <div style={{padding:'.65rem .875rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)'}}>
                    <div style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.28rem'}}>GitHub</div>
                    <div style={{display:'flex',alignItems:'center',gap:'.38rem',fontSize:'.78rem',color:'var(--text3)',fontStyle:'italic'}}>
                      🔧 Bientôt disponible
                    </div>
                  </div>
                </div>

                {/* Modules */}
                <div>
                  <div style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.45rem'}}>Modules disponibles</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'.28rem'}}>
                    {NAV.map(n=>(
                      <span key={n.id} style={{display:'inline-flex',alignItems:'center',gap:'.25rem',padding:'.2rem .55rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:99,fontSize:'.7rem',fontWeight:500,color:'var(--text2)'}}>
                        {n.icon} {n.label}
                      </span>
                    ))}
                  </div>
                </div>

                {/* Feedback */}
                <FeedbackBlock/>

                {/* Footer légal */}
                <div style={{borderTop:'1px solid var(--border)',paddingTop:'.75rem',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'.67rem',color:'var(--text3)'}}>
                  <span>© {new Date().getFullYear()} Lucas Le Coadou · Tous droits réservés</span>
                  <span>Données stockées localement</span>
                </div>
              </div>
            </div>
          </div>
        )}

        <div className="app-footer">
          <div className="footer-left">
            <span>© {new Date().getFullYear()}</span>
            <strong style={{color:'var(--text2)',cursor:'pointer',textDecoration:'underline dotted',textUnderlineOffset:3}} onClick={()=>setShowAbout(true)} title="À propos de ClassPro">Lucas Le Coadou</strong>
            <span style={{color:'var(--border)'}}>·</span>
            <span style={{cursor:'pointer',textDecoration:'underline dotted',textUnderlineOffset:3}} onClick={()=>setShowAbout(true)} title="À propos de ClassPro">ClassPro — Logiciel de gestion de classe</span>
            <span style={{color:'var(--border)'}}>·</span>
            <span>Tous droits réservés</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'.65rem'}}>
            <button onClick={exportBackup}
              style={{display:'flex',alignItems:'center',gap:'.32rem',padding:'.28rem .75rem',borderRadius:'var(--r-xs)',border:'1px solid var(--accent)',background:'var(--accent)',color:'#fff',fontFamily:'Roboto,sans-serif',fontSize:'.68rem',fontWeight:700,cursor:'pointer',transition:'all .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.opacity='.85';}}
              onMouseLeave={e=>{e.currentTarget.style.opacity='1';}}>
              💾 Sauvegarder mon JSON
            </button>
            <button onClick={()=>setShowBackup(true)}
              style={{display:'flex',alignItems:'center',gap:'.32rem',padding:'.28rem .65rem',borderRadius:'var(--r-xs)',border:'1px solid var(--border)',background:'var(--surface2)',color:'var(--text2)',fontFamily:'Roboto,sans-serif',fontSize:'.68rem',fontWeight:600,cursor:'pointer',transition:'all .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--text2)';e.currentTarget.style.color='var(--text)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text2)';}}>
              ⚙️ Options
            </button>
            <span style={{color:'var(--text3)'}}>v0.6.6 · {profile?.etablissement||'Collège Alfred Crouzet'}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<Shell/>,document.getElementById('root'));
</script>
</body>
</html>

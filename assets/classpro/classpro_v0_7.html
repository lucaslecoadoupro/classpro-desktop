function WbTimer({w, update}){
  const[running,setRunning]=useState(false);
  const[secs,setSecs]=useState(w.secs??600);
  const intervalRef=useRef(null);
  useEffect(()=>{
    if(running){
      intervalRef.current=setInterval(()=>{
        setSecs(s=>{if(s<=1){clearInterval(intervalRef.current);setRunning(false);return 0;}return s-1;});
      },1000);
    } else clearInterval(intervalRef.current);
    return()=>clearInterval(intervalRef.current);
  },[running]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const adj=(unit,delta)=>setSecs(s=>{
    const m=Math.floor(s/60),sec=s%60;
    if(unit==='m')return Math.max(0,Math.min(5999,(m+delta)*60+sec));
    return Math.max(0,Math.min(5999,m*60+(sec+delta)));
  });
  const pct=secs>0?(secs/(w.secs||600)):0;
  const warn=secs>0&&secs<=60;
  const color=secs===0?'#dc2626':warn?'#d97706':'var(--accent)';
  return(
    <div style={{textAlign:'center',minWidth:200}}>
      <div className="wb2-timer-display" style={{color}}>{fmt(secs)}</div>
      <div style={{display:'flex',justifyContent:'center',gap:4,marginTop:8}}>
        {[['−1m','m',-1],['−10s','s',-10],['+10s','s',10],['+1m','m',1]].map(([l,u,d])=>(
          <button key={l} className="wb2-timer-adj-btn" onClick={()=>adj(u,d)}>{l}</button>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:10}}>
        <button className="wb2-timer-btn" style={{background:running?'#fef2f2':'#f0fdf4',color:running?'#dc2626':'#16a34a'}}
          onClick={()=>setRunning(r=>!r)}>{running?'⏸':'▶'}</button>
        <button className="wb2-timer-btn" style={{background:'var(--surface2)',color:'var(--text2)'}}
          onClick={()=>{setRunning(false);setSecs(w.secs||600);}}>↺</button>
      </div>
      {/* Barre de progression */}
      <div style={{marginTop:8,height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct*100}%`,background:color,transition:'width .5s linear,background .3s'}}/>
      </div>
    </div>
  );
}

function WbClock(){
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();
  const hd=(h+m/60)*30, md=(m+s/60)*6, sd=s*6;
  const hand=(deg,len,w,col)=>{
    const rad=(deg-90)*Math.PI/180;
    return <line x1="50" y1="50" x2={50+len*Math.cos(rad)} y2={50+len*Math.sin(rad)} stroke={col} strokeWidth={w} strokeLinecap="round"/>;
  };
  return(
    <div style={{textAlign:'center',width:'100%'}}>
      {/* SVG 100% width — s'adapte au resize du widget */}
      <svg viewBox="0 0 100 100" style={{display:'block',width:'100%',maxWidth:200,margin:'0 auto'}}>
        <circle cx="50" cy="50" r="47" fill="none" stroke="var(--accent)" strokeWidth="2.5"/>
        {[...Array(12)].map((_,i)=>{const a=(i*30-90)*Math.PI/180;return<line key={i} x1={50+38*Math.cos(a)} y1={50+38*Math.sin(a)} x2={50+44*Math.cos(a)} y2={50+44*Math.sin(a)} stroke="var(--text2)" strokeWidth={i%3===0?2:1}/>;})}
        {hand(hd,28,3,'var(--text)')}
        {hand(md,38,2,'var(--text)')}
        {hand(sd,40,1,'#dc2626')}
        <circle cx="50" cy="50" r="2.5" fill="var(--text)"/>
      </svg>
      <div className="wb2-clock-time">{now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
    </div>
  );
}

function WbTirage({classes}){
  const[picked,setPicked]=useState('');
  const[spinning,setSpinning]=useState(false);
  const[selCls,setSelCls]=useState('');
  const allEleves=selCls
    ?(classes.find(c=>c.id===selCls)?.eleves||[])
    :classes.flatMap(c=>c.eleves);
  const pick=()=>{
    if(!allEleves.length)return;
    setSpinning(true);
    let i=0;const t=setInterval(()=>{
      setPicked(allEleves[Math.floor(Math.random()*allEleves.length)].nom);
      if(++i>14){clearInterval(t);setSpinning(false);}
    },80);
  };
  return(
    <div style={{width:'100%',textAlign:'center',boxSizing:'border-box'}}>
      {classes.length>1&&(
        <select value={selCls} onChange={e=>setSelCls(e.target.value)}
          style={{width:'100%',marginBottom:8,padding:'.3rem .5rem',border:'1px solid var(--border)',borderRadius:6,background:'var(--surface2)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.75rem',boxSizing:'border-box'}}>
          <option value="">Toutes les classes ({classes.flatMap(c=>c.eleves).length} élèves)</option>
          {classes.map(c=><option key={c.id} value={c.id}>{c.name} ({c.eleves.length})</option>)}
        </select>
      )}
      {/* Nom tiré */}
      <div style={{minHeight:56,display:'flex',alignItems:'center',justifyContent:'center',margin:'6px 0',padding:'8px 12px',background:'rgba(59,91,219,.06)',borderRadius:10,border:'1.5px solid rgba(59,91,219,.15)'}}>
        {picked
          ?<span style={{fontFamily:'Roboto Slab,serif',fontSize:'1.4rem',fontWeight:800,color:spinning?'var(--warning)':'var(--accent)',transition:'color .2s'}}>{picked}</span>
          :<span style={{color:'var(--text3)',fontSize:'.82rem'}}>Appuyez sur le bouton !</span>}
      </div>
      {/* Bouton */}
      <button onClick={pick} disabled={!allEleves.length||spinning}
        style={{display:'inline-flex',alignItems:'center',gap:6,padding:'.5rem 1.2rem',border:'none',borderRadius:99,background:spinning?'var(--warning)':'var(--accent)',color:'#fff',fontFamily:'Roboto,sans-serif',fontSize:'.85rem',fontWeight:700,cursor:allEleves.length&&!spinning?'pointer':'not-allowed',transition:'all .2s',boxShadow:'0 2px 8px rgba(59,91,219,.3)',opacity:!allEleves.length?.5:1}}>
        <span style={{fontSize:'1rem'}}>{spinning?'⏳':'🎲'}</span>
        {spinning?'Tirage…':'Tirer au sort'}
      </button>
      {allEleves.length===0&&<div style={{fontSize:'.72rem',color:'var(--text3)',marginTop:6}}>Aucun élève trouvé</div>}
    </div>
  );
}

function WbNoise({w, update}){
  const[level,setLevel]=useState(w.noiseLevel??50);
  const getColor=(v)=>{
    // 0=vert, 50=orange, 100=rouge
    if(v<=50){
      const t=v/50;
      const r=Math.round(34+t*(251-34));
      const g=Math.round(197+t*(146-197));
      const b=Math.round(94+t*(14-94));
      return `rgb(${r},${g},${b})`;
    } else {
      const t=(v-50)/50;
      const r=Math.round(251+t*(220-251));
      const g=Math.round(146+t*(38-146));
      const b=Math.round(14+t*(38-14));
      return `rgb(${r},${g},${b})`;
    }
  };
  const color=getColor(level);
  const emoji=level<=25?'🟢':level<=50?'🟡':level<=75?'🟠':'🔴';
  const label=level<=25?'Silence':level<=50?'Murmures':level<=75?'Agité':'Très bruyant';
  const handleChange=(v)=>{
    setLevel(v);
    update({noiseLevel:v});
  };
  return(
    <div style={{textAlign:'center',padding:'4px 8px',minWidth:200}}>
      {/* Indicateur visuel */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:10}}>
        <span style={{fontSize:'1.8rem'}}>{emoji}</span>
        <div>
          <div style={{fontFamily:'Roboto Slab,serif',fontSize:'1.5rem',fontWeight:800,color,lineHeight:1}}>{level}</div>
          <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em'}}>{label}</div>
        </div>
      </div>
      {/* Barre de niveau */}
      <div style={{height:10,borderRadius:5,background:'linear-gradient(to right,#22c55e,#f59e0b,#ef4444)',marginBottom:10,position:'relative',boxShadow:'inset 0 1px 3px rgba(0,0,0,.15)'}}>
        <div style={{position:'absolute',left:`${level}%`,top:'50%',transform:'translate(-50%,-50%)',width:18,height:18,borderRadius:'50%',background:'#fff',border:`3px solid ${color}`,boxShadow:'0 2px 6px rgba(0,0,0,.25)',transition:'left .1s,border-color .2s'}}/>
      </div>
      {/* Slider */}
      <input type="range" min={0} max={100} value={level}
        onChange={e=>handleChange(parseInt(e.target.value))}
        onMouseDown={e=>e.stopPropagation()}
        style={{width:'100%',accentColor:color,cursor:'pointer',margin:'2px 0 6px'}}/>
      {/* Boutons rapides */}
      <div style={{display:'flex',gap:4,justifyContent:'center'}}>
        {[{v:0,l:'🟢',t:'Silence'},{v:33,l:'🟡',t:'Murmures'},{v:66,l:'🟠',t:'Agité'},{v:100,l:'🔴',t:'Bruyant'}].map(btn=>(
          <button key={btn.v} onClick={()=>handleChange(btn.v)}
            style={{flex:1,padding:'3px 2px',borderRadius:5,border:`1.5px solid ${Math.abs(level-btn.v)<20?color:'var(--border)'}`,background:Math.abs(level-btn.v)<20?`${color}22`:'var(--surface2)',cursor:'pointer',fontSize:'.62rem',fontWeight:600,color:'var(--text2)',fontFamily:'Roboto,sans-serif',transition:'all .15s'}}>
            {btn.l}<br/><span style={{fontSize:'.55rem',opacity:.8}}>{btn.t}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function TableauBlanc(){
  const stageRef=useRef(null);
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const[widgets,setWidgets]=useState(()=>{try{const s=localStorage.getItem('wb-widgets');return s?JSON.parse(s):[];}catch{return[];}});
  const[bgId,setBgId]=useState(()=>localStorage.getItem('wb-bgId')||'white');
  const[selId,setSelId]=useState(null);
  const dragRef=useRef(null);

  // Persister à chaque changement
  useEffect(()=>{try{localStorage.setItem('wb-widgets',JSON.stringify(widgets));}catch{};},[widgets]);
  useEffect(()=>{localStorage.setItem('wb-bgId',bgId);},[bgId]);

  const bg=WB_BACKGROUNDS.find(b=>b.id===bgId)||WB_BACKGROUNDS[0];

  const addWidget=(type)=>{
    const stage=stageRef.current;
    const cx=stage?stage.clientWidth/2-100:200;
    const cy=stage?stage.clientHeight/2-80:150;
    const base={id:newWid(),x:cx,y:cy,width:240,type};
    const defs={
      texte:  {label:'Texte',    icon:'📝', txt:'',fontSize:18,bold:false,color:'#1a2236'},
      timer:  {label:'Minuteur', icon:'⏱️', secs:600},
      clock:  {label:'Horloge',  icon:'🕐'},
      tirage: {label:'Tirage',   icon:'🎲'},
      qr:     {label:'QR Code',  icon:'📱', url:''},
      feu:    {label:'Feu',      icon:'🚦', width:120, height:220},
      bruit:  {label:'Bruit',   icon:'🔊', width:240, height:200, noiseLevel:0},
    };
    setWidgets(w=>[...w,{...base,...defs[type]}]);
    setSelId(base.id);
  };

  const closeWidget=id=>setWidgets(w=>w.filter(x=>x.id!==id));
  const updateWidget=(id,patch)=>setWidgets(w=>w.map(x=>x.id===id?{...x,...patch}:x));

  // Drag
  const onDragStart=(e,w)=>{
    e.preventDefault();
    const startX=e.clientX,startY=e.clientY,ox=w.x,oy=w.y;
    setSelId(w.id);
    const move=ev=>{
      updateWidget(w.id,{x:ox+(ev.clientX-startX),y:oy+(ev.clientY-startY)});
    };
    const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  };

  // Resize
  const onResizeStart=(e,w)=>{
    e.preventDefault();e.stopPropagation();
    const startX=e.clientX,startY=e.clientY,ow=w.width,oh=w.height||200;
    const move=ev=>{
      updateWidget(w.id,{
        width:Math.max(160,ow+(ev.clientX-startX)),
        height:Math.max(80,oh+(ev.clientY-startY)),
      });
    };
    const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  };

  const BTNS=[
    {type:'texte',  icon:'📝', label:'Texte'},
    {type:'timer',  icon:'⏱️', label:'Minuteur'},
    {type:'clock',  icon:'🕐', label:'Horloge'},
    {type:'tirage', icon:'🎲', label:'Tirage'},
    {type:'qr',     icon:'📱', label:'QR Code'},
    {type:'feu',    icon:'🚦', label:'Feu'},
    {type:'bruit',  icon:'🔊', label:'Bruit'},
  ];

  const renderBody=(w)=>{
    if(w.type==='texte')  return <WbTexte  w={w} update={p=>updateWidget(w.id,p)}/>;
    if(w.type==='timer')  return <WbTimer  w={w} update={p=>updateWidget(w.id,p)}/>;
    if(w.type==='clock')  return <WbClock/>;
    if(w.type==='tirage') return <WbTirage classes={classes}/>;
    if(w.type==='qr')     return <WbQR     w={w} update={p=>updateWidget(w.id,p)}/>;
    if(w.type==='feu')    return <WbFeu/>;
    if(w.type==='bruit')  return <WbNoise w={w} update={p=>updateWidget(w.id,p)}/>;
    return null;
  };

  const exportPng=()=>{
    const stage=stageRef.current;
    if(!stage)return;
    // Masquer temporairement la toolbar et le picker pour l'export
    const bar=stage.querySelector('.wb2-bar');
    const picker=stage.querySelector('.wb2-bg-picker');
    const handles=stage.querySelectorAll('.wb2-resize');
    [bar,picker,...handles].forEach(el=>{if(el)el.style.visibility='hidden';});
    html2canvas(stage,{backgroundColor:null,scale:2,useCORS:true,logging:false}).then(canvas=>{
      [bar,picker,...handles].forEach(el=>{if(el)el.style.visibility='';});
      const a=document.createElement('a');
      a.href=canvas.toDataURL('image/png');
      a.download=`tableau-blanc-${new Date().toISOString().slice(0,10)}.png`;
      a.click();
    }).catch(()=>{[bar,picker,...handles].forEach(el=>{if(el)el.style.visibility='';});});
  };

  return(
    <>
      <div className="page-hd">
        <div><div className="phd-badge">🖊️ Tableau blanc</div><div className="phd-title">Tableau interactif</div>
          <div className="phd-sub">{widgets.length} widget{widgets.length>1?'s':''} · cliquez les boutons ci-dessous pour ajouter</div>
        </div>
        <div className="phd-actions">
          <button className="btn btn-ghost" onClick={exportPng}>🖼️ Exporter PNG</button>
          <button className="btn btn-ghost" onClick={()=>setWidgets([])}>🗑️ Tout effacer</button>
        </div>
      </div>
      <div className="wb2-root">
        <div ref={stageRef} className="wb2-stage" onClick={()=>setSelId(null)}>
          {/* Fond */}
          <div className="wb2-bg" style={bg.style}/>
          {/* Picker fond */}
          <div className="wb2-bg-picker">
            <span style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginRight:2}}>Fond</span>
            {WB_BACKGROUNDS.map(b=>(
              <div key={b.id} className={`wb2-bg-swatch${bgId===b.id?' on':''}`}
                style={{...b.style,border:'2px solid '+(bgId===b.id?'var(--accent)':'rgba(0,0,0,.18)'),boxShadow:bgId===b.id?'0 0 0 1px var(--accent)':undefined}}
                title={b.label} onClick={()=>setBgId(b.id)}/>
            ))}
          </div>
          {/* Widgets */}
          {widgets.map(w=>(
            <WbWidget key={w.id} w={w} selected={selId===w.id}
              onClick={()=>setSelId(w.id)}
              onClose={closeWidget}
              onMouseDownDrag={onDragStart}
              onMouseDownResize={onResizeStart}>
              {renderBody(w)}
            </WbWidget>
          ))}
          {widgets.length===0&&(
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
              <div style={{textAlign:'center',color:'rgba(150,150,170,.5)'}}>
                <div style={{fontSize:'3rem',marginBottom:'.5rem'}}>🖊️</div>
                <div style={{fontSize:'1rem',fontWeight:700}}>Tableau vide</div>
                <div style={{fontSize:'.82rem',marginTop:'.3rem'}}>Ajoutez des widgets depuis la barre ci-dessous</div>
              </div>
            </div>
          )}
          {/* Toolbar bas */}
          <div className="wb2-bar">
            {BTNS.map(({type,icon,label})=>(
              <button key={type} className="wb2-bar-btn" onClick={()=>addWidget(type)}>
                <span className="wb2-bar-btn-icon">{icon}</span>
                <span className="wb2-bar-btn-label">{label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

/* ══ MODULE 3 — ÉTUDE DE DOCUMENT ═══════════════════════════════════════ */
function EtudeDocument(){
  const[file,setFile]=useState(null);
  const[pageNum,setPageNum]=useState(1);
  const[numPages,setNumPages]=useState(0);
  const[scale,setScale]=useState(1.4);
  const[activeTool,setActiveTool]=useState(null); // null | 'highlight' | 'text' | 'pen' | 'arrow' | 'rect'
  const[activeColor,setActiveColor]=useState('#fde047');
  const[annotations,setAnnotations]=useState([]);
  const[pendingText,setPendingText]=useState(null);
  const[panelOpen,setPanelOpen]=useState(true);
  const cvRef=useRef(null);
  const acRef=useRef(null);
  const pdfRef=useRef(null);
  const dragRef=useRef(null);
  const fileKeyRef=useRef(null); // clé localStorage pour persister les annotations

  const COLORS=['#fde047','#fb923c','#f87171','#86efac','#67e8f9','#c4b5fd'];
  const TOOLS=[
    {id:'highlight', icon:'🖌️', label:'Surligner'},
    {id:'pen',       icon:'✏️', label:'Crayon'},
    {id:'arrow',     icon:'↗️', label:'Flèche'},
    {id:'rect',      icon:'⬜', label:'Rectangle'},
    {id:'text',      icon:'T',  label:'Texte'},
  ];

  // Persistance : charger les annotations au changement de fichier
  const loadAnnotations=(key)=>{
    try{const s=localStorage.getItem('doc-annot-'+key);return s?JSON.parse(s):[];}catch{return[];}
  };
  const saveAnnotations=(key,annots)=>{
    try{localStorage.setItem('doc-annot-'+key,JSON.stringify(annots));}catch{}
  };

  const renderPage=useCallback(async(pdf,num,sc)=>{
    if(!pdf)return;
    const page=await pdf.getPage(num);
    const vp=page.getViewport({scale:sc});
    const c=cvRef.current;if(!c)return;
    c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    const ac=acRef.current;if(ac){ac.width=vp.width;ac.height=vp.height;}
  },[]);

  const redraw=useCallback((annots,page)=>{
    const ac=acRef.current;if(!ac)return;
    const ctx=ac.getContext('2d');ctx.clearRect(0,0,ac.width,ac.height);
    (annots||[]).filter(a=>a.page===page).forEach(a=>{
      ctx.save();
      if(a.type==='highlight'){
        ctx.globalAlpha=.42;ctx.fillStyle=a.color;
        ctx.fillRect(a.x,a.y,a.w,a.h);
      } else if(a.type==='rect'){
        ctx.strokeStyle=a.color;ctx.lineWidth=2.5;ctx.globalAlpha=.85;
        ctx.strokeRect(a.x,a.y,a.w,a.h);
      } else if(a.type==='pen'&&a.pts?.length>1){
        ctx.strokeStyle=a.color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.globalAlpha=.9;
        ctx.beginPath();ctx.moveTo(a.pts[0].x,a.pts[0].y);
        a.pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
      } else if(a.type==='arrow'){
        ctx.strokeStyle=a.color;ctx.fillStyle=a.color;ctx.lineWidth=2.5;ctx.globalAlpha=.9;
        const dx=a.x2-a.x1,dy=a.y2-a.y1,len=Math.sqrt(dx*dx+dy*dy);
        if(len<4){ctx.restore();return;}
        const ux=dx/len,uy=dy/len,hw=10,hh=6;
        ctx.beginPath();ctx.moveTo(a.x1,a.y1);ctx.lineTo(a.x2-ux*hw,a.y2-uy*hw);ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(a.x2,a.y2);
        ctx.lineTo(a.x2-ux*hw-uy*hh,a.y2-uy*hw+ux*hh);
        ctx.lineTo(a.x2-ux*hw+uy*hh,a.y2-uy*hw-ux*hh);
        ctx.closePath();ctx.fill();
      } else if(a.type==='text'){
        ctx.font=`bold 15px Roboto,sans-serif`;ctx.fillStyle=a.color;ctx.globalAlpha=.95;
        ctx.fillText(a.text,a.x,a.y);
      }
      ctx.restore();
    });
  },[]);

  useEffect(()=>{
    if(pdfRef.current) renderPage(pdfRef.current,pageNum,scale).then(()=>redraw(annotations,pageNum));
  },[pageNum,scale]);
  useEffect(()=>redraw(annotations,pageNum),[annotations,pageNum]);

  const loadFile=async f=>{
    const key=f.name+'_'+f.size;
    fileKeyRef.current=key;
    setFile(f);
    const loaded=loadAnnotations(key);
    setAnnotations(loaded);
    if(f.type==='application/pdf'){
      const buf=await f.arrayBuffer();
      const pdf=await pdfjsLib.getDocument(buf).promise;
      pdfRef.current=pdf;setNumPages(pdf.numPages);setPageNum(1);
      await renderPage(pdf,1,scale);
      setTimeout(()=>redraw(loaded,1),50);
    }else{
      pdfRef.current=null;setNumPages(1);setPageNum(1);
      const img=new Image();
      img.onload=()=>{
        const c=cvRef.current;if(!c)return;
        c.width=img.width;c.height=img.height;
        c.getContext('2d').drawImage(img,0,0);
        const ac=acRef.current;if(ac){ac.width=img.width;ac.height=img.height;}
        setTimeout(()=>redraw(loaded,1),50);
      };
      img.src=URL.createObjectURL(f);
    }
  };

  const addAnnot=(a)=>{
    const next=[...annotations,{...a,id:Date.now().toString(),page:pageNum,color:activeColor}];
    setAnnotations(next);
    if(fileKeyRef.current) saveAnnotations(fileKeyRef.current,next);
  };
  const delAnnot=(id)=>{
    const next=annotations.filter(a=>a.id!==id);
    setAnnotations(next);
    if(fileKeyRef.current) saveAnnotations(fileKeyRef.current,next);
  };
  const clearPage=()=>{
    const next=annotations.filter(a=>a.page!==pageNum);
    setAnnotations(next);
    if(fileKeyRef.current) saveAnnotations(fileKeyRef.current,next);
  };

  const getAPos=e=>{
    const ac=acRef.current;if(!ac)return{x:0,y:0};
    const r=ac.getBoundingClientRect();
    return{x:(e.clientX-r.left)*(ac.width/r.width),y:(e.clientY-r.top)*(ac.height/r.height)};
  };

  const onDown=e=>{
    if(!activeTool)return;
    const pos=getAPos(e);
    if(activeTool==='text'){setPendingText({x:pos.x,y:pos.y,text:''});return;}
    if(activeTool==='highlight'||activeTool==='rect')  dragRef.current={sx:pos.x,sy:pos.y,x:pos.x,y:pos.y};
    if(activeTool==='pen')   dragRef.current={pts:[pos]};
    if(activeTool==='arrow') dragRef.current={x1:pos.x,y1:pos.y,x2:pos.x,y2:pos.y};
  };
  const onMove=e=>{
    if(!dragRef.current)return;
    const pos=getAPos(e);
    const ac=acRef.current;if(!ac)return;
    const ctx=ac.getContext('2d');
    if(activeTool==='highlight'||activeTool==='rect'){
      const d=dragRef.current;dragRef.current={...d,x:pos.x,y:pos.y};
      redraw(annotations,pageNum);
      ctx.save();ctx.globalAlpha=activeTool==='highlight'?.35:.7;
      ctx.strokeStyle=activeColor;ctx.fillStyle=activeColor;ctx.lineWidth=2;
      if(activeTool==='highlight') ctx.fillRect(Math.min(d.sx,pos.x),Math.min(d.sy,pos.y),Math.abs(pos.x-d.sx),Math.abs(pos.y-d.sy));
      else ctx.strokeRect(Math.min(d.sx,pos.x),Math.min(d.sy,pos.y),Math.abs(pos.x-d.sx),Math.abs(pos.y-d.sy));
      ctx.restore();
    } else if(activeTool==='pen'){
      dragRef.current={pts:[...dragRef.current.pts,pos]};
      ctx.save();ctx.strokeStyle=activeColor;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.globalAlpha=.9;
      const pts=dragRef.current.pts;const l=pts.length;
      if(l>=2){ctx.beginPath();ctx.moveTo(pts[l-2].x,pts[l-2].y);ctx.lineTo(pos.x,pos.y);ctx.stroke();}
      ctx.restore();
    } else if(activeTool==='arrow'){
      dragRef.current={...dragRef.current,x2:pos.x,y2:pos.y};
      redraw(annotations,pageNum);
      // Preview flèche
      const d=dragRef.current;
      const dx=d.x2-d.x1,dy=d.y2-d.y1,len=Math.sqrt(dx*dx+dy*dy);
      if(len>4){
        const ux=dx/len,uy=dy/len,hw=10,hh=6;
        ctx.save();ctx.strokeStyle=activeColor;ctx.fillStyle=activeColor;ctx.lineWidth=2.5;ctx.globalAlpha=.8;
        ctx.beginPath();ctx.moveTo(d.x1,d.y1);ctx.lineTo(d.x2-ux*hw,d.y2-uy*hw);ctx.stroke();
        ctx.beginPath();ctx.moveTo(d.x2,d.y2);ctx.lineTo(d.x2-ux*hw-uy*hh,d.y2-uy*hw+ux*hh);ctx.lineTo(d.x2-ux*hw+uy*hh,d.y2-uy*hw-ux*hh);ctx.closePath();ctx.fill();
        ctx.restore();
      }
    }
  };
  const onUp=()=>{
    if(!dragRef.current)return;
    const d=dragRef.current;dragRef.current=null;
    if(activeTool==='highlight'){
      const rw=Math.abs(d.x-d.sx),rh=Math.abs(d.y-d.sy);
      if(rw>5&&rh>5) addAnnot({type:'highlight',x:Math.min(d.sx,d.x),y:Math.min(d.sy,d.y),w:rw,h:rh});
    } else if(activeTool==='rect'){
      const rw=Math.abs(d.x-d.sx),rh=Math.abs(d.y-d.sy);
      if(rw>5&&rh>5) addAnnot({type:'rect',x:Math.min(d.sx,d.x),y:Math.min(d.sy,d.y),w:rw,h:rh});
    } else if(activeTool==='pen'){
      if(d.pts?.length>2) addAnnot({type:'pen',pts:d.pts});
    } else if(activeTool==='arrow'){
      const len=Math.sqrt((d.x2-d.x1)**2+(d.y2-d.y1)**2);
      if(len>10) addAnnot({type:'arrow',x1:d.x1,y1:d.y1,x2:d.x2,y2:d.y2});
    }
  };
  const saveText=()=>{
    if(!pendingText||!pendingText.text.trim()){setPendingText(null);return;}
    addAnnot({type:'text',x:pendingText.x,y:pendingText.y,text:pendingText.text});
    setPendingText(null);
  };

  const exportPng=()=>{
    const c=cvRef.current,ac=acRef.current;if(!c||!ac)return;
    const out=document.createElement('canvas');out.width=c.width;out.height=c.height;
    const ctx=out.getContext('2d');ctx.drawImage(c,0,0);ctx.drawImage(ac,0,0);
    const a=document.createElement('a');a.href=out.toDataURL('image/png');
    a.download=`doc-annote-p${pageNum}.png`;a.click();
  };

  const pa=annotations.filter(a=>a.page===pageNum);

  const toolIcon={highlight:'🖌️',pen:'✏️',arrow:'↗️',rect:'⬜',text:'T'};

  return(<>
    <div className="page-hd">
      <div>
        <div className="phd-badge">📖 Étude de document</div>
        <div className="phd-title">Annotation de document</div>
        <div className="phd-sub">{file?file.name+' · p.'+pageNum+(numPages>1?'/'+numPages:''):'PDF et images · Surlignage, crayon, flèche, rectangle, texte'}</div>
      </div>
      <div className="phd-actions">
        <label htmlFor="doc-up" className="btn btn-white">📄 Ouvrir</label>
        <input id="doc-up" type="file" accept="application/pdf,image/*" onChange={e=>{const f=e.target.files[0];if(f)loadFile(f);e.target.value='';}}/>
        {file&&<>
          <button onClick={exportPng} className="btn btn-ghost">💾 Exporter PNG</button>
          <button onClick={clearPage} className="btn btn-ghost">🗑️ Effacer page</button>
        </>}
        {numPages>1&&<div style={{display:'flex',alignItems:'center',gap:'.3rem'}}>
          <button onClick={()=>setPageNum(p=>Math.max(1,p-1))} className="btn btn-ghost" disabled={pageNum===1}>◀</button>
          <span style={{color:'rgba(255,255,255,.8)',fontSize:'.78rem',fontWeight:600,minWidth:'46px',textAlign:'center'}}>{pageNum}/{numPages}</span>
          <button onClick={()=>setPageNum(p=>Math.min(numPages,p+1))} className="btn btn-ghost" disabled={pageNum===numPages}>▶</button>
        </div>}
      </div>
    </div>
    {!file?(
      <div className="page-content" style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1}}>
        <label htmlFor="doc-up" style={{textAlign:'center',color:'var(--text2)',cursor:'pointer',padding:'3rem',border:'2px dashed var(--border)',borderRadius:16,transition:'all .15s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.background='rgba(59,91,219,.04)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='transparent';}}>
          <div style={{fontSize:'3rem',marginBottom:'.875rem',opacity:.4}}>📖</div>
          <div style={{fontSize:'.95rem',fontWeight:700,marginBottom:'.4rem'}}>Ouvrir un document</div>
          <div style={{fontSize:'.8rem',color:'var(--text3)'}}>PDF ou image (PNG, JPG…)</div>
        </label>
      </div>
    ):(
      <div className="doc-shell">
        {/* ── Barre d'outils ── */}
        <div className="doc-toolbar">
          {/* Outils */}
          {TOOLS.map(t=>(
            <button key={t.id} className={`doc-tbtn${activeTool===t.id?' on':''}`}
              onClick={()=>setActiveTool(v=>v===t.id?null:t.id)}
              title={t.label}>
              <span style={{fontSize:'.85rem'}}>{t.icon}</span> {t.label}
            </button>
          ))}
          <div className="doc-toolbar-sep"/>
          {/* Couleurs */}
          {COLORS.map(c=>(
            <div key={c} className={`doc-color-sw${activeColor===c?' on':''}`}
              style={{background:c}} onClick={()=>setActiveColor(c)} title={c}/>
          ))}
          <div className="doc-toolbar-sep"/>
          {/* Zoom */}
          <button className="doc-tbtn" onClick={()=>setScale(s=>Math.min(s+.2,3))} title="Zoom +">🔍+</button>
          <button className="doc-tbtn" onClick={()=>setScale(s=>Math.max(s-.2,.4))} title="Zoom −">🔍−</button>
          <div className="doc-toolbar-sep"/>
          {/* Panel toggle */}
          <button className="doc-tbtn" onClick={()=>setPanelOpen(o=>!o)} title="Panneau annotations">
            {panelOpen?'◀ Masquer':'▶ Annotations'} ({pa.length})
          </button>
        </div>
        {/* ── Viewer + Panel ── */}
        <div className="doc-viewer-wrap">
          <div className="doc-viewer-area">
            <div style={{position:'relative',display:'inline-block',userSelect:'none'}}>
              <canvas ref={cvRef} style={{display:'block',boxShadow:'0 4px 24px rgba(0,0,0,.5)'}}/>
              <canvas ref={acRef}
                style={{position:'absolute',top:0,left:0,
                  cursor:activeTool==='text'?'text':activeTool?'crosshair':'default'}}
                onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp}/>
              {pendingText&&(
                <div style={{position:'absolute',left:pendingText.x,top:pendingText.y-18,zIndex:20,display:'flex',flexDirection:'column',gap:4}}>
                  <textarea autoFocus
                    style={{background:'rgba(255,255,255,.97)',border:`2px solid ${activeColor}`,
                      borderRadius:'6px',padding:'.3rem .5rem',font:`bold ${14}px Roboto,sans-serif`,
                      color:activeColor,resize:'both',minWidth:'160px',minHeight:'36px',
                      outline:'none',boxShadow:'0 2px 12px rgba(0,0,0,.25)'}}
                    value={pendingText.text}
                    onMouseDown={e=>e.stopPropagation()}
                    onChange={e=>setPendingText(t=>({...t,text:e.target.value}))}
                    onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveText();}if(e.key==='Escape'){setPendingText(null);}}}
                    placeholder="Tapez votre texte… (Entrée pour valider)"/>
                  <div style={{display:'flex',gap:4}}>
                    <button onMouseDown={e=>e.stopPropagation()} onClick={saveText}
                      style={{flex:1,padding:'2px 8px',border:'none',borderRadius:4,background:activeColor,color:'#fff',cursor:'pointer',fontSize:'.72rem',fontWeight:700}}>
                      ✓ Valider
                    </button>
                    <button onMouseDown={e=>e.stopPropagation()} onClick={()=>setPendingText(null)}
                      style={{padding:'2px 8px',border:'none',borderRadius:4,background:'rgba(0,0,0,.15)',color:'var(--text)',cursor:'pointer',fontSize:'.72rem',fontWeight:700}}>
                      ✕
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
          {/* Panel annotations */}
          {panelOpen&&(
            <div className="doc-panel">
              <div className="doc-panel-hd">
                <span>Annotations — p.{pageNum}</span>
                <span style={{fontWeight:400,color:'var(--text3)'}}>{pa.length}</span>
              </div>
              <div className="annot-list-area">
                {pa.length===0
                  ?<div style={{color:'var(--text3)',fontSize:'.74rem',textAlign:'center',padding:'.875rem',fontStyle:'italic'}}>Aucune annotation sur cette page</div>
                  :pa.map(a=>(
                    <div key={a.id} className="annot-item">
                      <div style={{width:10,height:10,borderRadius:2,background:a.color,flexShrink:0}}/>
                      <span style={{color:'var(--text2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {toolIcon[a.type]||'?'} {a.type==='text'?a.text:a.type==='pen'?'Tracé libre':a.type==='arrow'?'Flèche':a.type==='rect'?'Rectangle':'Surlignage'}
                      </span>
                      <button className="annot-del" onClick={()=>delAnnot(a.id)}>✕</button>
                    </div>
                  ))
                }
              </div>
            </div>
          )}
        </div>
      </div>
    )}
  </>);
}

/* ══ MODULE 4 — EMPLOI DU TEMPS ══════════════════════════════════════════ */

// ── Helpers semaine A/B ──
function getMondayOf(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}
function getWeekType(mondayDate, refMonday){
  // refMonday is a known semaine A monday (Date object)
  const diffMs=mondayDate.getTime()-refMonday.getTime();
  const diffWeeks=Math.round(diffMs/(7*24*60*60*1000));
  return diffWeeks%2===0?'A':'B';
}
function dateForDayOfWeek(monday, dayIdx){
  // dayIdx: 0=Lundi…4=Vendredi
  const d=new Date(monday);
  d.setDate(d.getDate()+dayIdx);
  return d;
}
function fmtDateShort(d){
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function isoDate(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function EmploiDuTemps(){
  const EMPTY_FORM={day:0,startH:8,startM:0,endH:9,endM:0,title:'',teacher:'',room:'',colorIdx:0,weeks:'AB',classId:''};

  const[blocks,setBlocks]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-edt')||'[]')}catch{return[]}});
  const[vacances,setVacances]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-vacances')||'[]')}catch{return[]}});
  const[coursPrep,setCoursPrep]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-cours')||'{}')}catch{return{}}});
  const[joursAnnules,setJoursAnnules]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-jours-annules')||'{}')}catch{return{}}});
  const[coursModal,setCoursModal]=useState(null);
  const[showVacances,setShowVacances]=useState(false);
  const[newVac,setNewVac]=useState({label:'',debut:'',fin:''});
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const[importStatus,setImportStatus]=useState(null);
  const[showImportPreview,setShowImportPreview]=useState(false);
  const[showImportModal,setShowImportModal]=useState(false);

  // Semaine de référence A (lundi) — stockée comme string ISO
  const[refWeekA,setRefWeekA]=useState(()=>{
    const s=localStorage.getItem('cdc-edt-refA');
    if(s)return new Date(s);
    return getMondayOf(new Date());
  });
  // Sync si modifiée depuis le profil
  useEffect(()=>{
    const onStorage=()=>{
      const s=localStorage.getItem('cdc-edt-refA');
      if(s)setRefWeekA(new Date(s));
    };
    window.addEventListener('storage',onStorage);
    return()=>window.removeEventListener('storage',onStorage);
  },[]);
  const[showRefPicker,setShowRefPicker]=useState(false);
  const[refPickerVal,setRefPickerVal]=useState('');

  // Semaine affichée (navigation)
  const[viewMonday,setViewMonday]=useState(()=>getMondayOf(new Date()));

  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState(EMPTY_FORM);
  const[editId,setEditId]=useState(null);

  // Popup automatisation
  const[autoPopup,setAutoPopup]=useState(null); // {block} après save
  const[autoClassId,setAutoClassId]=useState('');
  const[autoNbWeeks,setAutoNbWeeks]=useState(8);
  const[edtCtxMenu,setEdtCtxMenu]=useState(null);
  const[fiches]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-fiches')||'{}')}catch{return{}}});
  const[fichesPopup,setFichesPopup]=useState(null);
  const[fichesPopupSel,setFichesPopupSel]=useState(null);
  const[lierFicheModal,setLierFicheModal]=useState(null); // {block} pour lier une fiche du carnet
  const[coursEdtModal,setCoursEdtModal]=useState(null);   // {block} pour créer/voir un cours préparé
  const getFichesForBlockEdt=(block)=>{
    if(block.classId&&fiches[block.classId]) return{classId:block.classId,list:(fiches[block.classId]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date))};
    const bt=(block.title||'').toUpperCase();
    const m=classes.find(c=>bt.includes(c.name.toUpperCase())||c.name.toUpperCase().includes(bt.slice(0,6)));
    if(m&&fiches[m.id]) return{classId:m.id,list:(fiches[m.id]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date))};
    return{classId:null,list:[]};
  };
  const[importColorIdx,setImportColorIdx]=useState(null); // null = couleurs auto du parser
  const[blockColors,setBlockColors]=useState({}); // id→colorIdx overrides individuels
  const[colorPickerBlock,setColorPickerBlock]=useState(null); // id du bloc en cours d'édition
  const[autoConfirmed,setAutoConfirmed]=useState(false);

  useEffect(()=>{localStorage.setItem('cdc-edt',JSON.stringify(blocks))},[blocks]);
  useEffect(()=>{localStorage.setItem('cdc-vacances',JSON.stringify(vacances))},[vacances]);

  const weekType=getWeekType(viewMonday, refWeekA);

  // Jours en vacances cette semaine (indices 0=lundi…4=vendredi)
  const vacancesDaySet=(()=>{
    const set=new Set();
    for(let di=0;di<5;di++){
      const dayIso=isoDate(dateForDayOfWeek(viewMonday,di));
      if(vacances.some(v=>dayIso>=v.debut&&dayIso<=v.fin)) set.add(di);
    }
    return set;
  })();
  // Période de vacances qui chevauche la semaine (pour le bandeau)
  const vacanceSemaine=(()=>{
    const mondayIso=isoDate(viewMonday);
    const fridayIso=isoDate(dateForDayOfWeek(viewMonday,4));
    return vacances.find(v=>mondayIso<=v.fin&&fridayIso>=v.debut)||null;
  })();
  const isWeekEnVacances=vacancesDaySet.size===5; // toute la semaine

  const visibleBlocks=blocks.filter(b=>{
    if(vacancesDaySet.has(b.day))return false;
    const dateIso=isoDate(dateForDayOfWeek(viewMonday,b.day));
    if(joursAnnules[dateIso])return false; // masquer si jour annule
    const w=b.weeks||'AB';
    return w==='AB'||w===weekType;
  });

  const TOTAL=(18-8)*60;
  const topPct=(h,m)=>((h-8)*60+m)/TOTAL*100;
  const hPct=(sh,sm,eh,em)=>((eh-sh)*60+(em-sm))/TOTAL*100;
  const sf=k=>v=>setForm(f=>({...f,[k]:isNaN(+v)?v:+v}));

  const handleEdtPdfImport=async(file)=>{
    if(!file)return;
    setImportStatus('loading');
    try{
      const result=await parseEdtPDF(file);
      setImportStatus(result);
      setShowImportModal(false);
      if(!result.error&&result.blocks.length>0) setShowImportPreview(true);
      else if(result.error) setShowImportPreview(true);
    }catch(e){
      setImportStatus({blocks:[],weekType:null,error:'Erreur lors de la lecture du PDF : '+e.message});
      setShowImportModal(false);
      setShowImportPreview(true);
    }
  };

  const confirmImport=()=>{
    if(!importStatus||importStatus==='loading'||!importStatus.blocks) return;
    setBlocks(prev=>{
      const next=[...prev];
      importStatus.blocks.forEach(nb=>{
        const dup=next.find(b=>b.day===nb.day&&b.startH===nb.startH&&b.startM===nb.startM&&b.title===nb.title);
        if(!dup){
          // Priorité : override individuel > couleur globale > couleur auto du parser
          const ci=blockColors[nb.id]!==undefined?blockColors[nb.id]:importColorIdx!==null?importColorIdx:nb.colorIdx;
          next.push({...nb,colorIdx:ci});
        }
      });
      return next;
    });
    setShowImportPreview(false);
    setImportStatus(null);
    setImportColorIdx(null);
    setBlockColors({});
    setColorPickerBlock(null);
  };

  const prevWeek=()=>setViewMonday(m=>{const d=new Date(m);d.setDate(d.getDate()-7);return d;});
  const nextWeek=()=>setViewMonday(m=>{const d=new Date(m);d.setDate(d.getDate()+7);return d;});
  const goToday=()=>setViewMonday(getMondayOf(new Date()));

  const saveRefWeekA=()=>{
    if(!refPickerVal)return;
    const d=getMondayOf(new Date(refPickerVal+'T12:00'));
    setRefWeekA(d);
    localStorage.setItem('cdc-edt-refA',d.toISOString());
    setShowRefPicker(false);
  };

  const saveBlock=()=>{
    if(!form.title.trim())return;
    let savedBlock;
    if(editId){
      savedBlock={...blocks.find(b=>b.id===editId),...form};
      setBlocks(prev=>prev.map(b=>b.id===editId?savedBlock:b));
      setEditId(null);
    } else {
      savedBlock={...form,id:Date.now().toString()};
      setBlocks(prev=>[...prev,savedBlock]);
    }
    setShowAdd(false);
    setForm(EMPTY_FORM);
  };

  const delBlock=id=>{if(confirm('Supprimer ce cours ?'))setBlocks(prev=>prev.filter(b=>b.id!==id))};
  const editBlock=b=>{
    setForm({day:b.day,startH:b.startH,startM:b.startM,endH:b.endH,endM:b.endM,
      title:b.title,teacher:b.teacher||'',room:b.room||'',colorIdx:b.colorIdx||0,
      weeks:b.weeks||'AB',classId:b.classId||''});
    setEditId(b.id);setShowAdd(true);
  };

  // ── Boucle d'automatisation ──
  const runAutomation=()=>{
    const block=autoPopup.block;
    if(!autoClassId){setAutoPopup(null);return;}

    // Helper: est-ce qu'une date tombe en vacances?
    const isVacance=d=>{
      const ds=isoDate(d);
      return vacances.some(v=>ds>=v.debut&&ds<=v.fin);
    };

    const today=getMondayOf(new Date());
    const targetWeeks=[];
    let cursor=new Date(today);
    for(let i=0;i<autoNbWeeks*3+10;i++){
      const wt=getWeekType(cursor,refWeekA);
      const w=block.weeks||'AB';
      const courseDate=dateForDayOfWeek(cursor,block.day);
      if((w==='AB'||w===wt)&&!isVacance(courseDate)) targetWeeks.push(new Date(cursor));
      cursor.setDate(cursor.getDate()+7);
      if(targetWeeks.length>=autoNbWeeks)break;
    }

    const newSessions=[];
    const newFiches=[];
    const skippedSess=[];
    const existSessions=JSON.parse(localStorage.getItem('sc-sessions')||'{}');
    const existFiches=JSON.parse(localStorage.getItem('cdc-fiches')||'{}');
    const classExistSess=existSessions[autoClassId]||[];
    const classExistFiches=existFiches[autoClassId]||[];

    targetWeeks.forEach(monday=>{
      const courseDate=dateForDayOfWeek(monday,block.day);
      const dateStr=isoDate(courseDate);
      const sessionLabel=`${block.title}${block.room?' · '+block.room:''}`;
      const alreadySess=classExistSess.some(s=>s.date===dateStr&&s.label===sessionLabel);
      const alreadyFiche=classExistFiches.some(f=>f.date===dateStr&&f.titre===block.title);
      if(!alreadySess){
        newSessions.push({id:'s'+Date.now()+Math.random().toString(36).slice(2),date:dateStr,label:sessionLabel,obs:{},autoCreated:true});
      } else {
        skippedSess.push(dateStr);
      }
      if(!alreadyFiche){
        newFiches.push({id:'f'+Date.now()+Math.random().toString(36).slice(2),date:dateStr,
          titre:block.title,objectif:'',activite:'',devoirs:'',documents:'',aRevoir:'',incidents:'',absents:[],aRelancer:[],autoCreated:true});
      }
    });

    const updSessions={...existSessions};
    updSessions[autoClassId]=[...(updSessions[autoClassId]||[]),...newSessions].sort((a,b)=>a.date.localeCompare(b.date));
    localStorage.setItem('sc-sessions',JSON.stringify(updSessions));

    const updFiches={...existFiches};
    updFiches[autoClassId]=[...(updFiches[autoClassId]||[]),...newFiches].sort((a,b)=>b.date.localeCompare(a.date));
    localStorage.setItem('cdc-fiches',JSON.stringify(updFiches));

    const className=classes.find(c=>c.id===autoClassId)?.name||autoClassId;
    setAutoConfirmed({
      sessionsCreated:newSessions.length,
      fichesCreated:newFiches.length,
      skipped:skippedSess.length,
      className,
      dates:newSessions.map(s=>s.date),
    });
  };

  const ROWS=HOURS.length;
  const todayStr=isoDate(new Date());
  const isCurrentWeek=isoDate(viewMonday)===isoDate(getMondayOf(new Date()));

  // Calcul label header jours (avec date réelle)
  const dayHeaders=DAYS.map((d,i)=>{
    const date=dateForDayOfWeek(viewMonday,i);
    const isToday=isoDate(date)===todayStr;
    return{label:d,date,isToday};
  });

  return(<>
    <div className="page-hd">
      <div>
        <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
          <div className="phd-badge">📅 Emploi du temps</div>
          <button onClick={()=>{setRefPickerVal(isoDate(refWeekA));setShowRefPicker(true);}}
            style={{display:'flex',alignItems:'center',gap:'.28rem',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'rgba(255,255,255,.8)',fontSize:'.65rem',fontWeight:600,padding:'.18rem .55rem',borderRadius:99,cursor:'pointer',transition:'all .15s'}}
            title="Configurer la semaine de référence A/B">
            ⚙️ Réf. A/B
          </button>
        </div>
        <div className="phd-title">Planning hebdomadaire</div>
        <div className="phd-sub">
          Semaine <strong style={{color:'#fff'}}>{weekType}</strong> · {fmtDateShort(viewMonday)} → {fmtDateShort(dateForDayOfWeek(viewMonday,4))}
          {isCurrentWeek&&<span style={{marginLeft:'.5rem',background:'rgba(255,255,255,.18)',padding:'.1rem .42rem',borderRadius:99,fontSize:'.65rem',fontWeight:700}}>Cette semaine</span>}
        </div>
      </div>
      <div className="phd-actions">
        {/* Navigation semaines */}
        <div style={{display:'flex',alignItems:'center',gap:'.3rem',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:'var(--r-s)',padding:'.28rem .5rem'}}>
          <button onClick={prevWeek} style={{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:'.9rem',padding:'.1rem .35rem',borderRadius:4,opacity:.8}} title="Semaine précédente">◀</button>
          <span style={{fontSize:'.75rem',color:'#fff',fontWeight:700,minWidth:80,textAlign:'center'}}>Sem. {weekType}</span>
          <button onClick={nextWeek} style={{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:'.9rem',padding:'.1rem .35rem',borderRadius:4,opacity:.8}} title="Semaine suivante">▶</button>
        </div>
        {!isCurrentWeek&&<button className="btn btn-ghost" onClick={goToday} style={{fontSize:'.75rem'}}>Aujourd'hui</button>}
        {/* Bouton automatisation */}
        <button className="btn" onClick={()=>{setAutoClassId('');setAutoConfirmed(false);setAutoPopup({block:null,fromHeader:true});}}
          style={{fontSize:'.72rem',justifyContent:'center',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'#fff',gap:'.35rem'}}
          title="Créer les fiches de séance et colonnes de suivi pour un cours">
          🔁 Créer les fiches et le suivi
        </button>
        {/* Bouton vacances */}
        <button className="btn" onClick={()=>setShowVacances(true)}
          style={{fontSize:'.72rem',justifyContent:'center',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.25)',color:'#fff',gap:'.35rem'}}
          title="Gérer les périodes de vacances scolaires">
          🏖️ Vacances {vacances.length>0&&<span style={{background:'rgba(255,255,255,.25)',borderRadius:99,padding:'0 .35rem',fontSize:'.65rem'}}>{vacances.length}</span>}
        </button>
        {/* Import + Ajouter + Purger empilés */}
        <div style={{display:'flex',flexDirection:'column',gap:'.28rem',alignItems:'stretch'}}>
          <button className="btn btn-ghost" style={{fontSize:'.75rem',justifyContent:'center'}}
            onClick={()=>setShowImportModal(true)}>
            📄 Importer l'EDT
          </button>
          <button className="btn btn-white" style={{fontSize:'.75rem',justifyContent:'center'}}
            onClick={()=>{setEditId(null);setForm(EMPTY_FORM);setShowAdd(true);}}>
            + Ajouter un cours
          </button>
          <button className="btn btn-danger" style={{fontSize:'.72rem',justifyContent:'center',opacity:.8}}
            onClick={()=>{if(confirm('Supprimer tous les cours de l\'EDT ? Cette action est irréversible.'))setBlocks([]);}}>
            🗑️ Purger l'EDT
          </button>
        </div>
        {importStatus==='loading'&&<span style={{fontSize:'.72rem',color:'rgba(255,255,255,.7)',display:'flex',alignItems:'center',gap:'.3rem'}}>⏳ Lecture…</span>}
      </div>
    </div>

    <div className="page-content" style={{paddingTop:0,overflow:'hidden',flex:1,display:'flex',flexDirection:'column'}}>
      <div className="edt-grid-wrap" style={{flex:1,overflow:'auto'}}>
        <div className="edt-grid" style={{gridTemplateRows:`auto repeat(${ROWS},60px)`}} onClick={()=>edtCtxMenu&&setEdtCtxMenu(null)}>
          {/* Headers avec dates */}
          <div className="edt-col-hd" style={{gridColumn:1,gridRow:1}}/>
          {dayHeaders.map((dh,i)=>(
            <div key={dh.label} className="edt-col-hd" style={{gridColumn:i+2,gridRow:1,
              background:dh.isToday?'var(--accent-today-hd, #e8eeff)':'var(--surface2)',
              borderBottom:dh.isToday?'2px solid var(--accent)':'2px solid var(--border)'}}>
              <div style={{fontWeight:dh.isToday?800:700,color:dh.isToday?'var(--accent)':'inherit'}}>{dh.label}</div>
              <div style={{fontSize:'.62rem',fontWeight:400,color:'var(--text3)',marginTop:'.06rem'}}>
                {dh.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
              </div>
            </div>
          ))}
          {/* Time + cells */}
          {HOURS.map((h,hi)=>(
            <React.Fragment key={h}>
              <div className="edt-time" style={{gridColumn:1,gridRow:hi+2}}>{h}h</div>
              {DAYS.map((_,di)=>{
                const cellDate=dateForDayOfWeek(viewMonday,di);
                const isToday=isoDate(cellDate)===todayStr;
                return <div key={di} className="edt-cell" style={{gridColumn:di+2,gridRow:hi+2,
                  background:isToday?'rgba(59,91,219,.03)':''}}/>;
              })}
            </React.Fragment>
          ))}
          {/* Vacation day overlays — une colonne par jour en vacances */}
          {vacanceSemaine&&Array.from(vacancesDaySet).map(di=>(
            <div key={di} style={{gridColumn:di+2,gridRow:`2/span ${ROWS}`,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'.4rem',background:'rgba(245,158,11,.06)',borderTop:'2px solid rgba(245,158,11,.25)',zIndex:1,pointerEvents:'none'}}>

              <div style={{fontSize:'.62rem',fontWeight:700,color:'var(--warning)',opacity:.8,textTransform:'uppercase',letterSpacing:'.04em',textAlign:'center',padding:'0 .3rem',lineHeight:1.3}}>
                {vacanceSemaine.label}
              </div>
            </div>
          ))}
          {/* Overlays jours annules depuis Desktop */}
          {DAYS.map((_,di)=>{
            const dateIso=isoDate(dateForDayOfWeek(viewMonday,di));
            const annule=joursAnnules[dateIso];
            if(!annule)return null;
            const motifEmoji={malade:'🤒',formation:'📚',ferie:'🎉',autre:'📌'}[annule.motif]||'📌';
            const motifLabel={malade:'Absent',formation:'Formation',ferie:'Jour ferie',autre:'Annule'}[annule.motif]||'Annule';
            return(
              <div key={di} style={{gridColumn:di+2,gridRow:`2/span ${ROWS}`,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'.4rem',background:'rgba(239,68,68,.05)',borderTop:'2px solid rgba(239,68,68,.3)',zIndex:1,pointerEvents:'none'}}>
                <span style={{fontSize:'1.4rem',opacity:.5}}>{motifEmoji}</span>
                <div style={{fontSize:'.62rem',fontWeight:700,color:'var(--danger)',opacity:.75,textTransform:'uppercase',letterSpacing:'.04em',textAlign:'center',padding:'0 .3rem',lineHeight:1.4}}>

                  {annule.label?<><br/><span style={{fontWeight:400,textTransform:'none',letterSpacing:0,fontSize:'.58rem'}}>{annule.label}</span></>:null}
                </div>
              </div>
            );
          })}
          {visibleBlocks.map(b=>{
            const col=EDT_COLORS[b.colorIdx||0];
            const GRID_H=ROWS*60;
            const topPx=((b.startH-8)*60+b.startM)/600*GRID_H;
            const hPx=((b.endH-b.startH)*60+(b.endM-b.startM))/600*GRID_H;
            const w=b.weeks||'AB';
            return(
              <div key={b.id} style={{gridColumn:b.day+2,gridRow:`2/span ${ROWS}`,position:'relative',pointerEvents:'none',overflow:'hidden'}}>
                <div className="edt-block"
                  style={{top:Math.max(0,topPx),height:Math.max(18,hPx),background:col.bg,borderLeftColor:col.border,color:col.text,pointerEvents:'all'}}
                  onClick={()=>editBlock(b)}
                  onContextMenu={e=>{e.preventDefault();e.stopPropagation();setEdtCtxMenu({block:b,x:e.clientX,y:e.clientY});}}
                  title={`${b.title} — ${b.startH}:${String(b.startM).padStart(2,'0')}→${b.endH}:${String(b.endM).padStart(2,'0')} · Clic droit pour plus d'options`}>
                  <div style={{display:'flex',alignItems:'center',gap:'.2rem',overflow:'hidden'}}>
                    <div style={{fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{b.title}</div>
                    {Object.values(coursPrep).some(c=>c.edtBlockId===b.id)&&(
                      <span title="Cours préparé lié" style={{fontSize:'.6rem',flexShrink:0}}>📖</span>
                    )}
                    {b.ficheId&&(
                      <span title={`Fiche liée : ${b.ficheTitre||''}`} style={{fontSize:'.6rem',flexShrink:0}}>🔗</span>
                    )}
                  </div>
                  {b.teacher&&<div style={{opacity:.8,fontSize:'.63rem'}}>{b.teacher}</div>}
                  {b.room&&<div style={{opacity:.7,fontSize:'.62rem'}}>📍{b.room}</div>}
                  <div style={{opacity:.7,fontSize:'.62rem'}}>{b.startH}:{String(b.startM).padStart(2,'0')}–{b.endH}:{String(b.endM).padStart(2,'0')}</div>
                  {w!=='AB'&&<div style={{position:'absolute',top:3,right:4,background:col.border,color:'#fff',fontSize:'.52rem',fontWeight:800,padding:'.05rem .25rem',borderRadius:3,opacity:.9}}>Sem.{w}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>

    {/* ── Modal ajout/édition cours ── */}
    {showAdd&&(
      <div className="edt-add-overlay" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
        <div className="edt-add-card">
          <div className="edt-add-title"><span>{editId?'Modifier le cours':'Ajouter un cours'}</span><button className="close-btn" onClick={()=>setShowAdd(false)}>×</button></div>
          <div style={{display:'flex',flexDirection:'column',gap:'.7rem'}}>
            <div className="field"><label>Matière / Titre *</label><input type="text" placeholder="Espagnol, Mathématiques…" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} autoFocus/></div>
            <div className="field-row">
              <div className="field"><label>Enseignant</label><input type="text" placeholder="Nom" value={form.teacher} onChange={e=>setForm(f=>({...f,teacher:e.target.value}))}/></div>
              <div className="field"><label>Salle</label><input type="text" placeholder="Salle 12" value={form.room} onChange={e=>setForm(f=>({...f,room:e.target.value}))}/></div>
            </div>
            <div className="field-row">
              <div className="field"><label>Jour</label><select value={form.day} onChange={e=>sf('day')(e.target.value)}>{DAYS.map((d,i)=><option key={d} value={i}>{d}</option>)}</select></div>
              <div className="field"><label>Semaine</label>
                <select value={form.weeks} onChange={e=>setForm(f=>({...f,weeks:e.target.value}))}>
                  <option value="AB">A et B (toutes)</option>
                  <option value="A">Semaine A uniquement</option>
                  <option value="B">Semaine B uniquement</option>
                </select>
              </div>
            </div>
            <div className="field-row">
              <div className="field"><label>Début</label>
                <div style={{display:'flex',gap:'.35rem'}}>
                  <select value={form.startH} onChange={e=>sf('startH')(e.target.value)}>{HOURS.map(h=><option key={h} value={h}>{h}h</option>)}</select>
                  <select value={form.startM} onChange={e=>sf('startM')(e.target.value)}>{[0,15,30,45].map(m=><option key={m} value={m}>{String(m).padStart(2,'0')}</option>)}</select>
                </div>
              </div>
              <div className="field"><label>Fin</label>
                <div style={{display:'flex',gap:'.35rem'}}>
                  <select value={form.endH} onChange={e=>sf('endH')(e.target.value)}>{HOURS.map(h=><option key={h} value={h}>{h}h</option>)}</select>
                  <select value={form.endM} onChange={e=>sf('endM')(e.target.value)}>{[0,15,30,45].map(m=><option key={m} value={m}>{String(m).padStart(2,'0')}</option>)}</select>
                </div>
              </div>
            </div>
            {/* Liaison classe */}
            {classes.length>0&&(
              <div className="field"><label>Lier à une classe <span style={{fontWeight:400,opacity:.6}}>(pour l'automatisation)</span></label>
                <select value={form.classId} onChange={e=>setForm(f=>({...f,classId:e.target.value}))}>
                  <option value="">— Aucune classe liée —</option>
                  {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
            )}
            <div className="field"><label>Couleur</label>
              <div className="cp-row">{EDT_COLORS.map((c,i)=><div key={i} className={`cp-sw ${form.colorIdx===i?'on':''}`} style={{background:c.bg,border:`2.5px solid ${c.border}`}} onClick={()=>setForm(f=>({...f,colorIdx:i}))}/> )}</div>
            </div>
            <button className="btn-setup" style={{marginTop:0}} onClick={saveBlock} disabled={!form.title.trim()}>{editId?'Enregistrer':'Ajouter le cours'}</button>
          </div>
        </div>
      </div>
    )}

    {/* ── Modal config référence A/B ── */}
    {showRefPicker&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowRefPicker(false)}>
        <div className="modal" style={{maxWidth:400}}>
          <div className="modal-hd">
            <div><h2>⚙️ Référence semaine A</h2><div className="modal-hd-sub">Choisissez une date appartenant à une semaine A</div></div>
            <button className="close-btn" onClick={()=>setShowRefPicker(false)}>×</button>
          </div>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <div style={{padding:'.75rem',background:'rgba(59,91,219,.07)',border:'1px solid rgba(59,91,219,.2)',borderRadius:'var(--r-s)',fontSize:'.8rem',lineHeight:1.65}}>
              ClassPro calcule automatiquement si une semaine est A ou B en comptant les semaines depuis cette référence. La semaine sélectionnée et toutes les semaines paires à partir de celle-ci seront des semaines <strong>A</strong>.
            </div>
            <div className="field">
              <label>Date de référence (semaine A)</label>
              <input type="date" value={refPickerVal} onChange={e=>setRefPickerVal(e.target.value)}/>
            </div>
            <div style={{fontSize:'.75rem',color:'var(--text2)'}}>
              Référence actuelle : lundi du <strong>{refWeekA.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}</strong>
            </div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setShowRefPicker(false)}>Annuler</button>
              <button className="btn btn-primary" onClick={saveRefWeekA} disabled={!refPickerVal}>Enregistrer</button>
            </div>
          </div>
        </div>
      </div>
    )}

    {/* ── Menu contextuel clic droit sur un bloc EDT ── */}
    {edtCtxMenu&&(
      <>
        <div style={{position:'fixed',inset:0,zIndex:3000}} onClick={()=>setEdtCtxMenu(null)} onContextMenu={e=>{e.preventDefault();setEdtCtxMenu(null);}}/>
        <div style={{position:'fixed',left:edtCtxMenu.x,top:edtCtxMenu.y,zIndex:3001,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-s)',boxShadow:'var(--shadow-l)',minWidth:210,overflow:'hidden',padding:'.3rem 0'}}>
          <div style={{padding:'.3rem .85rem .2rem',fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',borderBottom:'1px solid var(--border)',marginBottom:'.2rem',paddingBottom:'.35rem'}}>
            {edtCtxMenu.block.title}
            <span style={{fontWeight:400,opacity:.7,marginLeft:'.4rem'}}>{DAYS[edtCtxMenu.block.day]} · Sem.{edtCtxMenu.block.weeks||'AB'}</span>
          </div>
          {(()=>{
            const coursLie=Object.values(coursPrep).find(c=>c.edtBlockId===edtCtxMenu.block.id);
            return(
              <>
                {coursLie?(
                  <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--accent)',textAlign:'left'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                    onMouseLeave={e=>e.currentTarget.style.background='none'}
                    onClick={()=>{setCoursEdtModal({block:edtCtxMenu.block,cours:coursLie,mode:'view'});setEdtCtxMenu(null);}}>
                    <span>📖</span> Voir le cours préparé
                  </button>
                ):(
                  <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--text)',textAlign:'left'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                    onMouseLeave={e=>e.currentTarget.style.background='none'}
                    onClick={()=>{setCoursEdtModal({block:edtCtxMenu.block,cours:null,mode:'create'});setEdtCtxMenu(null);}}>
                    <span>📝</span> Créer un cours préparé
                  </button>
                )}
                <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--text)',textAlign:'left'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                  onMouseLeave={e=>e.currentTarget.style.background='none'}
                  onClick={()=>{setLierFicheModal({block:edtCtxMenu.block});setEdtCtxMenu(null);}}>
                  <span>🔗</span> {edtCtxMenu.block.ficheId?'Modifier la fiche liée':'Lier une fiche du carnet'}
                </button>
                {edtCtxMenu.block.ficheId&&(()=>{
                  const allFiches=JSON.parse(localStorage.getItem('cdc-fiches')||'{}');
                  const f=Object.values(allFiches).flat().find(x=>x.id===edtCtxMenu.block.ficheId);
                  return f?(
                    <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--accent)',textAlign:'left'}}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                      onMouseLeave={e=>e.currentTarget.style.background='none'}
                      onClick={()=>{setCoursModal(f);setEdtCtxMenu(null);}}>
                      <span>📓</span> Voir la fiche liée : {f.titre}
                    </button>
                  ):null;
                })()}
              </>
            );
          })()}
          <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--text)',textAlign:'left'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
            onMouseLeave={e=>e.currentTarget.style.background='none'}
            onClick={()=>{const f=getFichesForBlockEdt(edtCtxMenu.block);setFichesPopup({block:edtCtxMenu.block,...f});setEdtCtxMenu(null);}}>
            <span>📓</span> Consulter les fiches de cours
          </button>
          <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--text)',textAlign:'left'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
            onMouseLeave={e=>e.currentTarget.style.background='none'}
            onClick={()=>{
              setAutoClassId(edtCtxMenu.block.classId||'');
              setAutoConfirmed(false);
              setAutoPopup({block:edtCtxMenu.block});
              setEdtCtxMenu(null);
            }}>
            <span>🔁</span> Créer les fiches et le suivi
          </button>
          <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--text)',textAlign:'left'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
            onMouseLeave={e=>e.currentTarget.style.background='none'}
            onClick={()=>{editBlock(edtCtxMenu.block);setEdtCtxMenu(null);}}>
            <span>✏️</span> Modifier le cours
          </button>
          <div style={{borderTop:'1px solid var(--border)',margin:'.2rem 0'}}/>
          <button style={{display:'flex',alignItems:'center',gap:'.55rem',width:'100%',padding:'.42rem .85rem',background:'none',border:'none',cursor:'pointer',fontSize:'.82rem',color:'var(--danger)',textAlign:'left'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(220,38,38,.07)'}
            onMouseLeave={e=>e.currentTarget.style.background='none'}
            onClick={()=>{delBlock(edtCtxMenu.block.id);setEdtCtxMenu(null);}}>
            <span>🗑️</span> Supprimer
          </button>
        </div>
      </>
    )}

    {/* ── Modale cours prepare (lecture seule depuis Desktop) ── */}
    {coursModal&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setCoursModal(null)}>
        <div className="modal" style={{maxWidth:520,maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
          <div className="modal-hd">
            <div>
              <h2>📖 {coursModal.titre||'Cours sans titre'}</h2>
              <div className="modal-hd-sub">
                Prepare sur ClassPro Desktop
                {coursModal.date?' · '+new Date(coursModal.date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long'}):''}
              </div>
            </div>
            <button className="close-btn" onClick={()=>setCoursModal(null)}>×</button>
          </div>
          <div className="modal-body" style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:'1rem'}}>
            {/* Badge selon le type */}
            {coursModal.sections?(
              <div style={{padding:'.5rem .75rem',background:'rgba(59,91,219,.07)',border:'1px solid rgba(59,91,219,.2)',borderRadius:'var(--r-s)',fontSize:'.75rem',color:'var(--text2)',lineHeight:1.5}}>
                Cours préparé depuis ClassPro Desktop — lecture seule.
              </div>

function parseListeEleves(text){
  var eleves=[];
  var lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var line=lines[i].replace(/\d{2}\/\d{2}\/\d{4}/g,'').replace(/[\t;,]+/g,' ').trim();
    if(line.length<3)continue;
    var tokens=line.split(/\s+/).filter(function(t){return t.length>1;});
    var hasUpper=tokens.some(function(t){return /^[A-Z\xC0-\xD6\xD8-\xDE]{2,}/.test(t);});
    var hasPrenom=tokens.some(function(t){return /^[A-Z\xC0-\xDE][a-z\xe0-\xff]/.test(t);});
    if(hasUpper&&hasPrenom){
      var nom=tokens.join(' ');
      if(!eleves.some(function(e){return e.nom===nom;}))
        eleves.push({id:String(Date.now()+i+Math.random()),nom:nom});
    }
  }
  return eleves;
}

    var cid=showImport;
    setClasses(function(p){
      return p.map(function(c){
        if(c.id!==cid)return c;
        var existNoms=c.eleves.map(function(e){return e.nom.toLowerCase();});
        var news=eleves.filter(function(e){return existNoms.indexOf(e.nom.toLowerCase())<0;});
        return Object.assign({},c,{eleves:c.eleves.concat(news)});
      });
    });
    var added=eleves.length;
    setShowImport(null);setTexteImport('');
    alert(added+' élève(s) importé(s) !');
  }
  function addEleve(){
    var n=newEleve.trim();if(!n||!selId)return;
    setClasses(function(p){
      return p.map(function(c){
        if(c.id!==selId)return c;
        return Object.assign({},c,{eleves:c.eleves.concat([{id:'e'+Date.now(),nom:n}])});
      });
    });
    setNewEleve('');
  }
  function delEleve(eid){
    if(!confirm('Supprimer ?'))return;
    setClasses(function(p){
      return p.map(function(c){
        if(c.id!==selId)return c;
        return Object.assign({},c,{eleves:c.eleves.filter(function(e){return e.id!==eid;})});
      });
    });
  }
  function fmtDate(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1];}
  function getObsAlerts(){
    if(!selId||!cur)return[];
    var alerts=[];
    // Alertes comportement
    cur.eleves.forEach(function(el){
      var counts={};
      OBS.forEach(function(o){counts[o.id]=0;});
      curSess.forEach(function(s){
        OBS.forEach(function(o){
          if(s.obs&&s.obs[el.id+'_'+o.id])counts[o.id]++;
        });
      });
      var triggered=OBS.filter(function(o){
        var seuil=alertConfig[o.id];
        return seuil!=null&&counts[o.id]>=seuil;
      }).map(function(o){return{id:o.id,label:o.label,emoji:o.emoji,k:o.k,cnt:counts[o.id]};});
      if(triggered.length>0)alerts.push({eleve:el,obs:triggered});
    });
    // Alertes travaux non rendus
    getTravAlerts().forEach(function(x){
      alerts.push({eleve:x.eleve,obs:[{id:'dv',label:x.cnt+' travail'+(x.cnt>1?'x':'')+' non rendu'+(x.cnt>1?'s':''),emoji:'📋',k:'neg',cnt:x.cnt}]});
    });
    return alerts;
  }
  function toggleCol(sid){
    setCollapsed(function(p){var n=Object.assign({},p);n[sid]=!n[sid];return n;});
  }
  function openMenu(id,x,y){
    if(menuId===id){setMenuId(null);}else{setMenuId(id);setMenuPos({x:x,y:y});}
  }

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden',minHeight:0,position:'relative'}}>
    {/* bilanEl modal — hors du conteneur overflow:hidden */}
      {bilanEl&&(
        <div className="moverlay" onClick={function(e){if(e.target===e.currentTarget)setBilanEl(null);}}>
          <div className="modal" style={{maxWidth:580}}>
            <div className="modal-hd">
              <div>
                <h2>{bilanEl.nom}</h2>
                <div className="modal-hd-sub">{cur?cur.name:''} · {curSess.length} séance{curSess.length>1?'s':''}</div>
              </div>
              <button className="close-btn" onClick={function(){setBilanEl(null);}}>×</button>
            </div>
            <div className="modal-body" style={{padding:'1rem 1.25rem'}}>
              <div style={{fontSize:'.63rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.55rem'}}>Récapitulatif global</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:'.42rem',marginBottom:'1.1rem'}}>
                {OBS.map(function(o){
                  var cnt=getBilan(bilanEl)[o.id];
                  var col=o.k==='neg'?'var(--danger)':o.k==='pos'?'var(--success)':'var(--warning)';
                  return(
                    <div key={o.id} style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.5rem .7rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-xs)',opacity:cnt===0?.45:1}}>
                      <span style={{fontSize:'1.1rem'}}>{o.emoji}</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:'.75rem'}}>{o.label}</div>
                        <div style={{fontSize:'.78rem',fontWeight:800,color:cnt>0?col:'var(--text3)'}}>{cnt===0?'—':cnt+' fois'}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {curSess.length>0&&<>
                <div style={{fontSize:'.63rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.45rem'}}>Détail par séance</div>
                <div style={{display:'flex',flexDirection:'column',gap:'.3rem',maxHeight:300,overflowY:'auto'}}>

                        <div style={{minWidth:80,flexShrink:0}}>
                          <div style={{fontSize:'.7rem',fontWeight:700,color:'var(--text)'}}>{s.date&&new Date(s.date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
                          <div style={{fontSize:'.63rem',color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:76}}>{s.label}</div>
                        </div>
                        {obsActifs.length===0
                          ?<span style={{fontSize:'.72rem',color:'var(--text3)',fontStyle:'italic'}}>Rien de noté</span>
                          :<div style={{display:'flex',gap:'.22rem',flexWrap:'wrap'}}>
                            {obsActifs.map(function(o){
                              var bg=o.k==='neg'?'#fee2e2':o.k==='pos'?'#dcfce7':'#fef9c3';
                              var cl=o.k==='neg'?'#991b1b':o.k==='pos'?'#166534':'#854d0e';
                              return <span key={o.id} style={{display:'inline-flex',alignItems:'center',gap:.18+'rem',padding:'.12rem .45rem',borderRadius:99,background:bg,color:cl,fontSize:'.7rem',fontWeight:600}}>{o.emoji} {o.label}</span>;
                            })}
                          </div>
                        }
                      </div>
                    );
                  })}
                </div>
              </>}
            </div>
          </div>
        </div>
      )}

    <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden',minHeight:0}}>

      {showNewClasse&&(

            </div>

      {showImport&&(

              </div>
              <div>
                <label style={{fontSize:'.75rem',fontWeight:600,display:'block',marginBottom:'.28rem'}}>Libellé</label>

        <div style={{position:'fixed',left:menuPos.x,top:menuPos.y,zIndex:300,background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r-s)',boxShadow:'var(--shadow-l)',minWidth:220,padding:'.35rem 0'}}>
          <button onClick={function(){var id=menuId;setMenuId(null);setTexteImport('');setShowImport(id);}}
            style={{display:'flex',alignItems:'center',gap:'.5rem',width:'100%',padding:'.45rem .85rem',border:'none',background:'none',cursor:'pointer',fontSize:'.78rem',color:'var(--text)',textAlign:'left'}}>
            Importer des élèves
          </button>
          <button onClick={function(){vider(menuId);}}
            style={{display:'flex',alignItems:'center',gap:'.5rem',width:'100%',padding:'.45rem .85rem',border:'none',background:'none',cursor:'pointer',fontSize:'.78rem',color:'var(--warning)',textAlign:'left'}}>
            Supprimer le contenu
          </button>
          <button onClick={function(){genBilan(menuId);}}
            style={{display:'flex',alignItems:'center',gap:'.5rem',width:'100%',padding:'.45rem .85rem',border:'none',background:'none',cursor:'pointer',fontSize:'.78rem',color:'var(--success)',textAlign:'left'}}>
            Générer bilan TXT
          </button>
        </div>
      )}

      <div className="page-hd">
        <div>
          <div className="phd-badge">SUIVI DE CLASSE</div>
          <div className="phd-title">Observations cours par cours</div>
          <div className="phd-sub">{cur?cur.eleves.length+' élève(s) · '+curSess.length+' séance(s)':'Créez une classe'}</div>
        </div>
        <div className="phd-actions">
          {/* Onglets Observations / Travaux */}
          {selId&&<div className="seg">
            <button className={vueSuivi==='obs'?'on':''} onClick={function(){setVueSuivi('obs');}}>👥 Observations</button>
            <button className={vueSuivi==='travaux'?'on':''} onClick={function(){setVueSuivi('travaux');}}>📋 Travaux</button>
          </div>}
          {/* Bouton contextuel selon onglet */}
          {selId&&vueSuivi==='obs'&&<button className="btn btn-ghost" onClick={function(){setShowNewSeance(true);}}>+ Séance</button>}
          {selId&&vueSuivi==='travaux'&&<button className="btn btn-ghost" onClick={function(){setShowNewDevoir(true);}}>+ Devoir</button>}
          {/* Alerte si présente */}
          {selId&&(function(){var a=getObsAlerts();return a.length>0?(
            <button className="btn btn-danger" onClick={function(){setAlertPopup(a);}}>
              ⚠️ {a.length} alerte{a.length>1?'s':''}
            </button>
          ):null;})()}
          {/* Menu secondaire : nouvelle classe, config alertes, purge */}

          <button className="btn btn-danger" style={{opacity:.8,fontSize:'.72rem',padding:'.32rem .6rem'}} onClick={function(){setPurgeTargetSuivi(selId?'current':'all');setShowPurgeSuivi(true);}} title="Purger">🗑️</button>
        </div>
      </div>

      {/* ── Modale purge suivi ── */}
      {showPurgeSuivi&&(
        <div className="moverlay" onClick={function(e){if(e.target===e.currentTarget)setShowPurgeSuivi(false);}}>

              <div style={{fontSize:'.82rem',color:'var(--text2)',lineHeight:1.6}}>

                    <div>

                      <div style={{fontSize:'.72rem',color:'var(--text2)',marginTop:'.08rem'}}>{curSess.length} séance(s) supprimée(s)</div>
                    </div>

                  <div>

                    <div style={{fontSize:'.72rem',color:'var(--text2)',marginTop:'.08rem'}}>{Object.values(sessions).reduce(function(s,a){return s+a.length;},0)} séance(s) au total</div>

                <button className="btn" onClick={function(){setShowPurgeSuivi(false);}}>Annuler</button>
                <button className="btn btn-danger" onClick={function(){

                    setSessions(function(p){var n=Object.assign({},p);n[selId]=[];return n;});

      <div style={{display:'flex',alignItems:'stretch',background:'var(--surface)',borderBottom:'2px solid var(--border)',flexShrink:0,overflowX:'auto'}}>

                          onContextMenu={function(e){e.preventDefault();if(confirm('Supprimer la colonne "'+s.label+'" ?'))delSeance(s.id);}}>
                          {col?(
                            <span style={{fontSize:'.52rem',color:'var(--accent)',fontWeight:700,writingMode:'vertical-rl',transform:'rotate(180deg)'}}>{fmtDate(s.date)}</span>
                          ):(
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'.12rem'}}>
                              <span className="sc-chip">{fmtDate(s.date)}</span>
                            </div>

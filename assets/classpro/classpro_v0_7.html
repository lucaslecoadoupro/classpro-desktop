              )}
              <button className="close-btn"
                disabled={popupEditMode}
                title={popupEditMode?'Sauvegardez d\'abord ou cliquez Annuler':'Fermer'}
                onClick={()=>{ if(!popupEditMode) setSidebarPopup(null); }}
                style={{opacity:popupEditMode?0.3:1,cursor:popupEditMode?'not-allowed':'pointer'}}>×</button>
            </div>
          </div>
          <div className="modal-body" style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:popupEditMode?'.75rem':'.55rem'}}>
            {[
              {key:'titre',label:'📌 Titre / Sujet',type:'input'},
              {key:'date',label:'📅 Date',type:'date'},
              {key:'objectif',label:'🎯 Objectif du cours',type:'ta'},
              {key:'activite',label:'📚 Activité réalisée',type:'ta'},
              {key:'devoirs',label:'📝 Devoirs donnés',type:'ta'},
              {key:'documents',label:'📎 Documents utilisés',type:'ta'},
              {key:'aRevoir',label:'🔁 Ce qui reste à revoir',type:'ta'},
              {key:'incidents',label:'⚡ Incidents / Points de vigilance',type:'ta'},
            ].map(({key,label,type})=>{
              const val=sidebarPopup[key]||'';
              if(!popupEditMode&&!val&&key!=='titre'&&key!=='date') return null;
              return(
                <div key={key}>
                  <div style={{fontSize:'.66rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:popupEditMode?'.28rem':'.18rem'}}>{label}</div>
                  {popupEditMode?(
                    type==='ta'?(
                      <RichField value={val} onChange={v=>setSidebarPopup(p=>({...p,[key]:v}))} placeholder="—" minHeight={80}/>
                    ):(
                      <input type={type==='date'?'date':'text'} value={val} onChange={e=>setSidebarPopup(p=>({...p,[key]:e.target.value}))}
                        style={{width:'100%',padding:'.42rem .65rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface2)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.85rem',boxSizing:'border-box'}}/>
                    )
                  ):(
                    <div style={{fontSize:key==='titre'?'1rem':'.84rem',fontWeight:key==='titre'?700:400,color:val?'var(--text)':'var(--text3)',lineHeight:1.6,padding:key==='titre'?0:'.38rem .65rem',background:key==='titre'?'transparent':'var(--surface2)',borderLeft:key==='titre'?'none':'3px solid var(--border)',borderRadius:key==='titre'?0:'0 var(--r-xs) var(--r-xs) 0'}}
                      dangerouslySetInnerHTML={type==='ta'&&val?{__html:val}:undefined}>
                      {!(type==='ta'&&val)&&(key==='date'&&val?new Date(val+'T12:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):(val||'—'))}
                    </div>
                  )}
                </div>
              );
            })}
            {/* Absents en mode lecture */}
            {!popupEditMode&&(sidebarPopup.absents||[]).length>0&&(()=>{
              const allClasses=(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[];}})();
              const fCls=allClasses.find(c=>(c.eleves||[]).some(e=>(sidebarPopup.absents||[]).includes(e.id)));
              const noms=(sidebarPopup.absents||[]).map(id=>{const el=fCls?.eleves?.find(e=>e.id===id);return el?el.nom:null;}).filter(Boolean);
              return noms.length>0?(
                <div>
                  <div style={{fontSize:'.66rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.18rem'}}>🙋 Absents ({noms.length})</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem',padding:'.38rem .65rem',background:'rgba(220,38,38,.04)',border:'1px solid rgba(220,38,38,.15)',borderRadius:'var(--r-xs)'}}>
                    {noms.map(n=><span key={n} style={{padding:'.15rem .45rem',background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.2)',borderRadius:99,fontSize:'.75rem',color:'var(--danger)',fontWeight:500}}>{n}</span>)}
                  </div>
                </div>
              ):null;
            })()}
          </div>
          {popupEditMode&&(
            <div style={{padding:'.75rem 1.25rem',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
              <button className="btn btn-primary" onClick={()=>{savePopupFiche();setPopupEditMode(false);}}>💾 Sauvegarder</button>
            </div>
          )}
        </div>
      </div>
    )}
    {showNew&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowNew(false)}>
        <div className="modal" style={{maxWidth:400}}>
          <div className="modal-hd"><div><h2>Nouvelle fiche de séance</h2></div><button className="close-btn" onClick={()=>setShowNew(false)}>×</button></div>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            <div className="field"><label>Titre / Sujet *</label><input type="text" autoFocus placeholder="Ex: Introduction aux fractions…" value={newForm.titre} onChange={e=>setNewForm(f=>({...f,titre:e.target.value}))}/></div>
            <div className="field"><label>Date</label><input type="date" value={newForm.date} onChange={e=>setNewForm(f=>({...f,date:e.target.value}))}/></div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setShowNew(false)}>Annuler</button>
              <button className="btn btn-primary" onClick={createFiche} disabled={!newForm.titre.trim()}>Créer</button>
            </div>
          </div>
        </div>
      </div>
    )}
  </>);
}

/* ══ MODULE 8 — PLAN DE CLASSE v3 ════════════════════════════════════════ */

const GRID = 40;

const PALETTE_ITEMS = [
  { section:'Mobilier fixe', items:[
    { type:'tableau',     label:'Tableau',              sub:'Face aux élèves',          defaultW:7, defaultH:1, cls:'pdc-elem-tableau',    isTable:false },
    { type:'bureau-prof', label:'Bureau enseignant',    sub:'Bureau du professeur',     defaultW:3, defaultH:2, cls:'pdc-elem-bureau-prof', isTable:false },
    { type:'paillasse',   label:'Paillasse',            sub:'Paillasse / meuble',       defaultW:5, defaultH:2, cls:'pdc-elem-paillasse',  isTable:false },
    { type:'passage',     label:'Couloir',              sub:'Zone de passage libre',    defaultW:1, defaultH:4, cls:'pdc-elem-passage',    isTable:false },
  ]},
  { section:'Tables élèves', items:[
    { type:'table-solo',  label:'Table individuelle',   sub:'1 élève',                  defaultW:2, defaultH:2, cls:'pdc-elem-table', isTable:true, seats:1 },
    { type:'table-duo',   label:'Table double',         sub:'2 élèves côte à côte',    defaultW:4, defaultH:2, cls:'pdc-elem-table', isTable:true, seats:2 },
    { type:'ilot-4',      label:'Îlot de 4',            sub:'4 élèves face à face',    defaultW:4, defaultH:4, cls:'pdc-elem-table', isTable:true, seats:4 },
    { type:'ilot-6',      label:'Îlot de 6',            sub:'6 élèves en groupe',      defaultW:6, defaultH:4, cls:'pdc-elem-table', isTable:true, seats:6 },
  ]},
];

function initiales(nom){ if(!nom)return'?'; const p=nom.trim().split(/\s+/); return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }

function PalPreview({type}){
  const S={borderRadius:3,background:'var(--surface)',border:'1.5px solid var(--border)'};
  if(type==='tableau') return React.createElement('div',{style:{width:38,height:12,background:'#1e3a8a',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center'}},React.createElement('span',{style:{fontSize:'.38rem',fontWeight:800,color:'#fff',letterSpacing:'.08em'}},'TABLEAU'));
  if(type==='bureau-prof') return React.createElement('div',{style:{width:26,height:22,background:'rgba(124,58,237,.12)',border:'1.5px solid rgba(124,58,237,.45)',borderRadius:4}});
  if(type==='paillasse') return React.createElement('div',{style:{width:38,height:14,background:'rgba(180,83,9,.1)',border:'1.5px solid rgba(180,83,9,.4)',borderRadius:4}});
  if(type==='passage') return React.createElement('div',{style:{width:14,height:28,background:'repeating-linear-gradient(45deg,rgba(148,163,184,.12),rgba(148,163,184,.12) 3px,transparent 3px,transparent 6px)',border:'1.5px dashed rgba(148,163,184,.5)',borderRadius:4}});
  if(type==='table-solo') return React.createElement('div',{style:{...S,width:22,height:22}});
  if(type==='table-duo') return React.createElement('div',{style:{display:'flex',gap:2}},[0,1].map(i=>React.createElement('div',{key:i,style:{...S,width:16,height:18}})));
  if(type==='ilot-4') return React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2}},[0,1,2,3].map(i=>React.createElement('div',{key:i,style:{...S,width:12,height:12}})));
  if(type==='ilot-6') return React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:2}},[0,1,2,3,4,5].map(i=>React.createElement('div',{key:i,style:{...S,width:11,height:11}})));
  return null;
}

function TableSeats({item, eleves, flags, selEleve, onSeatClick, mode, seanceObs, onSeanceClick}){
  const def = PALETTE_ITEMS.flatMap(s=>s.items).find(i=>i.type===item.type);
  if(!def?.seats) return null;
  const seatLayouts = {
    'table-solo': [[0]],
    'table-duo':  [[0,1]],
    'ilot-4':     [[0,1],[2,3]],
    'ilot-6':     [[0,1,2],[3,4,5]],
  };
  const layout = seatLayouts[item.type]||[[0]];
  const seatEleves = item.seatEleves||{};
  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',height:'100%',padding:5,gap:3,boxSizing:'border-box'}}>
      {layout.map((row,ri)=>(
        <div key={ri} style={{display:'flex',gap:3,flex:1}}>
          {row.map(i=>{
            const eleveId=seatEleves[i];
            const eleve=eleveId?eleves?.find(e=>e.id===eleveId):null;
            const flag=eleve&&flags?.[eleve.id];
            const isSelTarget=selEleve&&!eleve;
            // En mode séance : montrer si l'élève a des obs
            const hasObs=eleve&&seanceObs&&OBS.some(o=>seanceObs[`${eleve.id}_${o.id}`]);
            return(
              <div key={i}
                onClick={
                  mode==='placement'?e=>{e.stopPropagation();onSeatClick(item.id,i);}:
                  mode==='seance'&&eleve?e=>{e.stopPropagation();onSeanceClick&&onSeanceClick(eleve);}:
                  undefined
                }
                style={{
                  flex:1,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',
                  minWidth:0,overflow:'hidden',transition:'all .13s',position:'relative',
                  background: eleve
                    ? (mode==='seance'&&hasObs?'rgba(124,58,237,.12)':flag==='eviter'?'rgba(220,38,38,.1)':flag==='rapprocher'?'rgba(15,155,110,.1)':'rgba(59,91,219,.1)')
                    : (isSelTarget?'rgba(59,91,219,.06)':'rgba(0,0,0,.03)'),
                  border: eleve
                    ? `2px solid ${mode==='seance'&&hasObs?'rgba(124,58,237,.5)':flag==='eviter'?'var(--danger)':flag==='rapprocher'?'var(--success)':'rgba(59,91,219,.28)'}`
                    : `1.5px dashed ${isSelTarget?'var(--accent)':'rgba(0,0,0,.13)'}`,
                  cursor:mode==='placement'||(mode==='seance'&&eleve)?'pointer':'default',
                }}>
                {eleve?(
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'2px 3px'}}>
                    <div style={{width:18,height:18,borderRadius:'50%',background:mode==='seance'&&hasObs?'#7c3aed':flag==='eviter'?'var(--danger)':flag==='rapprocher'?'var(--success)':'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <span style={{fontSize:'.42rem',fontWeight:800,color:'#fff',lineHeight:1}}>{initiales(eleve.nom)}</span>
                    </div>
                    <span style={{fontSize:'.46rem',fontWeight:700,color:'var(--text)',lineHeight:1,textAlign:'center',wordBreak:'break-word',maxWidth:'100%'}}>{eleve.nom.split(' ').pop()}</span>
                    {mode==='seance'&&hasObs&&(
                      <div style={{display:'flex',gap:1,flexWrap:'wrap',justifyContent:'center'}}>
                        {OBS.filter(o=>seanceObs[`${eleve.id}_${o.id}`]).map(o=>(
                          <span key={o.id} style={{fontSize:'.38rem'}}>{o.emoji}</span>
                        ))}
                      </div>
                    )}
                  </div>
                ):(
                  <span style={{fontSize:'.65rem',color:'var(--text3)',opacity:isSelTarget?.7:.35}}>+</span>
                )}
                {flag&&mode!=='seance'&&<span style={{position:'absolute',top:1,right:2,fontSize:'.45rem'}}>{flag==='eviter'?'⛔':'✅'}</span>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function GridBg({w,h,cell}){
  const c=cell||40;
  return(
    <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.5,pointerEvents:'none'}} xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="sg" width={c} height={c} patternUnits="userSpaceOnUse">
          <path d={`M ${c} 0 L 0 0 0 ${c}`} fill="none" stroke="var(--border)" strokeWidth="0.6"/>
        </pattern>
        <pattern id="lg" width={c*5} height={c*5} patternUnits="userSpaceOnUse">
          <rect width={c*5} height={c*5} fill="url(#sg)"/>
          <path d={`M ${c*5} 0 L 0 0 0 ${c*5}`} fill="none" stroke="var(--border)" strokeWidth="1.2"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#lg)"/>
    </svg>
  );
}

function PlanClasse({onNav}){
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const[plans,setPlans]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-plans')||'{}')}catch{return{}}});
  const[selCls,setSelCls]=useState(null);
  const[mode,setMode]=useState('layout');
  const[zoom,setZoom]=useState(100);
  const[selectedId,setSelectedId]=useState(null);
  const[marqueMode,setMarqueMode]=useState(null);
  const[selEleve,setSelEleve]=useState(null);
  const[pdcBilanEl,setPdcBilanEl]=useState(null);
  const[canvasCols,setCanvasCols]=useState(18);
  const[canvasRows,setCanvasRows]=useState(12);
  const[seanceSelId,setSeanceSelId]=useState(null);
  const[seanceObs,setSeanceObs]=useState({});
  const[seanceSaved,setSeanceSaved]=useState(false);
  const[seanceEleve,setSeanceEleve]=useState(null); // élève cliqué sur le canvas en mode séance
  const[showDupModal,setShowDupModal]=useState(false);
  const[dupTargets,setDupTargets]=useState([]); // ids des classes cibles
  const dragRef=React.useRef(null);
  const canvasRef=React.useRef(null);

  useEffect(()=>{localStorage.setItem('cdc-plans',JSON.stringify(plans))},[plans]);

  // Toujours lire sc-sessions depuis localStorage pour éviter les doublons
  // (SuiviClasse et PlanClasse partagent la même clé)
  const getRawSessions=()=>{try{return JSON.parse(localStorage.getItem('sc-sessions')||'{}')}catch{return{}}};
  const clsSessions=selCls?(getRawSessions()[selCls]||[]):[];

  const cls=classes.find(c=>c.id===selCls);
  const plan=selCls?(plans[selCls]||{elements:[],flags:{},nomSalle:''}):{elements:[],flags:{},nomSalle:''};
  const elements=plan.elements||[];
  const flags=plan.flags||{};
  const nomSalle=plan.nomSalle||'';

  const updatePlan=np=>setPlans(p=>({...p,[selCls]:np}));
  const updateElements=ne=>updatePlan({...plan,elements:ne});

  const loadSeance=(sid)=>{
    setSeanceSelId(sid);
    setSeanceSaved(false);
    const raw=getRawSessions();
    const s=(raw[selCls]||[]).find(x=>x.id===sid);
    setSeanceObs(s?{...s.obs}:{});
  };

  const toggleSeanceObs=(eid,oid)=>{
    const k=`${eid}_${oid}`;
    setSeanceObs(o=>({...o,[k]:!o[k]}));
    setSeanceSaved(false);
  };

  const saveSeance=()=>{
    if(!selCls||!seanceSelId) return;
    const raw=getRawSessions();
    const arr=(raw[selCls]||[]).map(s=>s.id===seanceSelId?{...s,obs:{...seanceObs}}:s);
    const updated={...raw,[selCls]:arr};
    localStorage.setItem('sc-sessions',JSON.stringify(updated));
    setSeanceSaved(true);
    setTimeout(()=>setSeanceSaved(false),2000);
  };

  const createAndLoadSeance=()=>{
    if(!selCls) return;
    const raw=getRawSessions();
    const today=isoDate(new Date());
    const s={id:'s'+Date.now(),date:today,label:'Cours',obs:{}};
    const arr=[...(raw[selCls]||[]),s];
    const updated={...raw,[selCls]:arr};
    localStorage.setItem('sc-sessions',JSON.stringify(updated));
    setSeanceSelId(s.id);
    setSeanceObs({});
    setSeanceSaved(false);
  };
  // ── Système de coordonnées propre ──
  // Les éléments stockent leur position/taille en UNITÉS DE GRILLE (entiers).
  // Pour afficher : px = unités * CELL  où CELL = GRID * scale
  // Pas de transform:scale, pas d'ambiguïté getBoundingClientRect.
  const scale = zoom / 100;
  const CELL = Math.round(GRID * scale); // taille d'une case en px écran

  const zoomIn=()=>setZoom(z=>Math.min(200,z+10));
  const zoomOut=()=>setZoom(z=>Math.max(40,z-10));
  const zoomReset=()=>setZoom(100);

  const onPaletteDragStart=(e,pi)=>{
    dragRef.current={fromPalette:true,palItem:pi};
    e.dataTransfer.effectAllowed='copy';
    e.dataTransfer.setData('text/plain','palette');
  };

  // Convertit clientX/Y → unités de grille dans le canvas
  // canvasRef = div sans transform, getBoundingClientRect est direct
  const clientToGrid=(clientX,clientY)=>{
    const rect=canvasRef.current.getBoundingClientRect();
    return{
      gx: (clientX - rect.left) / CELL,
      gy: (clientY - rect.top)  / CELL,
    };
  };

  const onElemMouseDown=(e,elem)=>{
    if(mode==='placement') return;
    // Ne pas interférer si on clique dans l'inspector
    if(e.target.closest('.pdc-inspector')) return;
    e.stopPropagation(); // pas de preventDefault → les inputs gardent le focus
    setSelectedId(elem.id);

    // On attend un mouvement > 4px avant de démarrer le drag
    const startX=e.clientX, startY=e.clientY;
    const startElemX=elem.x, startElemY=elem.y;
    let dragging=false;

    const onMove=ev=>{
      const dpx=ev.clientX-startX;
      const dpy=ev.clientY-startY;
      if(!dragging && Math.abs(dpx)<4 && Math.abs(dpy)<4) return;
      if(!dragging){ dragging=true; }
      const nx=Math.max(0, Math.min(effectiveCols - elem.w, startElemX + Math.round(dpx/CELL)));
      const ny=Math.max(0, Math.min(effectiveRows - elem.h, startElemY + Math.round(dpy/CELL)));
      setPlans(p=>{
        const cp=p[selCls]||{elements:[],flags:{}};
        return{...p,[selCls]:{...cp,elements:cp.elements.map(el=>
          el.id===elem.id ? {...el,x:nx,y:ny} : el
        )}};
      });
    };
    const onUp=()=>{
      dragRef.current=null;
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
    };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  const onCanvasDrop=e=>{
    e.preventDefault();
    if(!dragRef.current?.fromPalette||!selCls) return;
    const pi=dragRef.current.palItem;
    const {gx,gy}=clientToGrid(e.clientX,e.clientY);
    const nx=Math.max(0, Math.min(effectiveCols - pi.defaultW, Math.round(gx - pi.defaultW/2)));
    const ny=Math.max(0, Math.min(effectiveRows - pi.defaultH, Math.round(gy - pi.defaultH/2)));
    const ne={id:'el'+Date.now()+Math.random().toString(36).slice(2,5),type:pi.type,x:nx,y:ny,w:pi.defaultW,h:pi.defaultH,seatEleves:{}};
    updateElements([...elements,ne]);
    setSelectedId(ne.id);
    dragRef.current=null;
  };

  const onResizeMouseDown=(e,elem,dir)=>{
    e.preventDefault(); e.stopPropagation();
    const startClientX=e.clientX, startClientY=e.clientY;
    const startW=elem.w, startH=elem.h;
    const onMove=ev=>{
      const dpx=ev.clientX - startClientX;
      const dpy=ev.clientY - startClientY;
      const dw=Math.round(dpx/CELL);
      const dh=Math.round(dpy/CELL);
      setPlans(p=>{
        const cp=p[selCls]||{elements:[],flags:{}};
        return{...p,[selCls]:{...cp,elements:cp.elements.map(el=>{
          if(el.id!==elem.id) return el;
          const r={...el};
          if(dir==='e'||dir==='se') r.w=Math.max(1,startW+dw);
          if(dir==='s'||dir==='se') r.h=Math.max(1,startH+dh);
          return r;
        })}};
      });
    };
    const onUp=()=>{ window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  const deleteElem=id=>{ updateElements(elements.filter(el=>el.id!==id)); setSelectedId(null); };
  const duplicateElem=id=>{ const o=elements.find(el=>el.id===id); if(!o)return; const c={...o,id:'el'+Date.now()+Math.random().toString(36).slice(2,5),x:o.x+1,y:o.y+1,seatEleves:{}}; updateElements([...elements,c]); setSelectedId(c.id); };

  const onSeatClick=(elemId,seatIdx)=>{
    if(mode!=='placement') return;
    if(marqueMode){
      const elem=elements.find(e=>e.id===elemId);
      const eleveId=elem?.seatEleves?.[seatIdx]; if(!eleveId) return;
      const nf={...flags}; nf[eleveId]=flags[eleveId]===marqueMode?null:marqueMode;
      updatePlan({...plan,flags:nf}); return;
    }
    if(selEleve){
      const ne=elements.map(el=>{ const se={...el.seatEleves}; Object.keys(se).forEach(k=>{ if(se[k]===selEleve)delete se[k]; }); return{...el,seatEleves:se}; });
      const t=ne.find(e=>e.id===elemId); if(!t) return;
      t.seatEleves[seatIdx]=selEleve;
      updateElements(ne); setSelEleve(null);
    } else {
      const elem=elements.find(e=>e.id===elemId);
      const eleveId=elem?.seatEleves?.[seatIdx];
      if(eleveId) setSelEleve(eleveId);
    }
  };

  const removeEleveFromAll=eleveId=>{ updateElements(elements.map(el=>{ const se={...el.seatEleves}; Object.keys(se).forEach(k=>{ if(se[k]===eleveId)delete se[k]; }); return{...el,seatEleves:se}; })); setSelEleve(null); };

  const tirage=()=>{
    if(!cls) return;
    const seats=[]; elements.forEach(elem=>{ const def=PALETTE_ITEMS.flatMap(s=>s.items).find(i=>i.type===elem.type); if(def?.isTable&&def.seats)for(let i=0;i<def.seats;i++)seats.push({elemId:elem.id,seat:i}); });
    const shuffled=[...cls.eleves].sort(()=>Math.random()-.5);
    const ss=[...seats].sort(()=>Math.random()-.5);
    const ne=elements.map(el=>({...el,seatEleves:{}}));
    shuffled.slice(0,ss.length).forEach((e,i)=>{ const{elemId,seat}=ss[i]; const el=ne.find(x=>x.id===elemId); if(el)el.seatEleves[seat]=e.id; });
    updateElements(ne); setSelEleve(null);
  };

  const totalSeats=elements.reduce((a,el)=>{ const def=PALETTE_ITEMS.flatMap(s=>s.items).find(i=>i.type===el.type); return a+(def?.seats||0); },0);
  const occupiedSeats=elements.reduce((a,el)=>a+Object.values(el.seatEleves||{}).filter(Boolean).length,0);
  const placedIds=new Set(); elements.forEach(el=>Object.values(el.seatEleves||{}).forEach(id=>{ if(id)placedIds.add(id); }));
  const unplaced=cls?cls.eleves.filter(e=>!placedIds.has(e.id)):[];

  // Canvas size : contrôlé par l'utilisateur via la poignée, avec minimum basé sur les éléments
  const minCols = elements.length ? Math.max(...elements.map(el=>el.x+el.w)) + 2 : 14;
  const minRows = elements.length ? Math.max(...elements.map(el=>el.y+el.h)) + 2 : 10;
  const effectiveCols = Math.max(canvasCols, minCols);
  const effectiveRows = Math.max(canvasRows, minRows);
  const canvasW = effectiveCols * CELL;
  const canvasH = effectiveRows * CELL;

  // Poignée de resize du canvas
  const onCanvasResizeStart=(e)=>{
    e.stopPropagation(); e.preventDefault();
    const startX=e.clientX, startY=e.clientY;
    const startCols=effectiveCols, startRows=effectiveRows;
    const move=ev=>{
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      setCanvasCols(Math.max(10, startCols + Math.round(dx/CELL)));
      setCanvasRows(Math.max(6,  startRows + Math.round(dy/CELL)));
    };
    const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  };

  const renderElem=elem=>{
    const def=PALETTE_ITEMS.flatMap(s=>s.items).find(i=>i.type===elem.type); if(!def)return null;
    const isSel=selectedId===elem.id&&mode==='layout';
    // Tout en pixels directs = unités_grille * CELL
    const px=elem.x*CELL, py=elem.y*CELL;
    const pw=elem.w*CELL, ph=elem.h*CELL;
    const inner=()=>{
      if(def.isTable) return <TableSeats item={elem} eleves={cls?.eleves} flags={flags} selEleve={selEleve} onSeatClick={onSeatClick} mode={mode} seanceObs={seanceObs} onSeanceClick={e=>setSeanceEleve(e)}/>;
      if(elem.type==='tableau') return <span style={{fontSize:`${Math.max(9,Math.round(CELL*0.45))}px`,fontWeight:800,letterSpacing:'.12em',textShadow:'0 1px 0 rgba(0,0,0,.2)'}}>TABLEAU</span>;
      if(elem.type==='bureau-prof') return <div style={{textAlign:'center',lineHeight:1.3}}><div style={{fontSize:`${Math.max(10,Math.round(CELL*0.5))}px`,marginBottom:2}}>👨‍🏫</div><span style={{fontSize:`${Math.max(8,Math.round(CELL*0.35))}px`,fontWeight:700}}>Bureau<br/>prof</span></div>;
      if(elem.type==='paillasse') return <span style={{fontSize:`${Math.max(8,Math.round(CELL*0.38))}px`,fontWeight:700,letterSpacing:'.04em'}}>Paillasse</span>;
      if(elem.type==='passage') return null;
      return null;
    };
    return(
      <div key={elem.id}
        className={`pdc-elem ${def.cls}${mode==='layout'?' layout-mode':''}${isSel?' selected-elem':''}`}
        style={{left:px,top:py,width:pw,height:ph,cursor:mode==='layout'?'move':'default',zIndex:isSel?20:elem.type==='passage'?0:1}}
        onMouseDown={e=>{
          if(mode==='layout') onElemMouseDown(e,elem);
          // En mode séance : ne pas bloquer les clics sur les places
        }}
        onClick={e=>{
          // En mode séance, laisser le clic se propager vers TableSeats
          if(mode==='seance') return;
          e.stopPropagation();
        }}>
        {inner()}
        {isSel&&<>
          {/* Toolbar flottante */}
          <div className="pdc-inspector"
            onMouseDown={e=>e.stopPropagation()}
            onClick={e=>e.stopPropagation()}>
            <button className="pdc-inspector-btn" onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();duplicateElem(elem.id);}}>⧉ Dupliquer</button>
            <div className="pdc-inspector-sep"/>
            <button className="pdc-inspector-btn danger" onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();deleteElem(elem.id);}}>✕ Supprimer</button>
          </div>
          {/* Poignées resize */}
          <div className="pdc-rh pdc-rh-e"  onMouseDown={e=>onResizeMouseDown(e,elem,'e')}/>
          <div className="pdc-rh pdc-rh-s"  onMouseDown={e=>onResizeMouseDown(e,elem,'s')}/>
          <div className="pdc-rh pdc-rh-se" onMouseDown={e=>onResizeMouseDown(e,elem,'se')}/>
        </>}
      </div>
    );
  };

  return(<>
    <div className="page-hd">
      <div>
        <div className="phd-badge">🪑 Plan de classe</div>
        <div className="phd-title">{nomSalle||(cls?`Salle — ${cls.name}`:'Plan de classe')}</div>
        <div className="phd-sub">{cls?`${cls.name} · ${occupiedSeats}/${totalSeats} places occupées`:'Sélectionnez une classe'}</div>
      </div>
      <div className="phd-actions">
        {selCls&&mode==='seance'&&<>
          <button className={`btn ${seanceSaved?'btn-success':'btn-primary'}`}
            onClick={saveSeance} disabled={!seanceSelId}
            style={{background:seanceSaved?'var(--success)':'',borderColor:seanceSaved?'var(--success)':''}}>
            {seanceSaved?'✅ Enregistré !':'💾 Enregistrer la séance'}
          </button>
        </>}
        {selCls&&mode!=='seance'&&<>
          <button className="btn btn-ghost" onClick={tirage}>🎲 Placement aléatoire</button>
          <button className="btn btn-ghost" onClick={()=>setShowDupModal(true)}>⧉ Dupliquer la salle</button>
          <button className="btn btn-ghost" onClick={()=>{if(confirm('Vider tous les placements ?'))updateElements(elements.map(el=>({...el,seatEleves:{}})));setSelEleve(null);}}>🗑 Vider placements</button>
          <button className="btn btn-ghost" onClick={()=>{if(confirm('Réinitialiser toute la salle ?'))updatePlan({elements:[],flags:{},nomSalle});setSelectedId(null);setSelEleve(null);}}>↺ Réinitialiser</button>
        </>}
      </div>
    </div>

    <div className="pdc-outer">
      <div className="pdc-topbar">
        <span style={{fontSize:'.73rem',fontWeight:600,color:'var(--text2)',flexShrink:0}}>Classe :</span>
        <div className="seg">
          {classes.map(c=>(
            <button key={c.id} className={selCls===c.id?'on':''} onClick={()=>{setSelCls(c.id);setSelectedId(null);setSelEleve(null);setMarqueMode(null);setMode('layout');}}>
              {c.name}
            </button>
          ))}
        </div>
        {selCls&&<>
          <div style={{display:'flex',alignItems:'center',gap:'.35rem',marginLeft:'.4rem'}}>
            <span style={{fontSize:'.68rem',color:'var(--text3)',flexShrink:0}}>📛 Salle :</span>
            <input className="pdc-salle-name" value={nomSalle} onChange={e=>updatePlan({...plan,nomSalle:e.target.value})} placeholder="Nommer la salle…" maxLength={40}/>
          </div>
          <div className="pdc-mode-seg" style={{marginLeft:'auto'}}>
            <button className={`pdc-mode-btn${mode==='layout'?' on':''}`} onClick={()=>{setMode('layout');setSelEleve(null);setMarqueMode(null);}}>🎨 Disposition</button>
            <button className={`pdc-mode-btn${mode==='placement'?' on':''}`} onClick={()=>{setMode('placement');setSelectedId(null);}}>👥 Placement</button>
            <button className={`pdc-mode-btn${mode==='seance'?' on':''}`} style={mode==='seance'?{background:'#7c3aed'}:{}} onClick={()=>{setMode('seance');setSelectedId(null);setSelEleve(null);}}>📋 Séance</button>
          </div>
          {mode==='placement'&&<>
            <button className={`pdc-marque-btn${marqueMode==='eviter'?' on':''}`} style={{color:marqueMode==='eviter'?'#fff':'var(--danger)'}} onClick={()=>setMarqueMode(m=>m==='eviter'?null:'eviter')}>⛔ À éviter</button>
            <button className={`pdc-marque-btn${marqueMode==='rapprocher'?' on':''}`} style={{color:marqueMode==='rapprocher'?'#fff':'var(--success)'}} onClick={()=>setMarqueMode(m=>m==='rapprocher'?null:'rapprocher')}>✅ À rapprocher</button>
          </>}
          <div className="pdc-zoom-bar">
            <button className="pdc-zoom-btn" onClick={zoomOut} title="Dézoomer">−</button>
            <span className="pdc-zoom-val" onDoubleClick={zoomReset} title="Double-clic = 100%">{zoom}%</span>
            <button className="pdc-zoom-btn" onClick={zoomIn} title="Zoomer">+</button>
          </div>
        </>}
      </div>

      {!selCls?(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',color:'var(--text2)',gap:'.65rem'}}>
          <div style={{fontSize:'2.5rem',opacity:.2}}>🏫</div>
          <div style={{fontWeight:700,fontSize:'.9rem'}}>Sélectionnez une classe ci-dessus</div>
          <div style={{fontSize:'.78rem',color:'var(--text3)'}}>Le plan est conservé par classe</div>
        </div>
      ):(
        <div className="pdc-shell">
          {mode==='layout'&&(
            <div className="pdc-palette">
              <div className="pdc-palette-hd">Éléments — glissez sur le canvas</div>
              <div className="pdc-palette-body">
                {PALETTE_ITEMS.map(sec=>(
                  <React.Fragment key={sec.section}>
                    <div className="pdc-palette-section">{sec.section}</div>
                    {sec.items.map(pi=>(
                      <div key={pi.type} className="pdc-palette-item" draggable onDragStart={e=>onPaletteDragStart(e,pi)}>
                        <div className="pdc-palette-preview"><PalPreview type={pi.type}/></div>
                        <div>
                          <div className="pdc-palette-label">{pi.label}</div>
                          <div className="pdc-palette-sub">{pi.sub}</div>
                        </div>
                      </div>
                    ))}
                  </React.Fragment>
                ))}
                <div style={{marginTop:'.8rem',padding:'.6rem .65rem',background:'rgba(59,91,219,.05)',border:'1px solid rgba(59,91,219,.14)',borderRadius:'var(--r-xs)',fontSize:'.64rem',color:'var(--text2)',lineHeight:1.65}}>
                  <strong style={{display:'block',marginBottom:'.2rem',color:'var(--text)'}}>💡 Conseils</strong>
                  Glissez un élément. Cliquez pour sélectionner et déplacer. Redimensionnez via les poignées bleues. Double-clic sur le % de zoom pour réinitialiser.
                </div>
              </div>
            </div>
          )}

          <div className="pdc-canvas-wrap" onDragOver={e=>e.preventDefault()} onDrop={onCanvasDrop}
            onClick={e=>{ if(e.target===e.currentTarget||e.target.classList.contains('pdc-canvas')) setSelectedId(null); }}
            style={{padding:20}}>
            <div ref={canvasRef} className="pdc-canvas"
              style={{width:canvasW,height:canvasH,position:'relative',flexShrink:0}}>
                <GridBg w={canvasW} h={canvasH} cell={CELL}/>
                {elements.map(renderElem)}
                {elements.length===0&&(
                  <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'1rem',pointerEvents:'none'}}>
                    <div style={{fontSize:'5rem',opacity:.06}}>🏫</div>
                    <div style={{textAlign:'center',color:'var(--text3)'}}>
                      <div style={{fontSize:'1rem',fontWeight:700,opacity:.5,marginBottom:'.35rem'}}>{mode==='layout'?'Construisez votre salle':'Passez en mode Disposition'}</div>
                      <div style={{fontSize:'.78rem',opacity:.4}}>{mode==='layout'?'Glissez des éléments depuis la palette de gauche':''}</div>
                    </div>
                  </div>
                )}
                {/* Poignée resize canvas */}
                <div onMouseDown={onCanvasResizeStart}
                  style={{position:'absolute',bottom:0,right:0,width:20,height:20,cursor:'se-resize',zIndex:50,
                    display:'flex',alignItems:'center',justifyContent:'center',opacity:.4}}
                  title="Redimensionner le canvas">

                        <div style={{display:'flex',alignItems:'center',gap:'.4rem',minWidth:0}}>
                          <div className="pdc-eleve-avatar" style={{background:'var(--success)'}}>{initiales(e.nom)}</div>
                          <span style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.nom}</span>
                          <span style={{marginLeft:'auto',fontSize:'.65rem',color:'var(--success)'}}>✓</span>
                        </div>
                        {onNav&&<button onClick={ev=>{ev.stopPropagation();setPdcBilanEl(e);}}
                          style={{border:'none',background:'rgba(59,91,219,.1)',color:'var(--accent)',borderRadius:4,fontSize:'.58rem',fontWeight:700,padding:'2px 5px',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>

                        </button>}
                      </div>

                )}
              </div>
              <div style={{padding:'.6rem .75rem',borderTop:'1px solid var(--border)',fontSize:'.64rem',color:'var(--text2)',lineHeight:1.7,background:'var(--surface2)'}}>
                <strong style={{display:'block',marginBottom:'.2rem',color:'var(--text)'}}>Légende</strong>
                <span style={{color:'var(--danger)'}}>⛔</span> Binôme à éviter<br/>

                {/* Sélecteur de séance */}

                    <option key={s.id} value={s.id}>

            </div>
          )}
        </div>

    </div>
    {/* Mini-bilan élève depuis PDC */}
    {pdcBilanEl&&(()=>{

      return(
        <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setPdcBilanEl(null)}>

              <div>
                <h2>{pdcBilanEl.nom}</h2>
                <div className="modal-hd-sub">{cls?.name} · {sess.length} séance{sess.length!==1?'s':''} enregistrée{sess.length!==1?'s':''}</div>

              <button className="close-btn" onClick={()=>setPdcBilanEl(null)}>×</button>

            <div className="modal-body" style={{padding:'1rem 1.25rem'}}>
              <div style={{fontSize:'.63rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.55rem'}}>Récapitulatif des observations</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:'.42rem',marginBottom:'1rem'}}>
                {OBS.map(o=>{
                  const cnt=sess.reduce((acc,s)=>acc+(s.obs&&s.obs[pdcBilanEl.id+'_'+o.id]?1:0),0);
                  const col=o.k==='neg'?'var(--danger)':o.k==='pos'?'var(--success)':'var(--warning)';
                  return(
                    <div key={o.id} style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.5rem .7rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-xs)',opacity:cnt===0?.4:1}}>
                      <span style={{fontSize:'1rem'}}>{o.emoji}</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:'.72rem'}}>{o.label}</div>

                      </div>

              {sess.length>0&&<>
                <div style={{fontSize:'.63rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.38rem'}}>Détail par séance</div>
                <div style={{display:'flex',flexDirection:'column',gap:'.25rem',maxHeight:240,overflowY:'auto'}}>
                  {sess.map(s=>{
                    const obsActifs=OBS.filter(o=>s.obs&&s.obs[pdcBilanEl.id+'_'+o.id]);
                    return(
                      <div key={s.id} style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.38rem .6rem',background:'var(--surface2)',borderRadius:'var(--r-xs)',border:'1px solid var(--border)'}}>
                        <div style={{minWidth:72,flexShrink:0}}>
                          <div style={{fontSize:'.68rem',fontWeight:700}}>{s.date&&new Date(s.date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
                          <div style={{fontSize:'.6rem',color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:68}}>{s.label}</div>
                        </div>
                        {obsActifs.length===0
                          ?<span style={{fontSize:'.7rem',color:'var(--text3)',fontStyle:'italic'}}>Rien de noté</span>
                          :<div style={{display:'flex',gap:'.18rem',flexWrap:'wrap'}}>
                            {obsActifs.map(o=>{
                              const bg=o.k==='neg'?'#fee2e2':o.k==='pos'?'#dcfce7':'#fef9c3';
                              const cl=o.k==='neg'?'#991b1b':o.k==='pos'?'#166534':'#854d0e';
                              return <span key={o.id} style={{display:'inline-flex',alignItems:'center',gap:'.15rem',padding:'.1rem .38rem',borderRadius:99,background:bg,color:cl,fontSize:'.68rem',fontWeight:600}}>{o.emoji} {o.label}</span>;
                            })}
                          </div>}
                      </div>
                    );
                  })}
                </div>
              </>}
              {onNav&&<div style={{marginTop:'1rem',paddingTop:'.75rem',borderTop:'1px solid var(--border)',textAlign:'right'}}>
                <button className="btn btn-ghost" style={{fontSize:'.75rem'}} onClick={()=>{setPdcBilanEl(null);onNav('suivi');}}>
                  👥 Ouvrir le suivi complet de la classe →
                </button>
              </div>}
            </div>
          </div>
        </div>
      );
    })()}
    {showDupModal&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowDupModal(false)}>
        <div className="modal" style={{maxWidth:420}}>
          <div className="modal-hd">
            <div>
              <h2>⧉ Dupliquer la salle</h2>
              <div className="modal-hd-sub">Copie la disposition des tables sans les élèves</div>
            </div>
            <button className="close-btn" onClick={()=>setShowDupModal(false)}>×</button>
          </div>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            <div style={{fontSize:'.8rem',color:'var(--text2)',padding:'.55rem .75rem',background:'rgba(59,91,219,.06)',border:'1px solid rgba(59,91,219,.15)',borderRadius:'var(--r-xs)',lineHeight:1.6}}>
              Sélectionnez les classes qui recevront la même disposition de tables que <strong>{cls?.name}</strong>. Les placements d'élèves existants ne seront pas écrasés.
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'.35rem',maxHeight:240,overflowY:'auto'}}>
              {classes.filter(c=>c.id!==selCls).map(c=>{
                const checked=dupTargets.includes(c.id);
                return(
                  <label key={c.id} style={{display:'flex',alignItems:'center',gap:'.65rem',padding:'.5rem .75rem',borderRadius:'var(--r-xs)',border:`1.5px solid ${checked?'var(--accent)':'var(--border)'}`,background:checked?'rgba(59,91,219,.06)':'var(--surface2)',cursor:'pointer',transition:'all .15s'}}>
                    <input type="checkbox" checked={checked} onChange={()=>setDupTargets(t=>checked?t.filter(x=>x!==c.id):[...t,c.id])} style={{accentColor:'var(--accent)',width:15,height:15,cursor:'pointer'}}/>
                    <span style={{fontWeight:600,fontSize:'.83rem'}}>{c.name}</span>
                    {(plans[c.id]?.elements||[]).length>0&&<span style={{marginLeft:'auto',fontSize:'.65rem',color:'var(--text3)',fontStyle:'italic'}}>plan existant</span>}
                  </label>
                );
              })}
              {classes.filter(c=>c.id!==selCls).length===0&&(
                <div style={{textAlign:'center',color:'var(--text3)',fontSize:'.8rem',padding:'1rem',fontStyle:'italic'}}>Aucune autre classe disponible.</div>
              )}
            </div>
          </div>
          <div style={{padding:'.75rem 1.25rem',borderTop:'1px solid var(--border)',display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
            <button className="btn" onClick={()=>setShowDupModal(false)}>Annuler</button>
            <button className="btn btn-primary" disabled={dupTargets.length===0} onClick={()=>{
              const srcPlan=plans[selCls]||{elements:[],flags:{}};
              const elemsCopy=srcPlan.elements.map(el=>({...el,seatEleves:{}}));
              setPlans(p=>{
                const next={...p};
                dupTargets.forEach(tid=>{
                  const existing=p[tid]||{elements:[],flags:{}};
                  next[tid]={...existing,elements:elemsCopy,nomSalle:srcPlan.nomSalle||existing.nomSalle||''};
                });
                return next;
              });
              setShowDupModal(false);
              setDupTargets([]);
              alert(`✅ Disposition copiée vers ${dupTargets.length} classe${dupTargets.length>1?'s':''}.`);
            }}>⧉ Dupliquer ({dupTargets.length} classe{dupTargets.length>1?'s':''})</button>
          </div>
        </div>
      </div>
    )}
  </>);
}

/* ══ SHELL ═══════════════════════════════════════════════════════════════ */
/* ══ MODULE 9 — PROGRESSION ANNUELLE ═══════════════════════════════════ */
const EVAL_TYPES=[
  {id:'ecrit',  label:'Écrit',   cls:'et-ecrit'},
  {id:'oral',   label:'Oral',    cls:'et-oral'},
  {id:'projet', label:'Projet',  cls:'et-projet'},
  {id:'ds',     label:'DS',      cls:'et-ds'},
];
const TRIMS=['T1','T2','T3'];
const NIVEAUX_CECRL=['A1','A2','B1','B2','C1','C2'];

function ProgressionAnnuelle({profile}){
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const[progs,setProgs]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-progs')||'{}')}catch{return{}}});
  const[programmes,setProgrammes]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-programmes')||'[]')}catch{return[]}});
  const[selCls,setSelCls]=useState(null);
  const[showNewSeq,setShowNewSeq]=useState(false);
  const[newSeqForm,setNewSeqForm]=useState({titre:'',trim:'T1',dateDebut:'',dateFin:'',programmeId:''});
  const[expanded,setExpanded]=useState({});
  const[showAddEval,setShowAddEval]=useState(null);
  const[evalForm,setEvalForm]=useState({titre:'',type:'ecrit',date:''});
  const[showProgrammes,setShowProgrammes]=useState(false);
  const[progForm,setProgForm]=useState({titre:'',niveau:'',description:''});
  const[selProgrammeNiveau,setSelProgrammeNiveau]=useState('');
  const[progDetail,setProgDetail]=useState(null);

  useEffect(()=>{localStorage.setItem('cdc-progs',JSON.stringify(progs))},[progs]);
  useEffect(()=>{localStorage.setItem('cdc-programmes',JSON.stringify(programmes))},[programmes]);

  const clsProg=progs[selCls]||{sequences:[]};
  const seqs=clsProg.sequences||[];

  const updateProg=(newData)=>setProgs(p=>({...p,[selCls]:{...(p[selCls]||{}),sequences:newData}}));

  const profileNiveaux=profile?.niveaux||[...NIVEAUX_COLLEGE,...NIVEAUX_LYCEE];
  const programmesForCls=programmes;
  const filteredProgrammes=selProgrammeNiveau?programmes.filter(p=>p.niveau===selProgrammeNiveau):programmes;

  const addSeq=()=>{
    if(!newSeqForm.titre.trim()||!selCls)return;
    const s={id:'seq'+Date.now(),titre:newSeqForm.titre,trim:newSeqForm.trim,dateDebut:newSeqForm.dateDebut,dateFin:newSeqForm.dateFin,
      programmeId:newSeqForm.programmeId,notionsCulturelles:'',objectifs:'',competencesCecrl:[],evaluations:[]};
    updateProg([...seqs,s]);
    setExpanded(e=>({...e,['seq'+Date.now()]:true}));
    setShowNewSeq(false);setNewSeqForm({titre:'',trim:'T1',dateDebut:'',dateFin:'',programmeId:''});
  };
  const delSeq=id=>{if(!confirm('Supprimer cette séquence ?'))return;updateProg(seqs.filter(s=>s.id!==id));};
  const updateSeq=(id,key,val)=>{updateProg(seqs.map(s=>s.id===id?{...s,[key]:val}:s));};
  const toggleCecrl=(seqId,lvl)=>{
    const seq=seqs.find(s=>s.id===seqId);if(!seq)return;
    const cur=seq.competencesCecrl||[];
    const next=cur.includes(lvl)?cur.filter(x=>x!==lvl):[...cur,lvl];
    updateSeq(seqId,'competencesCecrl',next);
  };
  const addEval=(seqId)=>{
    if(!evalForm.titre.trim())return;
    const ev={id:'ev'+Date.now(),...evalForm};
    updateProg(seqs.map(s=>s.id===seqId?{...s,evaluations:[...(s.evaluations||[]),ev]}:s));
    setShowAddEval(null);setEvalForm({titre:'',type:'ecrit',date:''});
  };
  const delEval=(seqId,evId)=>{
    updateProg(seqs.map(s=>s.id===seqId?{...s,evaluations:(s.evaluations||[]).filter(e=>e.id!==evId)}:s));
  };
  const addProgramme=()=>{
    if(!progForm.titre.trim())return;
    setProgrammes(p=>[...p,{id:'prog'+Date.now(),titre:progForm.titre.trim(),niveau:progForm.niveau.trim(),description:progForm.description.trim()}]);
    setProgForm({titre:'',niveau:'',description:''});
  };
  const delProgramme=(id)=>{setProgrammes(p=>p.filter(x=>x.id!==id));};
  const toggleExpand=(id)=>setExpanded(e=>({...e,[id]:!e[id]}));

  // Stats by trimestre
  const statsByTrim=TRIMS.map(t=>({trim:t,cnt:seqs.filter(s=>s.trim===t).length,evals:seqs.filter(s=>s.trim===t).reduce((a,s)=>a+(s.evaluations||[]).length,0)}));

  return(<>
    <div className="page-hd" style={{flexDirection:'row',alignItems:'center',flexWrap:'wrap',gap:'.75rem',paddingBottom:'1rem'}}>
      <div style={{flex:1,minWidth:0}}>
        <div className="phd-badge">📆 Progression annuelle</div>
        <div className="phd-title">Planification des séquences</div>
        <div className="phd-sub">{selCls?classes.find(c=>c.id===selCls)?.name+' · '+seqs.length+' séquence(s)':'Sélectionnez un niveau / classe'}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap',flexShrink:0}}>
        {selCls&&<>
          {statsByTrim.map(st=>(
            <div key={st.trim} style={{textAlign:'center',padding:'.4rem .75rem',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.18)',borderRadius:10,minWidth:58}}>
              <div style={{fontSize:'.58rem',color:'rgba(255,255,255,.6)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em'}}>{st.trim}</div>
              <div style={{fontFamily:'Roboto Slab,serif',fontSize:'1.1rem',fontWeight:800,color:'#fff',lineHeight:1.1}}>{st.cnt}<span style={{fontSize:'.6rem',fontWeight:500,opacity:.75,marginLeft:'.18rem'}}>séq.</span></div>
            </div>
          ))}
          <div style={{textAlign:'center',padding:'.4rem .75rem',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.18)',borderRadius:10,minWidth:58}}>
            <div style={{fontSize:'.58rem',color:'rgba(255,255,255,.6)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em'}}>Évals</div>
            <div style={{fontFamily:'Roboto Slab,serif',fontSize:'1.1rem',fontWeight:800,color:'#fff',lineHeight:1.1}}>{seqs.reduce((a,s)=>a+(s.evaluations||[]).length,0)}</div>
          </div>
        </>}
        <button className="btn btn-ghost" style={{flexShrink:0}} onClick={()=>setShowProgrammes(true)}>📚 Programmes</button>
        <button className="btn btn-white" style={{flexShrink:0}} onClick={()=>setShowNewSeq(true)}>✚ Créer une séquence</button>
      </div>
    </div>

    <div className="prog-layout">
      {/* Sidebar classes/niveaux */}
      <div className="prog-sidebar">
        <div className="prog-sidebar-hd">Niveaux / Classes</div>
        <div style={{overflowY:'auto',flex:1}}>
          {classes.length===0&&<div style={{padding:'.875rem',fontSize:'.76rem',color:'var(--text3)',fontStyle:'italic'}}>Créez des classes dans Suivi de classe</div>}
          {classes.map(c=>(
            <button key={c.id} className={`prog-cls-btn ${selCls===c.id?'on':''}`} onClick={()=>setSelCls(c.id)}>
              <span>{c.name}</span>
              <span style={{fontSize:'.67rem',color:'var(--text3)',fontWeight:400}}>{(progs[c.id]?.sequences||[]).length} séq.</span>
            </button>
          ))}
        </div>
      </div>

      {/* Main séquences */}
      <div className="prog-main">
        {!selCls?(
          <div className="prog-empty">
            <div style={{fontSize:'2.5rem',opacity:.25}}>📆</div>
            <div style={{fontWeight:700}}>Sélectionnez une classe pour commencer</div>
          </div>
        ):seqs.length===0?(
          <div className="prog-empty">
            <div style={{fontSize:'2.5rem',opacity:.25}}>📆</div>
            <div style={{fontWeight:700}}>Aucune séquence</div>
            <button className="btn btn-primary" onClick={()=>setShowNewSeq(true)}>+ Créer la première séquence</button>
          </div>
        ):(
          <div className="prog-seq-list">
            {seqs.map((seq,idx)=>{
              const isOpen=expanded[seq.id];
              return(
                <div key={seq.id} className="prog-seq-card">
                  <div className="prog-seq-hd" onClick={()=>toggleExpand(seq.id)}>
                    <div className="prog-seq-num">{idx+1}</div>
                    <div style={{flex:1}}>
                      <div className="prog-seq-title">{seq.titre}</div>
                      <div className="prog-seq-period">
                        <span className="prog-badge-tri">{seq.trim}</span>
                        {seq.programmeId&&programmes.find(p=>p.id===seq.programmeId)&&<span style={{marginLeft:'.4rem',background:'rgba(124,58,237,.12)',color:'#7c3aed',fontWeight:700,fontSize:'.68rem',padding:'.1rem .42rem',borderRadius:99,border:'1px solid rgba(124,58,237,.2)'}}>📚 {programmes.find(p=>p.id===seq.programmeId).titre}</span>}
                        {seq.dateDebut&&<span style={{marginLeft:'.4rem'}}>{new Date(seq.dateDebut+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
                          {seq.dateFin&&' → '+new Date(seq.dateFin+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>}
                        {(seq.evaluations||[]).length>0&&<span style={{marginLeft:'.6rem',color:'var(--warning)',fontWeight:600}}>{(seq.evaluations||[]).length} éval.</span>}
                      </div>
                    </div>
                    <div className="prog-seq-actions" onClick={e=>e.stopPropagation()}>
                      <button className="btn btn-icon" style={{fontSize:'.75rem'}} onClick={()=>setShowAddEval(seq.id)} title="Ajouter une évaluation">📝</button>
                      <button className="btn btn-icon" style={{fontSize:'.75rem',color:'var(--danger)'}} onClick={()=>delSeq(seq.id)} title="Supprimer">🗑️</button>
                      <span style={{color:'var(--text3)',fontSize:'.8rem',padding:'.3rem'}}>{isOpen?'▲':'▼'}</span>
                    </div>
                  </div>

                  {isOpen&&(
                    <div className="prog-seq-body">
                      {/* Trimestre + dates */}
                      <div className="cs-section">
                        <div className="prog-field-lbl">📅 Trimestre</div>
                        <div className="seg" style={{width:'fit-content'}}>
                          {TRIMS.map(t=><button key={t} className={seq.trim===t?'on':''} onClick={()=>updateSeq(seq.id,'trim',t)}>{t}</button>)}
                        </div>
                      </div>
                      {programmesForCls.length>0&&(
                      <div className="cs-section">
                        <div className="prog-field-lbl">📚 Thème du programme</div>
                        <select className="prog-field-in" value={seq.programmeId||''} onChange={e=>updateSeq(seq.id,'programmeId',e.target.value)}
                          style={{width:'100%',padding:'.42rem .65rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface2)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.85rem'}}>
                          <option value="">— Aucun thème associé —</option>
                          {profileNiveaux.filter(n=>programmesForCls.some(p=>p.niveau===n)).map(n=>(
                            <optgroup key={n} label={n}>
                              {programmesForCls.filter(p=>p.niveau===n).map(p=>(
                                <option key={p.id} value={p.id}>{p.titre}</option>
                              ))}
                            </optgroup>
                          ))}
                          {programmesForCls.filter(p=>!p.niveau).length>0&&(
                            <optgroup label="Tous niveaux">
                              {programmesForCls.filter(p=>!p.niveau).map(p=>(
                                <option key={p.id} value={p.id}>{p.titre}</option>
                              ))}
                            </optgroup>
                          )}
                        </select>
                        {seq.programmeId&&programmes.find(p=>p.id===seq.programmeId)?.description&&(
                          <div style={{fontSize:'.76rem',color:'var(--text2)',marginTop:'.35rem',fontStyle:'italic',lineHeight:1.5}}>{programmes.find(p=>p.id===seq.programmeId).description}</div>
                        )}
                      </div>
                      )}
                      <div className="cs-section">
                        <div className="prog-field-lbl">📅 Dates</div>
                        <div style={{display:'flex',gap:'.35rem',alignItems:'center',flexWrap:'wrap'}}>
                          <input type="date" className="prog-field-in" style={{flex:1}} value={seq.dateDebut||''} onChange={e=>updateSeq(seq.id,'dateDebut',e.target.value)}/>
                          <span style={{color:'var(--text3)',fontSize:'.75rem'}}>→</span>
                          <input type="date" className="prog-field-in" style={{flex:1}} value={seq.dateFin||''} onChange={e=>updateSeq(seq.id,'dateFin',e.target.value)}/>
                        </div>
                      </div>

                      {/* Notions culturelles */}
                      <div className="cs-section prog-seq-full">
                        <div className="prog-field-lbl">🌍 Notions culturelles</div>
                        <textarea className="prog-field-ta" value={seq.notionsCulturelles||''} onChange={e=>updateSeq(seq.id,'notionsCulturelles',e.target.value)} placeholder="Thèmes culturels abordés, repères civilisationnels…"/>
                      </div>

                      {/* Objectifs linguistiques */}
                      <div className="cs-section prog-seq-full">
                        <div className="prog-field-lbl">🎯 Objectifs (linguistiques, communicatifs…)</div>
                        <textarea className="prog-field-ta" value={seq.objectifs||''} onChange={e=>updateSeq(seq.id,'objectifs',e.target.value)} placeholder="Compétences visées, structures grammaticales, lexique, fonctions langagières…"/>
                      </div>

                      {/* Compétences CECRL */}
                      <div className="cs-section prog-seq-full">
                        <div className="prog-field-lbl">🏅 Niveaux CECRL ciblés</div>
                        <div style={{display:'flex',gap:'.35rem',flexWrap:'wrap',marginTop:'.1rem'}}>
                          {NIVEAUX_CECRL.map(lvl=>(
                            <button key={lvl}
                              style={{padding:'.28rem .7rem',borderRadius:99,border:'1.5px solid var(--border)',background:(seq.competencesCecrl||[]).includes(lvl)?'var(--accent)':'var(--surface2)',color:(seq.competencesCecrl||[]).includes(lvl)?'#fff':'var(--text2)',fontWeight:700,fontSize:'.78rem',cursor:'pointer',transition:'all .13s',fontFamily:'Roboto,sans-serif'}}
                              onClick={()=>toggleCecrl(seq.id,lvl)}>{lvl}</button>
                          ))}
                        </div>
                      </div>

                      {/* Évaluations */}
                      <div className="cs-section prog-seq-full">
                        <div className="prog-field-lbl" style={{marginBottom:'.38rem'}}>📝 Évaluations prévues
                          <button className="btn" style={{marginLeft:'auto',fontSize:'.68rem',padding:'.18rem .5rem'}} onClick={()=>setShowAddEval(seq.id)}>+ Ajouter</button>
                        </div>
                        {(seq.evaluations||[]).length===0?(
                          <div style={{fontSize:'.76rem',color:'var(--text3)',fontStyle:'italic',padding:'.25rem 0'}}>Aucune évaluation prévue</div>
                        ):(
                          <div style={{display:'flex',flexDirection:'column',gap:'.28rem'}}>
                            {(seq.evaluations||[]).map(ev=>{
                              const et=EVAL_TYPES.find(t=>t.id===ev.type);
                              return(
                                <div key={ev.id} className="prog-eval-row">
                                  <span className={`prog-eval-type ${et?.cls}`}>{et?.label||ev.type}</span>
                                  <span style={{flex:1,fontWeight:500}}>{ev.titre}</span>
                                  {ev.date&&<span style={{fontSize:'.67rem',color:'var(--text2)'}}>{new Date(ev.date+'T12:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>}
                                  <button onClick={()=>delEval(seq.id,ev.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:'.78rem',padding:'.05rem .22rem',borderRadius:4}}>×</button>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>

    {/* Modal nouvelle séquence */}
    {showNewSeq&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowNewSeq(false)}>
        <div className="modal" style={{maxWidth:430}}>
          <div className="modal-hd"><div><h2>Nouvelle séquence</h2></div><button className="close-btn" onClick={()=>setShowNewSeq(false)}>×</button></div>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            <div className="field"><label>Titre *</label><input type="text" autoFocus placeholder="Ex : La ville, L'environnement…" value={newSeqForm.titre} onChange={e=>setNewSeqForm(f=>({...f,titre:e.target.value}))}/></div>
            <div className="field"><label>Trimestre</label>
              <div className="seg" style={{width:'fit-content'}}>
                {TRIMS.map(t=><button key={t} className={newSeqForm.trim===t?'on':''} onClick={()=>setNewSeqForm(f=>({...f,trim:t}))}>{t}</button>)}
              </div>
            </div>
            <div className="field-row">
              <div className="field"><label>Début</label><input type="date" value={newSeqForm.dateDebut} onChange={e=>setNewSeqForm(f=>({...f,dateDebut:e.target.value}))}/></div>
              <div className="field"><label>Fin</label><input type="date" value={newSeqForm.dateFin} onChange={e=>setNewSeqForm(f=>({...f,dateFin:e.target.value}))}/></div>
            </div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setShowNewSeq(false)}>Annuler</button>
              <button className="btn btn-primary" onClick={addSeq} disabled={!newSeqForm.titre.trim()}>Créer</button>
            </div>
          </div>
        </div>
      </div>
    )}

    {/* Modal ajout évaluation */}
    {showAddEval&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowAddEval(null)}>
        <div className="modal" style={{maxWidth:400}}>
          <div className="modal-hd"><div><h2>Ajouter une évaluation</h2></div><button className="close-btn" onClick={()=>setShowAddEval(null)}>×</button></div>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            <div className="field"><label>Titre *</label><input type="text" autoFocus placeholder="Ex : Contrôle vocabulaire, Expression écrite…" value={evalForm.titre} onChange={e=>setEvalForm(f=>({...f,titre:e.target.value}))}/></div>
            <div className="field"><label>Type</label>
              <div style={{display:'flex',gap:'.35rem',flexWrap:'wrap'}}>
                {EVAL_TYPES.map(t=>(
                  <button key={t.id}
                    style={{padding:'.3rem .72rem',borderRadius:99,border:'1.5px solid var(--border)',background:evalForm.type===t.id?'var(--accent)':'var(--surface2)',color:evalForm.type===t.id?'#fff':'var(--text2)',fontWeight:600,fontSize:'.76rem',cursor:'pointer',fontFamily:'Roboto,sans-serif'}}
                    onClick={()=>setEvalForm(f=>({...f,type:t.id}))}>{t.label}</button>
                ))}
              </div>
            </div>
            <div className="field"><label>Date prévue</label><input type="date" value={evalForm.date} onChange={e=>setEvalForm(f=>({...f,date:e.target.value}))}/></div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setShowAddEval(null)}>Annuler</button>
              <button className="btn btn-primary" onClick={()=>addEval(showAddEval)} disabled={!evalForm.titre.trim()}>Ajouter</button>
            </div>
          </div>
        </div>
      </div>
    )}

    {/* Modal Programmes */}
    {showProgrammes&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowProgrammes(false)}>
        <div className="modal" style={{maxWidth:560,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
          <div className="modal-hd">
            <div><h2>📚 Programmes</h2><div className="modal-hd-sub">Thèmes à associer aux séquences</div></div>
            <button className="close-btn" onClick={()=>setShowProgrammes(false)}>×</button>
          </div>
          <div className="modal-body" style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:'1rem'}}>
            <div style={{padding:'.875rem 1rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)',display:'flex',flexDirection:'column',gap:'.6rem'}}>
              <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.07em'}}>Nouveau thème</div>
              <div style={{display:'flex',gap:'.5rem'}}>
                <input placeholder="Titre du thème *" value={progForm.titre} onChange={e=>setProgForm(f=>({...f,titre:e.target.value}))}
                  style={{flex:2,padding:'.42rem .65rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.85rem'}}/>
                <select value={progForm.niveau} onChange={e=>setProgForm(f=>({...f,niveau:e.target.value}))}
                  style={{flex:1,padding:'.42rem .65rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.85rem'}}>
                  <option value="">— Niveau —</option>
                  {profileNiveaux.map(n=><option key={n} value={n}>{n}</option>)}
                </select>
              </div>
              <div style={{display:'flex',gap:'.5rem',alignItems:'flex-end'}}>
                <textarea placeholder="Description (optionnel)" value={progForm.description} onChange={e=>setProgForm(f=>({...f,description:e.target.value}))} rows={2}
                  style={{flex:1,padding:'.42rem .65rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.82rem',resize:'vertical',lineHeight:1.5}}/>
                <button className="btn btn-primary" style={{flexShrink:0,alignSelf:'flex-end'}} onClick={addProgramme} disabled={!progForm.titre.trim()||!progForm.niveau}>Ajouter</button>
              </div>
            </div>
            {programmes.length>0&&(
              <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
                <span style={{fontSize:'.72rem',fontWeight:600,color:'var(--text3)'}}>Filtrer :</span>
                <button onClick={()=>setSelProgrammeNiveau('')} style={{padding:'.22rem .65rem',borderRadius:99,border:'1.5px solid var(--border)',background:selProgrammeNiveau===''?'var(--accent)':'var(--surface2)',color:selProgrammeNiveau===''?'#fff':'var(--text2)',fontSize:'.73rem',fontWeight:600,cursor:'pointer',fontFamily:'Roboto,sans-serif'}}>Tous</button>
                {profileNiveaux.filter(n=>programmes.some(p=>p.niveau===n)).map(n=>(
                  <button key={n} onClick={()=>setSelProgrammeNiveau(n)} style={{padding:'.22rem .65rem',borderRadius:99,border:'1.5px solid var(--border)',background:selProgrammeNiveau===n?'var(--accent)':'var(--surface2)',color:selProgrammeNiveau===n?'#fff':'var(--text2)',fontSize:'.73rem',fontWeight:600,cursor:'pointer',fontFamily:'Roboto,sans-serif'}}>{n}</button>
                ))}
              </div>
            )}
            {programmes.length===0?(
              <div style={{textAlign:'center',padding:'2rem',color:'var(--text3)',fontSize:'.82rem',fontStyle:'italic'}}>Aucun thème créé. Ajoutez-en un ci-dessus.</div>
            ):filteredProgrammes.length===0?(
              <div style={{textAlign:'center',padding:'1.5rem',color:'var(--text3)',fontSize:'.82rem',fontStyle:'italic'}}>Aucun thème pour ce niveau.</div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:'.4rem'}}>
                <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.1rem'}}>{filteredProgrammes.length} thème{filteredProgrammes.length>1?'s':''}</div>
                {filteredProgrammes.map(p=>{
                  const usedIn=Object.values(progs).flatMap(cl=>(cl.sequences||[]).filter(s=>s.programmeId===p.id)).length;
                  const desc=p.description||'';
                  const truncated=desc.length>90?desc.slice(0,90)+'…':desc;
                  return(
                    <div key={p.id}
                      style={{display:'flex',alignItems:'flex-start',gap:'.65rem',padding:'.65rem .875rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)',cursor:desc?'pointer':'default',transition:'all .15s'}}
                      onMouseEnter={e=>{if(desc){e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.background='var(--surface)';}}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface2)';}}
                      onClick={e=>{e.stopPropagation();if(desc)setProgDetail(p);}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
                          <span style={{fontWeight:700,fontSize:'.88rem'}}>{p.titre}</span>
                          {p.niveau&&<span style={{fontSize:'.68rem',fontWeight:700,padding:'.1rem .42rem',background:'rgba(59,91,219,.1)',color:'var(--accent)',borderRadius:99,border:'1px solid rgba(59,91,219,.2)'}}>{p.niveau}</span>}
                          {usedIn>0&&<span style={{fontSize:'.65rem',color:'var(--text3)',fontStyle:'italic'}}>{usedIn} séquence{usedIn>1?'s':''}</span>}
                        </div>
                        {desc&&<div style={{fontSize:'.76rem',color:'var(--text2)',marginTop:'.22rem',lineHeight:1.5}}>{truncated}{desc.length>90&&<span style={{color:'var(--accent)',fontWeight:600,marginLeft:'.25rem',fontSize:'.7rem'}}> Voir plus</span>}</div>}
                      </div>
                      <button onClick={e=>{e.stopPropagation();delProgramme(p.id);}}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:'.85rem',padding:'.1rem .3rem',borderRadius:4,flexShrink:0}}
                        onMouseEnter={e=>e.currentTarget.style.color='var(--danger)'}
                        onMouseLeave={e=>e.currentTarget.style.color='var(--text3)'}>×</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <div style={{padding:'.75rem 1.25rem',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={()=>setShowProgrammes(false)}>Fermer</button>
          </div>
        </div>
      </div>
    )}

    {/* Popup détail thème */}
    {progDetail&&(
      <div className="moverlay" style={{zIndex:10001}} onClick={e=>{e.stopPropagation();if(e.target===e.currentTarget)setProgDetail(null);}}>
        <div className="modal" style={{maxWidth:480}}>
          <div className="modal-hd">
            <div>
              <h2>📚 {progDetail.titre}</h2>
              {progDetail.niveau&&<div className="modal-hd-sub">{progDetail.niveau}</div>}
            </div>
            <button className="close-btn" onClick={()=>setProgDetail(null)}>×</button>
          </div>
          <div className="modal-body">
            <div style={{fontSize:'.85rem',color:'var(--text)',lineHeight:1.75,whiteSpace:'pre-wrap'}}>{progDetail.description}</div>
            {Object.values(progs).flatMap(cl=>(cl.sequences||[]).filter(s=>s.programmeId===progDetail.id)).length>0&&(
              <div style={{marginTop:'1rem',paddingTop:'.875rem',borderTop:'1px solid var(--border)'}}>
                <div style={{fontSize:'.65rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.45rem'}}>
                  Séquences liées ({Object.values(progs).flatMap(cl=>(cl.sequences||[]).filter(s=>s.programmeId===progDetail.id)).length})
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'.28rem'}}>
                  {Object.values(progs).flatMap(cl=>(cl.sequences||[]).filter(s=>s.programmeId===progDetail.id)).map(s=>(
                    <div key={s.id} style={{fontSize:'.78rem',color:'var(--text2)',padding:'.28rem .55rem',background:'var(--surface2)',borderRadius:'var(--r-xs)',borderLeft:'3px solid var(--accent)'}}>{s.titre} <span style={{opacity:.6}}>· {s.trim}</span></div>
                  ))}
                </div>
              </div>
            )}
          </div>
          <div style={{padding:'.75rem 1.25rem',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={()=>setProgDetail(null)}>Fermer</button>
          </div>
        </div>
      </div>
    )}
  </>);
}

/* ══ HELPER — ELEVE SEARCH PICKER ═══════════════════════════════════════ */
function EleveSearchPicker({eleves,selected,onToggle,placeholder,chipClass,chipPrefix}){
  const[query,setQuery]=useState('');
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  const filtered=eleves.filter(e=>e.nom.toLowerCase().includes(query.toLowerCase()));
  const selectedEleves=eleves.filter(e=>selected.includes(e.id));
  return(
    <div ref={ref}>

          onFocus={()=>setOpen(true)} placeholder={placeholder}/>
        {open&&filtered.length>0&&(
          <div className="cs-eleve-dropdown">
            {filtered.map(el=>(
              <div key={el.id} className={`cs-eleve-opt ${selected.includes(el.id)?'selected':''}`}
                onMouseDown={e=>{e.preventDefault();onToggle(el.id);setQuery('');setOpen(false);}}>
                {selected.includes(el.id)?'✓ ':''}{el.nom}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

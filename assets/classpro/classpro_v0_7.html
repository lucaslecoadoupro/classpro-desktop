<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 110'><path d='M50 8 L84 22 L84 58 Q84 80 50 96 Q16 80 16 58 L16 22 Z' fill='%231e3a8a' stroke='%23d4b483' stroke-width='2.8'/><path d='M50 63 Q40 60 30 63 L30 44 Q40 41 50 44 Z' fill='white'/><path d='M50 63 Q60 60 70 63 L70 44 Q60 41 50 44 Z' fill='white'/></svg>" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a8a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ClassPro">
<title>ClassPro — Logiciel de gestion de classe</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Slab:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f6;--surface:#fff;--surface2:#f7f8fa;--border:#e2e5ec;
  --text:#1a2236;--text2:#56637a;--text3:#9aa3b5;
  --accent:#3b5bdb;--accent-h:#2f4ac5;
  --success:#0f9b6e;--warning:#d97706;--danger:#dc2626;
  --sidebar-bg:#1a2440;--sidebar-text:rgba(255,255,255,.55);--sidebar-w:220px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.06);--shadow-s:0 2px 8px rgba(0,0,0,.08);
  --shadow:0 4px 16px rgba(0,0,0,.10);--shadow-l:0 12px 40px rgba(0,0,0,.14);
  --r:14px;--r-s:8px;--r-xs:6px;
  --accent-today-hd:#e8eeff;
}
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --accent:#6b8efb;--accent-h:#7c9dfc;
  --success:#34d399;--warning:#fbbf24;--danger:#f87171;
  --sidebar-bg:#0d1117;
  --accent-today-hd:#1e2a4a;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Roboto',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:width .25s ease}
.sidebar.collapsed{width:58px}
.sb-logo{display:flex;align-items:center;gap:.6rem;padding:.7rem .75rem;border-bottom:1px solid rgba(255,255,255,.08);min-height:50px;overflow:hidden;flex-shrink:0}
.sb-logo-icon{width:32px;height:32px;border-radius:0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-logo-text{font-family:'Roboto Slab',serif;font-size:.85rem;font-weight:800;color:#fff;white-space:nowrap;opacity:1;transition:opacity .2s .05s;flex:1}
.sidebar.collapsed .sb-logo-text{opacity:0;width:0}
.sb-theme-btn{width:26px;height:26px;border-radius:6px;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;position:relative}
.sb-theme-btn:hover{background:rgba(255,255,255,.22);color:#fff}
.sb-theme-btn:hover::after{content:attr(data-tip);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);background:#1a2440;color:#fff;font-size:.65rem;font-weight:600;padding:.22rem .55rem;border-radius:6px;white-space:nowrap;pointer-events:none;border:1px solid rgba(255,255,255,.12);z-index:999}
.sidebar.collapsed .sb-theme-btn{display:none}
.sb-nav{flex:1;padding:.4rem .5rem;overflow-y:auto;overflow-x:hidden}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-track{background:transparent}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.sb-section-hd{display:flex;align-items:center;justify-content:space-between;font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--sidebar-text);padding:.45rem .65rem .18rem;white-space:nowrap;cursor:pointer;user-select:none;border-radius:var(--r-xs);transition:background .15s;margin-top:.15rem}
.sb-section-hd:hover{background:rgba(255,255,255,.06)}
.sb-section-arrow{font-size:.55rem;opacity:.6;transition:transform .2s;flex-shrink:0}
.sb-section-arrow.open{transform:rotate(90deg)}
.sidebar.collapsed .sb-section-hd{opacity:0;height:0;padding:0;overflow:hidden;margin:0}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.44rem .65rem;border-radius:var(--r-xs);cursor:pointer;transition:all .15s;color:var(--sidebar-text);margin-bottom:.04rem;white-space:nowrap;border:none;background:none;width:100%;text-align:left;font-family:'Roboto',sans-serif;font-size:.77rem;font-weight:500}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.on{background:var(--accent);color:#fff;font-weight:700}
.sb-item-icon{font-size:.95rem;flex-shrink:0;width:18px;text-align:center}
.sb-item-label{overflow:hidden;opacity:1;transition:opacity .2s .05s;white-space:nowrap}
.sidebar.collapsed .sb-item-label{opacity:0;width:0}
.sidebar.collapsed .sb-item{padding:.5rem;justify-content:center}
.sb-footer{padding:.45rem .5rem;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:.1rem;flex-shrink:0}
.sb-profile{display:flex;align-items:center;gap:.55rem;padding:.38rem .65rem;border-radius:var(--r-xs);cursor:pointer;transition:all .15s}
.sb-profile:hover{background:rgba(255,255,255,.08)}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#3b5bdb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-profile-name{font-size:.72rem;color:#fff;font-weight:500;white-space:nowrap;opacity:1;transition:opacity .2s .05s}
.sidebar.collapsed .sb-profile-name{opacity:0;width:0}
.sidebar.collapsed .sb-profile{justify-content:center}
.sb-collapse{display:flex;align-items:center;justify-content:center;padding:.35rem;border-radius:var(--r-xs);cursor:pointer;background:none;border:none;color:var(--sidebar-text);font-size:.8rem;transition:all .15s;width:100%}
.sb-collapse:hover{background:rgba(255,255,255,.08);color:#fff}

/* ── MAIN ── */
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}

/* ── PAGE HEADER ── */
.page-hd{background:linear-gradient(135deg,#0f1b4d 0%,#1e3a8a 35%,#3b5bdb 65%,#7c3aed 100%);padding:1.25rem 1.6rem 1rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;flex-shrink:0}
.phd-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);font-size:.66rem;font-weight:700;padding:.2rem .6rem;border-radius:99px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.45rem}
.phd-title{font-family:'Roboto Slab',serif;font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.2}
.phd-sub{margin-top:.2rem;font-size:.78rem;color:rgba(255,255,255,.58)}
.phd-actions{display:flex;gap:.45rem;flex-wrap:wrap;align-items:center}
.phd-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:.45rem;margin-top:.875rem;width:100%}
.phstat{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:11px;padding:.6rem .875rem;backdrop-filter:blur(8px)}
.phstat-label{font-size:.62rem;color:rgba(255,255,255,.55);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.1rem}
.phstat-value{font-family:'Roboto Slab',serif;font-size:1.5rem;font-weight:800;color:#fff;line-height:1}
.phstat-value.red{color:#fca5a5}

/* ── PAGE CONTENT ── */
.page-content{padding:1.1rem 1.6rem;flex:1;overflow-y:auto}

/* ── FOOTER ── */
.app-footer{padding:.6rem 1.6rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--text3);background:var(--surface);flex-shrink:0}
.footer-left{display:flex;align-items:center;gap:.5rem}

/* ── SETUP ── */
.setup-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:linear-gradient(145deg,#0f1b4d 0%,#1e3a8a 40%,#3b3f9e 70%,#5b21b6 100%)}
.setup-card{background:#fff;border-radius:20px;padding:2.25rem 2.5rem;width:100%;max-width:490px;box-shadow:0 24px 80px rgba(0,0,0,.4);animation:fadeUp .4s ease}
[data-theme="dark"] .setup-card{background:var(--surface);border:1px solid var(--border)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.setup-logo{width:50px;height:50px;background:linear-gradient(135deg,#1e3a8a,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1.1rem;box-shadow:0 4px 16px rgba(59,91,219,.4)}
.setup-title{font-family:'Roboto Slab',serif;font-size:1.45rem;font-weight:800;color:var(--text);margin-bottom:.25rem;letter-spacing:-.02em}
.setup-sub{font-size:.8rem;color:var(--text2);margin-bottom:1.6rem}
.setup-form{display:flex;flex-direction:column;gap:.8rem}
.field{display:flex;flex-direction:column;gap:.28rem}
.field label{font-size:.72rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}
.field input,.field select{padding:.65rem .875rem;border:1.5px solid var(--border);border-radius:var(--r-s);background:var(--surface2);color:var(--text);font-family:'Roboto',sans-serif;font-size:.88rem;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.12);background:var(--surface)}
.field input::placeholder{color:var(--text3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.btn-setup{margin-top:.2rem;padding:.75rem 1rem;background:linear-gradient(135deg,#1e3a8a,#4f46e5);color:#fff;border:none;border-radius:var(--r-s);font-family:'Roboto',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(59,91,219,.35)}
.btn-setup:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,91,219,.45)}
.btn-setup:disabled{opacity:.5;cursor:not-allowed;transform:none}
.setup-footer{margin-top:1.1rem;text-align:center;font-size:.68rem;color:var(--text3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:.38rem;padding:.46rem .9rem;border-radius:var(--r-s);border:1px solid var(--border);font-family:'Roboto',sans-serif;font-size:.77rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;background:var(--surface);color:var(--text)}
.btn:hover{background:var(--surface2);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.22);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.24);color:#fff}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.btn-primary:hover{background:var(--accent-h)}
.btn-white{background:#fff;color:#1e3a8a;border-color:transparent;font-weight:700}
.btn-white:hover{background:#f0f0ff}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#b91c1c}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center}
input[type="file"]{display:none}

/* ── CONSEIL ── */
.main-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-xs)}
.ctrl-bar{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;border-bottom:1px solid var(--border);gap:.55rem;flex-wrap:wrap;background:var(--surface2)}
.ctrl-left{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-s);overflow:hidden}
.seg button{padding:.37rem .78rem;border:none;background:transparent;color:var(--text2);font-family:'Roboto',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s}
.seg button.on{background:var(--accent);color:#fff;font-weight:700}
.seg button:hover:not(.on){color:var(--text);background:var(--border)}
.trim-btn{padding:.33rem .68rem;border-radius:var(--r-s);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s}
.trim-btn:hover{border-color:var(--accent);color:var(--accent)}
.trim-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.search{padding:.4rem .82rem;border:1.5px solid var(--border);border-radius:var(--r-s);background:var(--surface);color:var(--text);font-family:'Roboto',sans-serif;font-size:.8rem;width:210px;transition:border-color .2s}
.search:focus{outline:none;border-color:var(--accent)}
.search::placeholder{color:var(--text3)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .25s;background:var(--surface2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(59,91,219,.04)}
.upload-icon{font-size:2rem;margin-bottom:.45rem;opacity:.4}
.upload-title{font-size:.9rem;font-weight:700;margin-bottom:.22rem}
.upload-hint{font-size:.76rem;color:var(--text2)}
.slist{display:flex;flex-direction:column;gap:.42rem;padding:.75rem}
.scard{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:.875rem 1.05rem;cursor:pointer;transition:all .18s}
.scard:hover{border-color:var(--accent);background:var(--surface);box-shadow:var(--shadow-s);transform:translateY(-2px)}
.scard-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.scard-name{font-size:.92rem;font-weight:700;display:flex;align-items:center;gap:.32rem}
.scard-meta{font-size:.7rem;color:var(--text2);margin-top:.08rem}
.scard-stats{display:flex;gap:1rem;align-items:center}
.sb{text-align:center}
.sb-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.06rem}
.sb-val{font-family:'Roboto Slab',serif;font-size:1.35rem;font-weight:800;line-height:1}
.sb-val.excellent{color:var(--success)}.sb-val.good{color:var(--accent)}.sb-val.average{color:var(--warning)}.sb-val.poor{color:var(--danger)}
.sb-sub{font-size:.62rem;color:var(--text3);margin-top:.05rem}
.evo{padding:.22rem .52rem;border-radius:6px;font-size:.7rem;font-weight:700;display:inline-flex;align-items:center;gap:.1rem}
.evo-up{background:#dcfce7;color:#166534}.evo-down{background:#fee2e2;color:#991b1b}
.evo-stab{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.evo-none{background:var(--surface2);color:var(--text3);border:1px solid var(--border);font-size:.63rem}
[data-theme="dark"] .evo-up{background:#14532d;color:#86efac}
[data-theme="dark"] .evo-down{background:#7f1d1d;color:#fca5a5}
.aprev{padding:.52rem .78rem;background:var(--surface);border-left:3px solid var(--accent);border-radius:4px;font-size:.74rem;font-style:italic;color:var(--text2);line-height:1.5}
.aprev strong{font-style:normal;color:var(--text);margin-right:.28rem}
.cview{display:flex;flex-direction:column;gap:.75rem;padding:.75rem}
.ccard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-xs)}
.ccard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;padding:.95rem 1.2rem;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.ccard-name{font-family:'Roboto Slab',serif;font-size:1rem;font-weight:800;display:flex;align-items:center;gap:.38rem;flex-wrap:wrap}
.ccard-meta{font-size:.7rem;color:var(--text2);margin-top:.16rem}
.avgs{display:flex;gap:.75rem;align-items:center;margin-top:.42rem;flex-wrap:wrap}
.avg-b{text-align:center}
.avg-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.07rem}
.avg-val{font-family:'Roboto Slab',serif;font-size:1.35rem;font-weight:800;line-height:1}
.avg-sep{color:var(--border);font-size:1rem;align-self:center}
.assids{display:flex;gap:.4rem;flex-shrink:0}
.assid{text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.42rem .65rem;min-width:58px}
.assid-val{font-family:'Roboto Slab',serif;font-size:1.1rem;font-weight:700;color:var(--accent)}
.assid-label{font-size:.58rem;color:var(--text3);margin-top:.05rem}
.cbody{display:grid;grid-template-columns:1fr 255px}
.csections{padding:.95rem 1.2rem;border-right:1px solid var(--border)}
.cnotes{padding:.95rem;background:var(--surface2);display:flex;flex-direction:column;gap:.42rem}
.cnotes-label{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:flex;align-items:center;gap:.26rem}
.cnotes-ta{flex:1;min-height:135px;resize:vertical;padding:.62rem .78rem;border:1.5px solid var(--border);border-radius:var(--r-s);background:var(--surface);color:var(--text);font-family:'Roboto',sans-serif;font-size:.77rem;line-height:1.6;transition:border-color .15s}
.cnotes-ta:focus{outline:none;border-color:var(--accent)}
.cnotes-ta::placeholder{color:var(--text3)}
.csec{margin-bottom:.85rem}.csec:last-child{margin-bottom:0}
.csec-title{font-size:.65rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.38rem;display:flex;align-items:center;gap:.26rem}
.csec-text{padding:.62rem .82rem;background:var(--surface2);border-left:3px solid var(--accent);border-radius:4px;font-size:.76rem;line-height:1.6}
.rchips{display:flex;flex-wrap:wrap;gap:.28rem}
.rchip{display:inline-flex;align-items:center;gap:.22rem;padding:.3rem .72rem;border-radius:20px;font-size:.7rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .13s;user-select:none}
.rchip:hover{transform:translateY(-1px)}
.rc-encou{background:#dcfce7;color:#166534;border-color:#bbf7d0}.rc-encou.on{background:#16a34a;color:#fff;border-color:#15803d}
.rc-compl{background:#bbf7d0;color:#14532d;border-color:#86efac}.rc-compl.on{background:#15803d;color:#fff}
.rc-felic{background:#fef9c3;color:#713f12;border-color:#fde047}.rc-felic.on{background:#ca8a04;color:#fff;border-color:#a16207}
.rc-mgt{background:#fee2e2;color:#991b1b;border-color:#fca5a5}.rc-mgt.on{background:#dc2626;color:#fff}
.rc-mgc{background:#fee2e2;color:#991b1b;border-color:#fca5a5}.rc-mgc.on{background:#dc2626;color:#fff}
.rc-mgtc{background:#fce7f3;color:#831843;border-color:#f9a8d4}.rc-mgtc.on{background:#9f1239;color:#fff}
[data-theme="dark"] .rc-encou{background:#14532d;color:#bbf7d0;border-color:#166534}
[data-theme="dark"] .rc-compl{background:#14532d;color:#86efac;border-color:#15803d}
[data-theme="dark"] .rc-felic{background:#713f12;color:#fde047;border-color:#a16207}
[data-theme="dark"] .rc-mgt,[data-theme="dark"] .rc-mgc{background:#7f1d1d;color:#fca5a5;border-color:#991b1b}
[data-theme="dark"] .rc-mgtc{background:#831843;color:#f9a8d4;border-color:#9f1239}
.orirow{display:flex;align-items:center;gap:.52rem;padding:.62rem .82rem;background:var(--surface2);border-radius:var(--r-s);flex-wrap:wrap}
.orirow-label{font-size:.76rem;font-weight:500;flex:1;min-width:58px}

/* ── MODAL ── */

.modal-hd{padding:1.15rem 1.45rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--surface);z-index:5}

.pa{background:rgba(139,92,246,.12);color:#7c3aed}.pl{background:rgba(236,72,153,.12);color:#db2777}.ps{background:rgba(59,130,246,.12);color:#2563eb}
[data-theme="dark"] .pa{background:rgba(139,92,246,.22);color:#a78bfa}[data-theme="dark"] .pl{background:rgba(236,72,153,.22);color:#f9a8d4}[data-theme="dark"] .ps{background:rgba(59,130,246,.22);color:#60a5fa}
.subj-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:.42rem;margin-bottom:.65rem;padding:.65rem;background:var(--surface);border-radius:var(--r-xs)}

/* ── TABLEAU BLANC v2 — Widgets ── */

.wb2-resize{position:absolute;bottom:3px;right:3px;width:14px;height:14px;cursor:se-resize;z-index:5}

/* ── ÉTUDE DOC ── */

/* ── EDT ── */
.edt-outer{flex:1;overflow:auto;padding:0}

.cp-row{display:flex;gap:.4rem;flex-wrap:wrap}
.cp-sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}

/* ── RESPONSIVE ── */

.cs-absent-chip{display:inline-flex;align-items:center;gap:.2rem;padding:.18rem .45rem;border-radius:99px;background:#fee2e2;border:1px solid #fca5a5;font-size:.7rem;font-weight:600;color:#991b1b;cursor:pointer}
[data-theme="dark"] .cs-absent-chip{background:#7f1d1d;color:#fca5a5;border-color:#991b1b}
.cs-incident-chip{display:inline-flex;align-items:center;gap:.2rem;padding:.18rem .45rem;border-radius:99px;background:#fef9c3;border:1px solid #fde047;font-size:.7rem;font-weight:600;color:#854d0e;cursor:pointer}
[data-theme="dark"] .cs-incident-chip{background:#78350f;color:#fde047;border-color:#92400e}

/* ── PLAN DE CLASSE ── */
/* ── PLAN DE CLASSE v3 — Canvas libre ── */
.pdc-outer{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.pdc-shell{display:flex;flex:1;overflow:hidden;min-height:0}

/* Barre de contrôle supérieure */
.pdc-topbar{padding:.5rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;flex-shrink:0;flex-wrap:wrap}
.pdc-salle-name{font-size:.82rem;font-weight:700;color:var(--text);background:transparent;border:none;border-bottom:1.5px solid transparent;font-family:'Roboto',sans-serif;padding:.15rem .3rem;border-radius:4px;transition:all .15s;cursor:text;min-width:100px}
.pdc-salle-name:hover{background:var(--surface2);border-bottom-color:var(--border)}
.pdc-salle-name:focus{outline:none;background:var(--surface2);border-bottom-color:var(--accent)}
.pdc-zoom-bar{display:flex;align-items:center;gap:.25rem;margin-left:auto;border:1px solid var(--border);border-radius:var(--r-xs);overflow:hidden;background:var(--surface2)}
.pdc-zoom-btn{width:28px;height:26px;border:none;background:transparent;font-size:.85rem;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .13s;font-weight:700}
.pdc-zoom-btn:hover{background:var(--accent);color:#fff}
.pdc-zoom-val{font-size:.7rem;font-weight:700;color:var(--text2);padding:0 .4rem;min-width:38px;text-align:center;user-select:none}
.pdc-mode-seg{display:flex;border:1px solid var(--border);border-radius:var(--r-xs);overflow:hidden;background:var(--surface2)}
.pdc-mode-btn{padding:.3rem .75rem;border:none;background:transparent;font-family:'Roboto',sans-serif;font-size:.73rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text2);white-space:nowrap}
.pdc-mode-btn.on{background:var(--accent);color:#fff}
.pdc-mode-btn:hover:not(.on){background:var(--border);color:var(--text)}
.pdc-marque-btn{padding:.28rem .65rem;border-radius:var(--r-xs);border:1.5px solid var(--border);background:var(--surface2);font-family:'Roboto',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text2);white-space:nowrap}
.pdc-marque-btn.on{border-color:var(--accent);background:var(--accent);color:#fff}

/* Palette gauche */
.pdc-palette{width:216px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.pdc-palette-hd{padding:.55rem .875rem .45rem;font-size:.58rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;border-bottom:1px solid var(--border);flex-shrink:0}
.pdc-palette-body{flex:1;overflow-y:auto;padding:.55rem .6rem .75rem;display:flex;flex-direction:column;gap:.28rem}
.pdc-palette-body::-webkit-scrollbar{width:3px}
.pdc-palette-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.pdc-palette-section{font-size:.56rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:.55rem .25rem .2rem;margin-top:.15rem}
.pdc-palette-item{display:flex;align-items:center;gap:.55rem;padding:.45rem .65rem;border:1.5px solid var(--border);border-radius:var(--r-xs);background:var(--surface2);cursor:grab;transition:all .15s;user-select:none;box-shadow:var(--shadow-xs)}
.pdc-palette-item:hover{border-color:var(--accent);background:var(--surface);box-shadow:var(--shadow-s);transform:translateY(-1px)}
.pdc-palette-item:active{cursor:grabbing;transform:scale(.97);box-shadow:none}
.pdc-palette-preview{width:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pdc-palette-label{font-size:.74rem;font-weight:600;color:var(--text);line-height:1.25}
.pdc-palette-sub{font-size:.6rem;color:var(--text3);line-height:1.2;margin-top:.06rem}

/* Canvas zone */
.pdc-canvas-wrap{flex:1;overflow:auto;background:var(--bg);min-width:0;min-height:0;box-sizing:border-box}
.pdc-canvas-wrap::-webkit-scrollbar{width:8px;height:8px}
.pdc-canvas-wrap::-webkit-scrollbar-track{background:var(--bg)}
.pdc-canvas-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.pdc-canvas-inner{padding:12px 12px 50px 12px;min-width:100%;min-height:100%}
.pdc-canvas{position:relative;background:var(--surface);border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.07),0 0 0 1px var(--border);overflow:hidden}
[data-theme="dark"] .pdc-canvas{box-shadow:0 2px 16px rgba(0,0,0,.3),0 0 0 1px var(--border)}

/* Éléments sur le canvas */
.pdc-elem{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;border-radius:8px;transition:box-shadow .13s,transform .08s}
.pdc-elem.layout-mode:hover{transform:translateY(-1px)}
.pdc-elem.selected-elem{z-index:20}

/* Tableau */
.pdc-elem-tableau{
  background:linear-gradient(135deg,#0f1b4d 0%,#1e3a8a 60%,#2d4fb5 100%);
  color:#fff;font-weight:800;font-size:.78rem;letter-spacing:.12em;
  border-radius:10px;border:none;
  box-shadow:0 3px 12px rgba(30,58,138,.35),inset 0 1px 0 rgba(255,255,255,.12);
}

/* Bureau prof */
.pdc-elem-bureau-prof{
  background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(109,40,217,.06));
  border:2px solid rgba(124,58,237,.5);color:#7c3aed;
  font-size:.65rem;font-weight:700;border-radius:10px;
  box-shadow:0 2px 8px rgba(124,58,237,.15),inset 0 1px 0 rgba(255,255,255,.3);
}
[data-theme="dark"] .pdc-elem-bureau-prof{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(109,40,217,.1));border-color:rgba(167,139,250,.5);color:#a78bfa;box-shadow:0 2px 8px rgba(139,92,246,.2)}

/* Tables élèves */
.pdc-elem-table{
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.6);
}
[data-theme="dark"] .pdc-elem-table{box-shadow:0 2px 8px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.05)}

/* Passage */
.pdc-elem-passage{
  background:repeating-linear-gradient(45deg,rgba(148,163,184,.07),rgba(148,163,184,.07) 5px,transparent 5px,transparent 10px);
  border:1.5px dashed rgba(148,163,184,.4);
  border-radius:8px;
}
[data-theme="dark"] .pdc-elem-passage{background:repeating-linear-gradient(45deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 5px,transparent 5px,transparent 10px);border-color:rgba(255,255,255,.12)}

/* Paillasse */
.pdc-elem-paillasse{
  background:linear-gradient(135deg,rgba(180,83,9,.1),rgba(217,119,6,.06));
  border:2px solid rgba(180,83,9,.4);color:#92400e;
  font-size:.65rem;font-weight:700;border-radius:10px;
  box-shadow:0 2px 8px rgba(180,83,9,.1),inset 0 1px 0 rgba(255,255,255,.3);
}
[data-theme="dark"] .pdc-elem-paillasse{background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(217,119,6,.07));border-color:rgba(251,191,36,.4);color:#fbbf24}

/* Sélection */
.pdc-elem.selected-elem{
  box-shadow:0 0 0 2.5px var(--accent),0 6px 20px rgba(59,91,219,.22) !important;
  z-index:20;
}

/* Panneau d'édition d'élément sélectionné */
/* Poignées de resize classiques */
.pdc-rh{position:absolute;z-index:35;background:var(--accent);border:2px solid #fff;border-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.25);opacity:0;transition:opacity .12s;pointer-events:none}
.pdc-elem.selected-elem .pdc-rh{opacity:1;pointer-events:all}
/* Coin SE */
.pdc-rh-se{width:10px;height:10px;bottom:-5px;right:-5px;cursor:se-resize}
/* Bord E (milieu droit) */
.pdc-rh-e{width:8px;height:20px;top:50%;right:-4px;transform:translateY(-50%);cursor:e-resize;border-radius:4px}
/* Bord S (milieu bas) */
.pdc-rh-s{width:20px;height:8px;bottom:-4px;left:50%;transform:translateX(-50%);cursor:s-resize;border-radius:4px}

/* Inspector (toolbar flottante) */
.pdc-inspector{position:absolute;background:var(--text);color:#fff;border-radius:8px;padding:4px 6px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:40;display:flex;align-items:center;gap:4px;top:-36px;left:50%;transform:translateX(-50%)}
.pdc-inspector-sep{width:1px;height:14px;background:rgba(255,255,255,.2)}
.pdc-inspector-btn{padding:2px 7px;background:transparent;color:#fff;border:none;border-radius:4px;font-size:.62rem;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .12s}
.pdc-inspector-btn:hover{background:rgba(255,255,255,.18)}
.pdc-inspector-btn.danger:hover{background:var(--danger)}

/* Toolbar suppression */
.pdc-elem-toolbar{position:absolute;top:-30px;left:50%;transform:translateX(-50%);display:flex;gap:3px;background:var(--text);border-radius:6px;padding:3px 5px;white-space:nowrap;box-shadow:var(--shadow-s);z-index:40}
.pdc-elem-toolbar button{padding:2px 7px;background:transparent;color:#fff;border:none;border-radius:4px;font-size:.62rem;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .12s}
.pdc-elem-toolbar button:hover{background:rgba(255,255,255,.18)}
.pdc-elem-toolbar button.danger:hover{background:var(--danger)}
.pdc-elem-toolbar-sep{width:1px;background:rgba(255,255,255,.2);margin:1px 0}

/* Panneau droit placement */
.pdc-panel{width:224px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.pdc-panel-hd{padding:.6rem .875rem;font-size:.72rem;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;display:flex;align-items:center;gap:.4rem}
.pdc-unplaced{flex:1;overflow-y:auto;padding:.5rem .65rem;display:flex;flex-direction:column;gap:.22rem}
.pdc-unplaced::-webkit-scrollbar{width:3px}
.pdc-unplaced::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.pdc-eleve-pill{display:flex;align-items:center;gap:.4rem;padding:.32rem .6rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-xs);font-size:.73rem;cursor:pointer;transition:all .13s}
.pdc-eleve-pill:hover{border-color:var(--accent);background:var(--surface);box-shadow:var(--shadow-xs)}
.pdc-eleve-pill.on{border-color:var(--accent);background:rgba(59,91,219,.08);color:var(--accent);font-weight:700}
.pdc-eleve-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;font-size:.55rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Grille canvas — svg injecté en background */
.pdc-grid-bg{position:absolute;inset:0;pointer-events:none;opacity:.55}
[data-theme="dark"] .pdc-grid-bg{opacity:.25}

/* ── DASHBOARD tweaks ── */
.dash-stats-row{display:flex;gap:.45rem;margin-bottom:.5rem;flex-wrap:wrap}
.dash-stat-chip{display:flex;flex-direction:column;align-items:center;padding:.5rem .875rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:11px;backdrop-filter:blur(8px);min-width:100px}
.dash-stat-chip-val{font-family:'Roboto Slab',serif;font-size:1.4rem;font-weight:800;color:#fff;line-height:1}
.dash-stat-chip-val.red{color:#fca5a5}
.dash-stat-chip-lbl{font-size:.6rem;color:rgba(255,255,255,.6);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-top:.1rem}
.dash-taches-item{display:flex;align-items:flex-start;gap:.45rem;padding:.35rem .5rem;border-radius:var(--r-xs)}
.dash-taches-item:hover{background:var(--surface2)}
.dash-tache-check{width:15px;height:15px;border-radius:3px;border:2px solid var(--border);background:var(--surface);cursor:pointer;flex-shrink:0;margin-top:.12rem;display:flex;align-items:center;justify-content:center;transition:all .13s;font-size:.6rem}
.dash-tache-check.done{background:var(--success);border-color:var(--success);color:#fff}
.dash-tache-txt{flex:1;font-size:.78rem;line-height:1.45}
.dash-tache-txt.done{text-decoration:line-through;opacity:.5}
.dash-cours-item{display:flex;align-items:center;gap:.6rem;padding:.45rem .6rem;border-radius:var(--r-xs);background:var(--surface2);border:1px solid var(--border);cursor:context-menu}
.dash-cours-item:hover{border-color:var(--accent)}
.dash-ctx-menu{position:fixed;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-s);box-shadow:var(--shadow-l);min-width:180px;padding:.3rem 0;z-index:9000}
.dash-ctx-item{display:flex;align-items:center;gap:.5rem;width:100%;padding:.42rem .82rem;border:none;background:none;cursor:pointer;font-family:'Roboto',sans-serif;font-size:.78rem;color:var(--text);text-align:left;transition:background .12s}
.dash-ctx-item:hover{background:var(--surface2)}

/* ── LIENS & RACCOURCIS ── */
.liens-grid{display:flex;flex-direction:column;flex:1;overflow:hidden}
.liens-toolbar{padding:.65rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;flex-shrink:0}
.liens-list{flex:1;overflow-y:auto;padding:.875rem 1.25rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.65rem;align-content:start}
.lien-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;display:flex;flex-direction:column;gap:.35rem;transition:all .18s;cursor:pointer;text-decoration:none}
.lien-card:hover{border-color:var(--accent);box-shadow:var(--shadow-s);transform:translateY(-2px)}
.lien-card-top{display:flex;align-items:flex-start;gap:.5rem}
.lien-favicon{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;overflow:hidden}
.lien-favicon img{width:100%;height:100%;object-fit:contain}
.lien-title{font-weight:700;font-size:.85rem;color:var(--text);line-height:1.3}
.lien-url{font-size:.67rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lien-desc{font-size:.75rem;color:var(--text2);line-height:1.45}
.lien-tags{display:flex;flex-wrap:wrap;gap:.22rem}
.lien-tag{display:inline-flex;padding:.1rem .42rem;border-radius:99px;font-size:.62rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.lien-tag.on{background:var(--accent);border-color:var(--accent);color:#fff}
.lien-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text2);gap:.65rem;padding:2rem;grid-column:1/-1}

/* ── MANUEL PDF ── */
.manuel-outer{display:flex;flex-direction:column;flex:1;overflow:hidden}
.manuel-toolbar{padding:.55rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-shrink:0;flex-wrap:wrap}
.manuel-viewer{flex:1;overflow:auto;background:#525659;display:flex;justify-content:center;align-items:flex-start;padding:1.5rem}
.manuel-book{display:flex;gap:0;box-shadow:0 8px 40px rgba(0,0,0,.5);background:#fff}
.manuel-page{display:block}
.manuel-divider{width:4px;background:linear-gradient(to right,rgba(0,0,0,.15),rgba(0,0,0,.05),rgba(0,0,0,.15));flex-shrink:0}
.manuel-list{flex:1;overflow-y:auto;padding:.875rem 1.25rem;display:flex;flex-direction:column;gap:.5rem}
.manuel-doc-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;transition:all .15s}
.manuel-doc-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-s)}
.manuel-doc-card.on{border-color:var(--accent);background:rgba(59,91,219,.04)}

/* ── SUIVI synthèse inline ── */
.sc-synth-bar{display:flex;gap:3px;align-items:center}
.sc-synth-dot{width:8px;height:8px;border-radius:50%}

/* ── CAHIER search eleves ── */
.cs-eleve-search{position:relative}
.cs-eleve-input{width:100%;padding:.38rem .65rem .38rem 1.8rem;border:1.5px solid var(--border);border-radius:var(--r-xs);background:var(--surface2);color:var(--text);font-family:'Roboto',sans-serif;font-size:.78rem;box-sizing:border-box;transition:border-color .15s}
.cs-eleve-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.cs-eleve-icon{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.78rem;pointer-events:none}
.cs-eleve-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xs);box-shadow:var(--shadow);z-index:50;max-height:200px;overflow-y:auto}
.cs-eleve-opt{display:flex;align-items:center;gap:.45rem;padding:.38rem .65rem;cursor:pointer;font-size:.78rem;transition:background .12s}
.cs-eleve-opt:hover{background:var(--surface2)}
.cs-eleve-opt.selected{background:rgba(59,91,219,.08);color:var(--accent);font-weight:600}
.cs-manque-chip{display:inline-flex;align-items:center;gap:.28rem;padding:.2rem .52rem;background:rgba(217,119,6,.12);border:1px solid rgba(217,119,6,.3);border-radius:99px;font-size:.7rem;font-weight:600;color:var(--warning);cursor:pointer}
[data-theme="dark"] .cs-manque-chip{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.25);color:var(--warning)}

/* ── PROGRESSION ANNUELLE ── */
.prog-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.prog-sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface2);display:flex;flex-direction:column;overflow:hidden}
.prog-sidebar-hd{padding:.5rem .875rem;font-size:.6rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.prog-cls-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:.55rem .875rem;border:none;border-bottom:1px solid var(--border);background:none;cursor:pointer;font-family:'Roboto',sans-serif;font-size:.8rem;color:var(--text2);text-align:left;transition:all .15s;border-left:3px solid transparent}
.prog-cls-btn:hover{background:var(--surface);color:var(--text)}
.prog-cls-btn.on{background:var(--surface);color:var(--accent);font-weight:700;border-left-color:var(--accent)}
.prog-main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.prog-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text2);gap:.65rem;padding:2rem}
.prog-seq-list{padding:.875rem 1.25rem;display:flex;flex-direction:column;gap:.75rem}
.prog-seq-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-xs);transition:box-shadow .15s}
.prog-seq-card:hover{box-shadow:var(--shadow-s)}
.prog-seq-hd{display:flex;align-items:flex-start;gap:.65rem;padding:.75rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer}
.prog-seq-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:.75rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-seq-title{flex:1;font-weight:700;font-size:.9rem;line-height:1.3}
.prog-seq-period{font-size:.67rem;color:var(--text2);margin-top:.08rem}
.prog-seq-actions{display:flex;gap:.25rem;flex-shrink:0}
.prog-seq-body{padding:.75rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.prog-seq-full{grid-column:1/-1}
.prog-field-lbl{font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.22rem;display:flex;align-items:center;gap:.28rem}
.prog-field-ta{width:100%;padding:.5rem .7rem;border:1.5px solid var(--border);border-radius:var(--r-xs);background:var(--surface2);color:var(--text);font-family:'Roboto',sans-serif;font-size:.79rem;line-height:1.55;resize:vertical;min-height:60px;transition:border-color .15s;box-sizing:border-box}
.prog-field-ta:focus{outline:none;border-color:var(--accent);background:var(--surface)}

<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ─ Constants ─ */
const FILIERES=['2nde GT','2nde Pro','1ère année CAP'];
const AVIS_OPT=['Favorable','Réservé','Défavorable'];
const ANNEES=['2024/2025','2025/2026','2026/2027','2027/2028'];
const RECS=[
  {key:'encouragement',label:'Encouragement',icon:'🌱',cls:'rc-encou'},
  {key:'compliment',label:'Compliment',icon:'👍',cls:'rc-compl'},
  {key:'felicitation',label:'Félicitation',icon:'⭐',cls:'rc-felic'},
  {key:'mgt',label:'MG Travail',icon:'⚠️',cls:'rc-mgt'},
  {key:'mgc',label:'MG Comportement',icon:'⚠️',cls:'rc-mgc'},
  {key:'mgtc',label:'MG Travail & Comport.',icon:'🚨',cls:'rc-mgtc'},
];
const REC_EMOJI={encouragement:'🌱',compliment:'👍',felicitation:'⭐',mgt:'⚠️',mgc:'⚠️',mgtc:'🚨'};
const BAD_APPREC=["Pas d'appréciation générale disponible","Pas d'appréciation disponible",""];
const hasApprec=v=>v&&!BAD_APPREC.includes(v.trim())&&v.trim().length>5;
const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
const HOURS=Array.from({length:11},(_,i)=>i+8);
const EDT_COLORS=[
  {bg:'#dbeafe',border:'#3b82f6',text:'#1e40af'},
  {bg:'#dcfce7',border:'#22c55e',text:'#15803d'},
  {bg:'#fef9c3',border:'#eab308',text:'#854d0e'},
  {bg:'#fee2e2',border:'#ef4444',text:'#991b1b'},
  {bg:'#f3e8ff',border:'#a855f7',text:'#7e22ce'},
  {bg:'#ffedd5',border:'#f97316',text:'#9a3412'},
];
const WB_COLORS=['#1a2236','#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899','#ffffff'];

/* ─ PDF Parsing ─ */
async function parsePDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument(buf).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();pages.push(c.items.map(it=>it.str).join(' '));}
  const full=pages.join('\n');
  const blocks=full.split(/(?=Bulletin du \d+ème Trimestre[\s\S]{1,300}?(?:Né |Née )le )/).filter(b=>b.trim().length>200);
  const seen=new Set(),results=[];
  for(const b of blocks){const s=parseStudent(b);if(!s)continue;const k=`${s.name}__${s.trimester}`;if(seen.has(k))continue;seen.add(k);results.push(s);}
  return results;
}
function parseStudent(text){
  const nm=text.match(/Bulletin du \d+ème Trimestre\s+([\p{Lu}\p{Ll}\u00C0-\u024F\-\s]+?)(?=\s*(?:Né|Née) le)/u);
  if(!nm)return null;
  const name=nm[1].replace(/\s+/g,' ').trim();if(name.length<3)return null;
  const classeM=text.match(/(\d[A-Z])\s*\((\d+)\s*élèves\)/);
  const trimM=text.match(/Bulletin du (\d+)ème Trimestre/);
  const moyM=text.match(/Moyennes générales[^\d]*(\d+,\d+)\s+(\d+,\d+)\s+(\d+,\d+)/);
  const MATIERES=[
    {name:'ARTS PLASTIQUES',pole:'artistique'},{name:'ED.PHYSIQUE & SPORT.',pole:'artistique'},{name:'EDUCATION MUSICALE',pole:'artistique'},
    {name:'ANGLAIS LV1',pole:'littéraire'},{name:'ESPAGNOL LV2',pole:'littéraire'},{name:'LCR OCCITAN',pole:'littéraire'},
    {name:'FRANCAIS',pole:'littéraire'},{name:'HISTOIRE-GEOGRAPHIE',pole:'littéraire'},{name:'ENS. MORAL & CIVIQUE',pole:'littéraire'},
    {name:'MATHEMATIQUES',pole:'scientifique'},{name:'PHYSIQUE-CHIMIE',pole:'scientifique'},{name:'SCIENCES VIE & TERRE',pole:'scientifique'},{name:'TECHNOLOGIE',pole:'scientifique'},
  ];
  const subjects=[];
  MATIERES.forEach(mat=>{
    const esc=mat.name.replace(/\./g,'\\.').replace(/&/g,'&');
    const pat=new RegExp(esc+'([\\s\\S]*?)(?=(?:ARTS PLASTIQUES|ED\\.PHYSIQUE|EDUCATION MUSICALE|ANGLAIS LV1|ESPAGNOL LV2|LCR OCCITAN|FRANCAIS|HISTOIRE-GEOGRAPHIE|ENS\\. MORAL|MATHEMATIQUES|PHYSIQUE-CHIMIE|SCIENCES VIE|TECHNOLOGIE|pôle artistique|pôle littéraire|pôle scientifique|Moyennes générales|© Index Education))','i');
    const m=text.match(pat);if(!m)return;
    const sec=m[1];
    const tm=sec.match(/^([^0-9]+?)(?:\d+\/\d+)/);
    const teacher=tm?tm[1].trim().replace(/^(Mme |M\. |M )/,''):'N/A';
    const gm=sec.match(/(\d+,\d+)\s+(\d+,\d+)\s+(\d+,\d+)\s+(\d+,\d+)/);if(!gm)return;
    const gradeT1=parseFloat(gm[1].replace(',','.'));
    const gradeStudent=parseFloat(gm[2].replace(',','.'));
    const gradeClass=parseFloat(gm[3].replace(',','.'));
    const after=sec.substring(sec.indexOf(gm[0])+gm[0].length).replace(/pôle (artistique|littéraire|scientifique)/gi,'').replace(/\s+/g,' ').trim();
    const am=after.match(/([A-ZÀÁÂÈÉÊËÌÍÎÏÐÑÒÓÔÕÙÚÛÜ\u00C0-\u024F][^.!?]{15,}[.!?])/u);
    subjects.push({name:mat.name,teacher,pole:mat.pole,gradeT1,gradeStudent,gradeClass,appreciation:am?am[1].trim():(after.length>20?after.substring(0,200).trim():"Pas d'appréciation disponible")});
  });
  let apprec='';
  for(const pat of[/Appréciation globale\s*:\s*([^©]+?)(?=Le chef d'établissement|©|$)/i,/Appréciation globale\s*([^©]{10,400})(?=Le chef|©|$)/i]){const m=text.match(pat);if(m&&m[1].trim().length>5){apprec=m[1].trim().replace(/\s+/g,' ');break;}}
  if(!apprec)apprec="Pas d'appréciation générale disponible";
  const vsM=text.match(/Appréciation VIE SCOLAIRE\s*:\s*([^\n]{10,300}?)(?=Intentions|Absences|$)/i);
  const absM=text.match(/Absences\s*:\s*(\d+)\s*demi-journées?/i);
  const retM=text.match(/Retards\s*:\s*(\d+)/i);
  return{id:`${name.replace(/\s+/g,'_')}_${Date.now()}`,name,classe:classeM?classeM[1]:'N/A',trimester:trimM?parseInt(trimM[1]):2,generalAverage:moyM?parseFloat(moyM[2].replace(',','.')):0,generalAverageT1:moyM?parseFloat(moyM[1].replace(',','.')):null,generalAverageClass:moyM?parseFloat(moyM[3].replace(',','.')):null,subjects,classSize:classeM?parseInt(classeM[2]):0,appreciationGenerale:apprec,vieScolaire:vsM?vsM[1].trim().replace(/\s+/g,' ').replace(/Intentions.*$/i,''):'',absences:{demiJournees:absM?parseInt(absM[1]):0},retards:retM?parseInt(retM[1]):0,orientation:{filiere:'',avis:''},recompense:null,notes:''};
}

/* ─ Parser EDT Pronote PDF ─
   Structure réelle d'un PDF Pronote (vérifiée par analyse des coordonnées) :
   
   • Les horaires (8h20, 9h15…) sont à x < ~60, côté gauche de la page.
   • Les en-têtes de jours (lundi, mardi…) sont sur une ligne Y unique (~56).
   • Pour chaque créneau, les items d'une case sont alignés verticalement :
       ESPAGNOL LV2   ← nom du cours (ligne 1)
       3C             ← classe (ligne 2)
       S.1            ← salle (bruit, à ignorer)
       A              ← marqueur semaine (APRÈS les lignes de contenu)
   • En cas de case scindée A/B, les deux demi-cases ont leurs items
     CÔTE À CÔTE par Y (même coordonnée Y = items de deux demi-cases différentes).
     Ex: y=73 → x=63 'ESPAGNOL LV2'  ET  x=139 'ESPAGNOL LV2'
         y=85 → x=89 '3C'            ET  x=165 '5A'
         y=111→ x=127 'A'            ET  x=203 'B'
   • Le marqueur A/B se trouve à un X distinct pour chaque demi-case.
     → X du marqueur A = X de la sous-colonne A
     → X du marqueur B = X de la sous-colonne B
   • La sous-colonne est détectée en clusterisant les X de TOUS les items
     de contenu pour trouver un gap significatif.
─────────────────────────────────────────────────────────────────────────── */
async function parseEdtPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument(buf).promise;

  let items=[];
  for(let pi=1;pi<=pdf.numPages;pi++){
    const page=await pdf.getPage(pi);
    const vp=page.getViewport({scale:1});
    const tc=await page.getTextContent();
    tc.items.forEach(it=>{
      const s=it.str.trim();
      if(!s)return;
      const tx=it.transform;
      items.push({s,x:tx[4],y:vp.height-tx[5],fs:Math.abs(tx[3])});
    });
  }

  // ── Utilitaires ──
  const timeRe=/^(\d{1,2})h(\d{2})$/;
  const isWeekMark=s=>/^[AB]$/i.test(s);
  const isNoise=s=>/^S\.\d/.test(s)||s.length===0;
  const isFooter=s=>/©|Index Education|COLLEGE|COLLÈGE/i.test(s);

  // ── En-têtes de jours ──
  const DAY_FR=['lundi','mardi','mercredi','jeudi','vendredi'];
  const dayXMap={};
  items.forEach(it=>{
    const idx=DAY_FR.findIndex(d=>it.s.toLowerCase()===d);
    if(idx>=0) dayXMap[idx]=it.x;
  });
  const foundDays=Object.keys(dayXMap).map(Number);
  if(foundDays.length<2) return{blocks:[],weekType:'AB',error:'Jours non détectés.',debugItems:items};
  const sortedDays=foundDays.sort((a,b)=>dayXMap[a]-dayXMap[b]);

  const colBounds=sortedDays.map((di,i)=>{
    const x=dayXMap[di];
    const xPrev=i>0?dayXMap[sortedDays[i-1]]:0;
    const xNext=i<sortedDays.length-1?dayXMap[sortedDays[i+1]]:99999;
    return{dayIdx:di,xMin:(x+xPrev)/2,xMax:(x+xNext)/2};
  });

  // ── Créneaux horaires ──
  const timeSlots=[];
  items.forEach(it=>{
    if(it.x>70)return;
    const m=it.s.match(timeRe);
    if(!m)return;
    const h=parseInt(m[1]),min=parseInt(m[2]);
    if(!timeSlots.find(t=>t.h===h&&t.m===min)) timeSlots.push({h,m:min,y:it.y});
  });
  timeSlots.sort((a,b)=>a.y-b.y);
  if(timeSlots.length<2) return{blocks:[],weekType:'AB',error:'Horaires non détectés.',debugItems:items};

  // ── Items de contenu (corps de la grille) → affectés à une colonne-jour ──
  const headerY=items.find(it=>it.s.toLowerCase()==='lundi')?.y??56;
  // IMPORTANT: les marqueurs A/B Pronote sont positionnés au bord droit de leur demi-case
  // et peuvent dépasser la borne xMax de la colonne → on les traite séparément.
  const assignCol=(x,isMarker=false)=>{
    if(isMarker){
      // Les markers A/B sont au bord droit de leur demi-case et peuvent dépasser xMax.
      // On cherche la colonne dont le xMax est le PLUS PROCHE (en valeur absolue).
      // On ignore la borne stricte pour les markers.
      return colBounds.reduce((best,c)=>{
        const d=Math.abs(x-c.xMax);
        return(!best||d<Math.abs(x-best.xMax))?c:best;
      },null);
    }
    // Pour le contenu: essai strict d'abord, puis distance au centre
    let col=colBounds.find(c=>x>=c.xMin&&x<c.xMax);
    if(col)return col;
    return colBounds.reduce((best,c)=>{
      const d=Math.abs(x-(c.xMin+c.xMax)/2);
      return(!best||d<Math.abs(x-(best.xMin+best.xMax)/2))?c:best;
    },null);
  };

  const colItems=items.filter(it=>{
    if(it.x<=60)return false;
    if(it.y<=headerY+2)return false;
    if(isFooter(it.s))return false;
    return true;
  }).map(it=>{
    const col=assignCol(it.x, isWeekMark(it.s));
    return col?{...it,dayIdx:col.dayIdx}:null;
  }).filter(Boolean);

  const byDay={};
  colItems.forEach(it=>{if(!byDay[it.dayIdx])byDay[it.dayIdx]=[];byDay[it.dayIdx].push(it);});

  // ── snap créneau : Y → {start, end} ──
  const snapSlot=(yS,yE)=>{
    let si=0;
    for(let i=0;i<timeSlots.length;i++){if(timeSlots[i].y<=yS+10)si=i;else break;}
    let ei=Math.min(si+1,timeSlots.length-1);
    for(let i=si+1;i<timeSlots.length;i++){if(timeSlots[i].y>yE-10){ei=i;break;}ei=Math.min(i+1,timeSlots.length-1);}
    return{start:timeSlots[si],end:timeSlots[ei]};
  };

  const blocks=[];
  const pushBlock=(dayIdx,title,weeks,yS,yE)=>{
    title=title.trim().replace(/\s+/g,' ');
    if(title.length<2)return;
    const{start,end}=snapSlot(yS,yE);
    if(end.h*60+end.m<=start.h*60+start.m)return;
    const colorIdx=Math.abs(title.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%EDT_COLORS.length;
    blocks.push({id:'edt-import-'+Date.now()+Math.random().toString(36).slice(2),
      day:dayIdx,startH:start.h,startM:start.m,endH:end.h,endM:end.m,
      title:title.slice(0,80),teacher:'',room:'',colorIdx,weeks,classId:''});
  };

  // ── Traitement : par jour, par créneau ──
  // Algorithme validé sur données Pronote réelles :
  //
  // Une case scindée A/B génère des DOUBLONS : Pronote écrit le même texte (ex: "ESPAGNOL LV2")
  // dans les deux demi-cases → même Y, deux X différents.
  // → splitX_contenu  = midpoint(xL_doublon, xR_doublon)   → sépare le contenu
  // → splitX_markers  = midpoint(x_markerGauche, x_markerDroit) → détermine weekL/weekR
  //   (les markers sont alignés sur le bord droit de leur demi-case, pas sur le début du texte)

  Object.entries(byDay).forEach(([dayIdxStr,dayItems])=>{
    const dayIdx=parseInt(dayIdxStr);

    for(let si=0;si<timeSlots.length-1;si++){
      const yS=timeSlots[si].y, yE=timeSlots[si+1].y;

      // Inclure les items du créneau avec marge +5 en bas pour capturer les markers en limite
      const slotItems=dayItems.filter(it=>it.y>=yS-2&&it.y<yE+5);
      if(!slotItems.length)continue;

      const content=slotItems.filter(it=>!isWeekMark(it.s)&&!isNoise(it.s));
      const markers=slotItems.filter(it=>isWeekMark(it.s));
      if(!content.length)continue;

      // Chercher des doublons (même texte, même Y arrondi)
      const byTextY={};
      content.forEach(it=>{
        const k=`${Math.round(it.y)}_${it.s}`;
        if(!byTextY[k])byTextY[k]=[];
        byTextY[k].push(it.x);
      });
      const dupePairs=Object.values(byTextY)
        .filter(xs=>xs.length>=2)
        .map(xs=>xs.slice().sort((a,b)=>a-b));

      if(dupePairs.length>0&&markers.length>=2){
        // ── Case scindée ──
        const xLavg=dupePairs.reduce((s,p)=>s+p[0],0)/dupePairs.length;
        const xRavg=dupePairs.reduce((s,p)=>s+p[p.length-1],0)/dupePairs.length;
        const splitXc=(xLavg+xRavg)/2; // pour le contenu

        const mxs=markers.map(m=>m.x).sort((a,b)=>a-b);
        const splitXm=(mxs[0]+mxs[mxs.length-1])/2; // pour les markers

        const weekL=markers.find(m=>m.x<splitXm)?.s.toUpperCase()||'AB';
        const weekR=markers.find(m=>m.x>=splitXm)?.s.toUpperCase()||'AB';

        const left=content.filter(it=>it.x<splitXc).sort((a,b)=>a.y-b.y);
        const right=content.filter(it=>it.x>=splitXc).sort((a,b)=>a.y-b.y);

        const titleL=[...new Set(left.map(it=>it.s))].join(' ');
        const titleR=[...new Set(right.map(it=>it.s))].join(' ');

        if(titleL)pushBlock(dayIdx,titleL,weekL,yS,yE);
        if(titleR)pushBlock(dayIdx,titleR,weekR,yS,yE);
      } else {
        // ── Case simple ──
        const week=markers.length===1?markers[0].s.toUpperCase():'AB';
        const title=[...new Set(content.sort((a,b)=>a.y-b.y).map(it=>it.s))].join(' ');
        pushBlock(dayIdx,title,week,yS,yE);
      }
    }
  });

  // ── Dédoublonner et trier ──
  const seen=new Set();
  const deduped=blocks.filter(b=>{
    const k=`${b.day}_${b.startH}_${b.startM}_${b.title}`;
    if(seen.has(k))return false;seen.add(k);return true;
  }).sort((a,b)=>a.day-b.day||a.startH*60+a.startM-(b.startH*60+b.startM));

  const hasA=items.some(i=>i.s==='A');
  const hasB=items.some(i=>i.s==='B');
  const globalWeek=hasA&&hasB?'AB':hasA?'A':hasB?'B':'AB';

  return{blocks:deduped,weekType:globalWeek,error:null,
    debugItems:items,debugTimeSlots:timeSlots,debugDayCols:colBounds};
}
/* ─ Helpers ─ */
const gc=g=>g>=14?'excellent':g>=12?'good':g>=10?'average':'poor';
const pc=p=>p.includes('artistique')?'pa':p.includes('littéraire')?'pl':'ps';
const acl=a=>{if(!a)return'';const v=a.toLowerCase();return v.includes('favorable')&&!v.includes('dé')?'ab-fav':v.includes('réservé')||v.includes('reserve')?'ab-res':'ab-def'};
const evoFn=s=>s.generalAverageT1!=null&&s.generalAverageT1>0?{diff:parseFloat((s.generalAverage-s.generalAverageT1).toFixed(2)),t1:s.generalAverageT1}:null;

function EvoBadge({s}){
  const e=evoFn(s);
  if(!e)return <span className="evo evo-none">Pas de T1</span>;
  if(Math.abs(e.diff)<.05)return <span className="evo evo-stab">→ stable</span>;
  return e.diff>0?<span className="evo evo-up">↗ +{e.diff}</span>:<span className="evo evo-down">↘ {e.diff}</span>;
}

/* ─ Setup ─ */
const NIVEAUX_COLLEGE=['6ème','5ème','4ème','3ème'];
const NIVEAUX_LYCEE=['2nde','1ère','Terminale'];

function SetupScreen({onConfirm}){
  const[step,setStep]=useState(1);
  const[form,setForm]=useState({prenom:'',nom:'',etablissement:'',classe:'',annee:'2025/2026',typeEtab:[],niveaux:[]});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleTypeEtab=(t)=>{
    const cur=form.typeEtab;
    const next=cur.includes(t)?cur.filter(x=>x!==t):[...cur,t];
    let niveaux=form.niveaux;
    if(!next.includes('college')) niveaux=niveaux.filter(n=>!NIVEAUX_COLLEGE.includes(n));
    if(!next.includes('lycee')) niveaux=niveaux.filter(n=>!NIVEAUX_LYCEE.includes(n));
    setForm(f=>({...f,typeEtab:next,niveaux}));
  };
  const toggleNiveau=(n)=>setForm(f=>({...f,niveaux:f.niveaux.includes(n)?f.niveaux.filter(x=>x!==n):[...f.niveaux,n]}));
  const okStep1=form.prenom.trim()&&form.nom.trim();
  const okStep2=form.typeEtab.length>0;
  const okStep3=form.niveaux.length>0;
  const chip=(active)=>({display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'.4rem',padding:'.55rem 1.2rem',borderRadius:'var(--r-s)',border:`2px solid ${active?'var(--accent)':'var(--border)'}`,background:active?'var(--accent)':'var(--surface2)',color:active?'#fff':'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.9rem',fontWeight:700,cursor:'pointer',transition:'all .15s',userSelect:'none'});

    <div className="setup-screen">

        <div className="setup-sub">Logiciel de gestion de classe — première configuration</div>
        <div style={{display:'flex',alignItems:'center',gap:'.35rem',justifyContent:'center',margin:'1rem 0 .5rem'}}>
          {[1,2,3].map(s=>(
            <div key={s} style={{display:'flex',alignItems:'center',gap:'.35rem'}}>
              <div style={{width:26,height:26,borderRadius:'50%',background:step>=s?'var(--accent)':'var(--border)',color:'#fff',fontWeight:700,fontSize:'.75rem',display:'flex',alignItems:'center',justifyContent:'center'}}>{s}</div>
              {s<3&&<div style={{width:24,height:2,background:step>s?'var(--accent)':'var(--border)',borderRadius:2}}/>}
            </div>
          ))}
        </div>
        <div className="setup-form">
          {step===1&&(<>
            <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.1rem'}}>Vos informations</div>
            <div className="field-row">
              <div className="field"><label>Prénom *</label><input type="text" placeholder="Marie" value={form.prenom} onChange={e=>set('prenom',e.target.value)} autoFocus/></div>
              <div className="field"><label>Nom *</label><input type="text" placeholder="DUPONT" value={form.nom} onChange={e=>set('nom',e.target.value.toUpperCase())}/></div>
            </div>
            <div className="field"><label>Établissement</label><input type="text" placeholder="Collège Alfred Crouzet" value={form.etablissement} onChange={e=>set('etablissement',e.target.value)}/></div>
            <div className="field-row">
              <div className="field"><label>Classe principale</label><input type="text" placeholder="3C" value={form.classe} onChange={e=>set('classe',e.target.value)}/></div>
              <div className="field"><label>Année scolaire</label><select value={form.annee} onChange={e=>set('annee',e.target.value)}>{ANNEES.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
            </div>
            <button className="btn-setup" onClick={()=>okStep1&&setStep(2)} disabled={!okStep1}>Suivant →</button>
          </>)}
          {step===2&&(<>
            <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.6rem'}}>Type d'établissement</div>
            <div style={{fontSize:'.88rem',color:'var(--text2)',marginBottom:'1rem',lineHeight:1.6}}>Dans quel type d'établissement enseignez-vous ?<br/><span style={{fontSize:'.78rem',opacity:.7}}>Vous pouvez sélectionner les deux.</span></div>

            <div style={{display:'flex',gap:'.5rem',marginTop:'.5rem'}}>
              <button className="btn-setup" style={{background:'var(--surface2)',color:'var(--text)',boxShadow:'none',flex:'0 0 auto',padding:'.65rem 1.2rem'}} onClick={()=>setStep(1)}>← Retour</button>
              <button className="btn-setup" style={{flex:1}} onClick={()=>okStep2&&setStep(3)} disabled={!okStep2}>Suivant →</button>
            </div>

          {step===3&&(<>
            <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.6rem'}}>Vos niveaux</div>

                <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
                  {NIVEAUX_LYCEE.map(n=>(<div key={n} style={chip(form.niveaux.includes(n))} onClick={()=>toggleNiveau(n)}>{n}</div>))}

              <button className="btn-setup" style={{background:'var(--surface2)',color:'var(--text)',boxShadow:'none',flex:'0 0 auto',padding:'.65rem 1.2rem'}} onClick={()=>setStep(2)}>← Retour</button>
              <button className="btn-setup" style={{flex:1}} onClick={()=>okStep3&&onConfirm(form)} disabled={!okStep3}>Démarrer ClassPro →</button>

        </div>
        <div className="setup-footer">© {new Date().getFullYear()} Lucas Le Coadou · ClassPro v0.9 · Données stockées localement</div>
      </div>
    </div>
  );
}

/* ══ MODULE 1 — CONSEIL ══════════════════════════════════════════════════ */
function ConseilModule({profile}){
  const[students,setStudents]=useState(()=>{try{const s=localStorage.getItem('cdc-data');return s?JSON.parse(s):[]}catch{return[]}});
  const[selStudent,setSelStudent]=useState(null);
  const[search,setSearch]=useState('');
  const[drag,setDrag]=useState(false);
  const[selTrim,setSelTrim]=useState('all');
  const[view,setView]=useState('normal');
  useEffect(()=>{if(students.length>0)localStorage.setItem('cdc-data',JSON.stringify(students))},[students]);
  const handleFiles=async files=>{
    for(const f of files){if(f.type!=='application/pdf')continue;
      try{const list=await parsePDF(f);if(!list?.length){alert('Aucun bulletin reconnu.');continue;}
        setStudents(prev=>{let next=[...prev];for(const p of list){const ex=next.find(s=>s.name===p.name&&s.trimester===p.trimester);const merged=ex?{...p,orientation:ex.orientation,recompense:ex.recompense,notes:ex.notes||''}:p;next=next.filter(s=>!(s.name===p.name&&s.trimester===p.trimester));next.push(merged);}return next;});
      }catch(e){alert('Erreur : '+e.message);}}
  };
  const exportData=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({profile,students},null,2)],{type:'application/json'}));a.download=`cdc-${profile?.classe||'classe'}-${(profile?.annee||'').replace('/','_')}.json`;a.click()};
  const importJSON=file=>{const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.students)setStudents(d.students);}catch{alert('Fichier invalide.')}};r.readAsText(file)};
  const clearData=()=>{if(!confirm('Supprimer toutes les données élèves ?'))return;localStorage.removeItem('cdc-data');setStudents([]);};
  const setOri=(id,k,v)=>setStudents(prev=>prev.map(s=>s.id!==id?s:{...s,orientation:{...s.orientation,[k]:v}}));
  const togRec=(id,k)=>setStudents(prev=>prev.map(s=>s.id!==id?s:{...s,recompense:s.recompense===k?null:k}));
  const setNotes=useCallback((id,v)=>setStudents(prev=>prev.map(s=>s.id!==id?s:{...s,notes:v})),[]);
  const filtered=useMemo(()=>students.filter(s=>{
    const ms=s.name.toLowerCase().includes(search.toLowerCase());
    let mt=true;
    if(selTrim==='1')mt=s.generalAverageT1!=null&&s.generalAverageT1>0;
    else if(selTrim!=='all')mt=s.trimester===parseInt(selTrim);
    return ms&&mt;
  }).sort((a,b)=>a.name.localeCompare(b.name,'fr')),[students,search,selTrim]);
  const sb=selTrim==='all'?students:filtered;
  const stats={moy:sb.length>0?(sb.reduce((a,s)=>a+s.generalAverage,0)/sb.length).toFixed(2):'—',diff:sb.filter(s=>s.generalAverage<10).length,t1:students.filter(s=>s.generalAverageT1!=null&&s.generalAverageT1>0).length};
  return(<>
    <div className="page-hd">
      <div>
        <div className="phd-badge">🎓 Conseil de classe</div>
        <div className="phd-title">Gestion des bulletins</div>
        <div className="phd-sub">{profile?.prenom} {profile?.nom} · Classe {profile?.classe||'—'} · {profile?.annee}</div>
      </div>
      <div className="phd-actions">
        <label htmlFor="pdf-up" className="btn btn-white">📄 Importer PDF</label>
        <input id="pdf-up" type="file" accept="application/pdf" multiple onChange={e=>handleFiles(Array.from(e.target.files))}/>
        <label htmlFor="json-up" className="btn btn-ghost">📥 JSON</label>
        <input id="json-up" type="file" accept="application/json" onChange={e=>e.target.files[0]&&importJSON(e.target.files[0])}/>
        {students.length>0&&<><button onClick={exportData} className="btn btn-ghost">💾 Export</button><button onClick={clearData} className="btn btn-danger">🗑️</button></>}
      </div>
      {students.length>0&&<div className="phd-stats">
        <div className="phstat"><div className="phstat-label">Moyenne</div><div className="phstat-value">{stats.moy}</div></div>
        <div className="phstat"><div className="phstat-label">Élèves &lt;10</div><div className={`phstat-value ${stats.diff>0?'red':''}`}>{stats.diff}</div></div>
        <div className="phstat"><div className="phstat-label">Avec T1</div><div className="phstat-value">{stats.t1}</div></div>
        <div className="phstat"><div className="phstat-label">Total</div><div className="phstat-value">{students.length}</div></div>
      </div>}
    </div>
    <div className="page-content" style={{paddingTop:'.875rem'}}>
      {students.length===0?(
        <div className={`upload-zone ${drag?'drag':''}`} onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(Array.from(e.dataTransfer.files))}} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}>
          <div className="upload-icon">📄</div>
          <div className="upload-title">Importer les bulletins PDF</div>
          <div className="upload-hint">Glisse-dépose ici · Bulletin individuel ou classe complète</div>
        </div>
      ):(
        <div className="main-card">
          <div className="ctrl-bar">
            <div className="ctrl-left">
              <div className="seg"><button className={view==='normal'?'on':''} onClick={()=>setView('normal')}>📋 Vue liste</button><button className={view==='conseil'?'on':''} onClick={()=>setView('conseil')}>👥 Mode conseil</button></div>
              <div style={{display:'flex',gap:'.28rem'}}>
                {[{v:'all',l:'Tous'},{v:'2',l:'T2'},{v:'3',l:'T3'},{v:'1',l:'↗ T1'}].map(({v,l})=>(
                  <button key={v} className={`trim-btn ${selTrim===v?'on':''}`} onClick={()=>setSelTrim(v)}>{l}</button>
                ))}
              </div>
            </div>
            <input className="search" type="text" placeholder="🔍 Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {filtered.length===0?<div className="empty">Aucun élève pour ce filtre</div>:
           view==='conseil'?
            <div className="cview">{filtered.map(s=><CCard key={s.id} s={s} setOri={setOri} togRec={togRec} setNotes={setNotes}/>)}</div>:
            <div className="slist">{filtered.map(s=>{
              const e=evoFn(s);const emoji=s.recompense?REC_EMOJI[s.recompense]:null;
              return(<div key={s.id} className="scard" onClick={()=>setSelStudent(s)}>
                <div className="scard-head">
                  <div><div className="scard-name">{emoji&&<span>{emoji}</span>}{s.name}</div><div className="scard-meta">Classe {s.classe} · T{s.trimester}{s.orientation?.filiere&&s.orientation?.avis&&<span style={{marginLeft:'.38rem',opacity:.75}}> · {s.orientation.filiere} — {s.orientation.avis}</span>}</div></div>
                  <div className="scard-stats">
                    <div className="sb"><div className="sb-label">Moy.</div><div className={`sb-val ${gc(s.generalAverage)}`}>{s.generalAverage.toFixed(2)}</div>{e&&<div className="sb-sub">T1:{e.t1.toFixed(2)}</div>}</div>
                    <div className="sb"><div className="sb-label">Mat.</div><div className="sb-val" style={{color:'var(--text2)',fontSize:'1.2rem'}}>{s.subjects.length}</div></div>
                    <EvoBadge s={s}/>
                  </div>
                </div>
                <div className="aprev"><strong>Appréciation :</strong>{hasApprec(s.appreciationGenerale)?(s.appreciationGenerale.length>200?s.appreciationGenerale.substring(0,200)+'…':s.appreciationGenerale):<em style={{color:'var(--text3)'}}>Non renseignée</em>}</div>
              </div>);
            })}</div>
          }
        </div>
      )}
    </div>
    {selStudent&&<ModalDetail s={selStudent} onClose={()=>setSelStudent(null)}/>}
  </>);
}

function CCard({s,setOri,togRec,setNotes}){
  const e=evoFn(s);const emoji=s.recompense?REC_EMOJI[s.recompense]:null;
  const[ln,setLn]=useState(s.notes||'');const timer=useRef(null);
  const onN=v=>{setLn(v);clearTimeout(timer.current);timer.current=setTimeout(()=>setNotes(s.id,v),400)};
  return(
    <div className="ccard">
      <div className="ccard-head">
        <div style={{flex:1}}>
          <div className="ccard-name">{emoji&&<span>{emoji}</span>}{s.name}</div>
          <div className="ccard-meta">Classe {s.classe} · T{s.trimester}</div>
          <div className="avgs">
            <div className="avg-b"><div className="avg-label">Moy. T{s.trimester}</div><div className={`avg-val ${gc(s.generalAverage)}`}>{s.generalAverage.toFixed(2)}</div></div>
            {e&&<><div className="avg-sep">·</div><div className="avg-b"><div className="avg-label">T1</div><div className={`avg-val ${gc(e.t1)}`} style={{fontSize:'1.15rem'}}>{e.t1.toFixed(2)}</div></div><div className="avg-sep">·</div><div className="avg-b"><div className="avg-label">Évol.</div><EvoBadge s={s}/></div></>}
          </div>
        </div>
        <div className="assids">
          <div className="assid"><div className="assid-val">{s.absences?.demiJournees||0}</div><div className="assid-label">Absences</div></div>
          <div className="assid"><div className="assid-val">{s.retards||0}</div><div className="assid-label">Retards</div></div>
        </div>
      </div>
      <div className="cbody">
        <div className="csections">
          <div className="csec"><div className="csec-title">📝 Appréciation générale</div><div className="csec-text">{hasApprec(s.appreciationGenerale)?s.appreciationGenerale:<em style={{color:'var(--text3)'}}>Non renseignée</em>}</div></div>
          {s.vieScolaire&&<div className="csec"><div className="csec-title">🏫 Vie scolaire</div><div className="csec-text">{s.vieScolaire}</div></div>}
          <div className="csec"><div className="csec-title">🏅 Récompense / Sanction</div><div className="rchips">{RECS.map(r=><button key={r.key} className={`rchip ${r.cls} ${s.recompense===r.key?'on':''}`} onClick={()=>togRec(s.id,r.key)}>{r.icon} {r.label}</button>)}</div></div>
          <div className="csec"><div className="csec-title">🎓 Orientation</div>
            <div className="orirow">
              <span className="orirow-label">Voie</span>
              <select className="spill" value={s.orientation?.filiere||''} onChange={e=>setOri(s.id,'filiere',e.target.value)}><option value="">— Filière —</option>{FILIERES.map(f=><option key={f} value={f}>{f}</option>)}</select>
              <select className="spill" value={s.orientation?.avis||''} onChange={e=>setOri(s.id,'avis',e.target.value)}><option value="">— Avis —</option>{AVIS_OPT.map(a=><option key={a} value={a}>{a}</option>)}</select>
              {s.orientation?.filiere&&s.orientation?.avis&&<span className={`avis-badge ${acl(s.orientation.avis)}`}>{s.orientation.filiere} · {s.orientation.avis}</span>}
            </div>
          </div>
        </div>
        <div className="cnotes"><div className="cnotes-label">🖊️ Notes du conseil</div><textarea className="cnotes-ta" placeholder="Notes pendant le conseil…" value={ln} onChange={e=>onN(e.target.value)}/></div>
      </div>
    </div>
  );
}

function ModalDetail({s,onClose}){
  return(
    <div className="moverlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hd">
          <div style={{flex:1}}>
            <h2>{s.recompense&&<span style={{marginRight:'.32rem'}}>{REC_EMOJI[s.recompense]}</span>}{s.name}</h2>
            <div className="modal-hd-sub">Classe {s.classe} · T{s.trimester} · Moy. <strong>{s.generalAverage.toFixed(2)}/20</strong>{s.generalAverageT1!=null&&s.generalAverageT1>0&&<> · T1 : <strong>{s.generalAverageT1.toFixed(2)}</strong></>}</div>
            {hasApprec(s.appreciationGenerale)&&<div className="modal-apprec"><strong>Appréciation générale</strong><span style={{fontStyle:'italic',color:'var(--text2)'}}>{s.appreciationGenerale}</span></div>}
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body"><div className="subjs">{s.subjects.map((sub,i)=>(
          <div key={i} className="subj">
            <div className="subj-hd">
              <div><span className={`pbadge ${pc(sub.pole)}`}>{sub.pole}</span><div className="subj-name">{sub.name}</div><div className="subj-teacher">Prof. {sub.teacher}</div></div>
              <div className={`sb-val ${gc(sub.gradeStudent)}`} style={{fontSize:'1.35rem'}}>{sub.gradeStudent.toFixed(2)}</div>
            </div>
            <div className="subj-stats">
              {sub.gradeT1!=null&&sub.gradeT1>0&&<div className="sb"><div className="sb-label">T1</div><div style={{fontWeight:700,fontSize:'.88rem',color:'var(--text2)'}}>{sub.gradeT1.toFixed(2)}</div></div>}
              <div className="sb"><div className="sb-label">Élève T{s.trimester}</div><div style={{fontWeight:700,fontSize:'.88rem'}}>{sub.gradeStudent.toFixed(2)}</div></div>
              <div className="sb"><div className="sb-label">Classe</div><div style={{fontWeight:700,fontSize:'.88rem'}}>{sub.gradeClass.toFixed(2)}</div></div>
              <div className="sb"><div className="sb-label">Écart</div><div style={{fontWeight:700,fontSize:'.88rem',color:sub.gradeStudent>=sub.gradeClass?'var(--success)':'var(--danger)'}}>{(sub.gradeStudent-sub.gradeClass)>0?'+':''}{(sub.gradeStudent-sub.gradeClass).toFixed(2)}</div></div>
              {sub.gradeT1!=null&&sub.gradeT1>0&&<div className="sb"><div className="sb-label">Évol.T1→T{s.trimester}</div><div style={{fontWeight:700,fontSize:'.88rem',color:sub.gradeStudent>=sub.gradeT1?'var(--success)':'var(--danger)'}}>{(sub.gradeStudent-sub.gradeT1)>0?'+':''}{(sub.gradeStudent-sub.gradeT1).toFixed(2)}</div></div>}
            </div>
            {sub.appreciation&&sub.appreciation!=="Pas d'appréciation disponible"&&<div className="subj-apprec">"{sub.appreciation}"</div>}
          </div>
        ))}</div></div>
      </div>
    </div>
  );
}

/* ══ MODULE 2 — TABLEAU BLANC ════════════════════════════════════════════ */
/* ── TABLEAU BLANC v2 ─────────────────────────────────────────────────── */
const WB_BACKGROUNDS=[
  {id:'white',  label:'Blanc',    style:{background:'#ffffff'}},
  {id:'black',  label:'Noir',     style:{background:'#1a1a2e'}},
  {id:'green',  label:'Tableau',  style:{background:'#1a5c3a'}},
  {id:'grid',   label:'Quadrillé',style:{background:'#f8faff',backgroundImage:'linear-gradient(rgba(59,91,219,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(59,91,219,.08) 1px,transparent 1px)',backgroundSize:'40px 40px'}},

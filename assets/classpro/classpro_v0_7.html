                      );
                    })}
                  </tr>
                </thead>
                <tbody>
                  {cur.eleves.map(function(e){
                    return (
                      <tr key={e.id}>
                        <td className="sc-name-cell" onClick={function(){setBilanEl(e);}} style={{cursor:'pointer'}}>
                          {e.nom}
                        </td>
                        {curSess.map(function(s){
                          var col=collapsed[s.id];
                          return (
                            <td key={s.id} style={{padding:col?'.3rem .1rem':'.32rem .2rem'}}>
                              {col?(
                                <div className="sc-obs-dots">
                                  {OBS.map(function(o){
                                    return <div key={o.id} className={'sc-dot '+o.k+' '+(hasObs(s.id,e.id,o.id)?'on':'off')} onClick={function(){toggleObs(s.id,e.id,o.id);}} title={o.label}/>;
                                  })}
                                </div>
                              ):(
                                <div className="sc-obs-row">
                                  {OBS.map(function(o){
                                    return <button key={o.id} className={'sc-obs-btn '+(hasObs(s.id,e.id,o.id)?'on-'+o.k:'')} onClick={function(){toggleObs(s.id,e.id,o.id);}} title={o.label}>{o.emoji}</button>;
                                  })}
                                </div>
                              )}
                            </td>
                          );

                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

          {/* Panel Travaux */}
          <div className="sc-table-wrap" style={{display:vueSuivi==='travaux'?'flex':'none',flexDirection:'column',gap:'.75rem',padding:'1rem 1.25rem'}}>
              {curDevoirs.length===0?(
                <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',color:'var(--text2)',gap:'.65rem'}}>
                  <div style={{fontSize:'2rem',opacity:.25}}>📋</div>
                  <div style={{fontWeight:700}}>Aucun devoir pour cette classe</div>
                  <button className="btn btn-primary" onClick={function(){setShowNewDevoir(true);}}>+ Ajouter un devoir</button>
                </div>
              ):curDevoirs.map(function(dv){
                var nbNonRendu=dv.eleves.filter(function(e){return e.statut==='nonrendu';}).length;
                var nbRetard=dv.eleves.filter(function(e){return e.statut==='retard';}).length;
                var nbRendu=dv.eleves.filter(function(e){return e.statut==='rendu';}).length;
                return(
                  <div key={dv.id} style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden',boxShadow:'var(--shadow-xs)',flexShrink:0}}>
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'.5rem',padding:'.75rem 1rem',background:'var(--surface2)',borderBottom:'1px solid var(--border)'}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:'.88rem'}}>{dv.titre}</div>
                        <div style={{fontSize:'.68rem',color:'var(--text2)',marginTop:'.08rem'}}>
                          {dv.dateRendu&&'À rendre le '+new Date(dv.dateRendu+'T12:00').toLocaleDateString('fr-FR')}
                          {nbNonRendu>0&&<span style={{marginLeft:'.5rem',color:'var(--danger)',fontWeight:600}}>{nbNonRendu} non rendu{nbNonRendu>1?'s':''}</span>}
                          {nbRetard>0&&<span style={{marginLeft:'.5rem',color:'var(--warning)',fontWeight:600}}>{nbRetard} en retard</span>}
                          {nbRendu>0&&<span style={{marginLeft:'.5rem',color:'var(--success)',fontWeight:600}}>{nbRendu} rendu{nbRendu>1?'s':''}</span>}
                        </div>
                      </div>
                      <button onClick={function(){delDevoir(dv.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:'.85rem',padding:'.2rem .4rem',borderRadius:'var(--r-xs)'}} title="Supprimer">🗑️</button>
                    </div>
                    <div style={{padding:'.6rem 1rem',display:'flex',flexDirection:'column',gap:'.3rem'}}>
                      {dv.eleves.map(function(el){
                        return(
                          <div key={el.eleveid} style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.3rem .5rem',borderRadius:'var(--r-xs)',fontSize:'.76rem'}}>
                            <span style={{flex:1,fontWeight:500}}>{el.elevenom}</span>
                            <div style={{display:'flex',gap:'.22rem',flexWrap:'wrap'}}>

                                return(

                                    className={'tnr-statut '+s.cls}
                                    style={{opacity:el.statut===s.id?1:.35,cursor:'pointer'}}

                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
          </div>
          </div>{/* end shared panel wrapper */}
        </div>
      ):null}

      {/* ── Modale config alertes ── */}
      {showAlertConfig&&(
        <div className="moverlay" onClick={function(e){if(e.target===e.currentTarget)setShowAlertConfig(false);}}>
          <div className="modal" style={{maxWidth:440}}>
            <div className="modal-hd">
              <div><h2>⚙️ Seuils d'alerte</h2><div className="modal-hd-sub">Déclencher une alerte après X observations négatives</div></div>
              <button className="close-btn" onClick={function(){setShowAlertConfig(false);}}>×</button>
            </div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.6rem'}}>
              <div style={{fontSize:'.78rem',color:'var(--text2)',lineHeight:1.6,padding:'.5rem .75rem',background:'rgba(59,91,219,.06)',border:'1px solid rgba(59,91,219,.18)',borderRadius:'var(--r-s)'}}>
                Laisser vide = pas d'alerte pour cette observation. L'alerte se déclenche sur le total cumulé de toutes les séances de la classe.
              </div>
              {OBS.map(function(o){
                return(
                  <div key={o.id} style={{display:'flex',alignItems:'center',gap:'.75rem',padding:'.5rem .75rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)'}}>
                    <span style={{fontSize:'1.1rem',width:24,textAlign:'center'}}>{o.emoji}</span>
                    <div style={{flex:1,fontSize:'.82rem',fontWeight:600,color:o.k==='neg'?'var(--danger)':o.k==='pos'?'var(--success)':'var(--text)'}}>{o.label}</div>
                    <div style={{display:'flex',alignItems:'center',gap:'.35rem'}}>
                      <span style={{fontSize:'.72rem',color:'var(--text2)'}}>Alerte après</span>
                      <input type="number" min="1" max="50" placeholder="—"
                        value={alertConfig[o.id]!=null?alertConfig[o.id]:''}
                        onChange={function(e){
                          var v=e.target.value===''?null:Math.max(1,parseInt(e.target.value)||1);
                          setAlertConfig(function(p){return Object.assign({},p,{[o.id]:v});});
                        }}
                        style={{width:52,padding:'.28rem .42rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.82rem',textAlign:'center'}}/>
                      <span style={{fontSize:'.72rem',color:'var(--text2)'}}>fois</span>
                    </div>
                  </div>
                );
              })}
              {/* Seuil travaux non rendus */}
              <div style={{display:'flex',alignItems:'center',gap:'.75rem',padding:'.5rem .75rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r-s)'}}>
                <span style={{fontSize:'1.1rem',width:24,textAlign:'center'}}>📋</span>
                <div style={{flex:1,fontSize:'.82rem',fontWeight:600,color:'var(--danger)'}}>Travaux non rendus</div>
                <div style={{display:'flex',alignItems:'center',gap:'.35rem'}}>
                  <span style={{fontSize:'.72rem',color:'var(--text2)'}}>Alerte après</span>
                  <input type="number" min="1" max="50" placeholder="—"
                    value={alertConfig['dv']!=null?alertConfig['dv']:''}
                    onChange={function(e){
                      var v=e.target.value===''?null:Math.max(1,parseInt(e.target.value)||1);
                      setAlertConfig(function(p){return Object.assign({},p,{'dv':v});});
                    }}
                    style={{width:52,padding:'.28rem .42rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.82rem',textAlign:'center'}}/>
                  <span style={{fontSize:'.72rem',color:'var(--text2)'}}>devoirs</span>
                </div>
              </div>
              <button className="btn btn-primary" style={{alignSelf:'flex-end',marginTop:'.25rem'}} onClick={function(){setShowAlertConfig(false);}}>Enregistrer</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Popup alertes élèves ── */}
      {alertPopup&&(
        <div className="moverlay" onClick={function(e){if(e.target===e.currentTarget)setAlertPopup(null);}}>
          <div className="modal" style={{maxWidth:500}}>
            <div className="modal-hd" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',borderRadius:'var(--r) var(--r) 0 0',padding:'1rem 1.5rem'}}>
              <div>
                <h2 style={{color:'#fff'}}>⚠️ Alertes élèves</h2>
                <div style={{fontSize:'.75rem',color:'rgba(255,255,255,.75)',marginTop:'.1rem'}}>{alertPopup.length} élève{alertPopup.length>1?'s':''} · {cur?cur.name:''}</div>
              </div>
              <button className="close-btn" style={{background:'rgba(255,255,255,.2)',border:'1px solid rgba(255,255,255,.35)',color:'#fff'}} onClick={function(){setAlertPopup(null);}}>×</button>
            </div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.5rem',maxHeight:420,overflowY:'auto'}}>
              {alertPopup.map(function(a){
                var negObs=a.obs.filter(function(o){return o.k==='neg';});
                var msgs=negObs.map(function(o){
                  if(o.id==='bav')return'a été bavard(e) '+o.cnt+' fois';
                  if(o.id==='trav')return'manque de travail noté '+o.cnt+' fois';
                  if(o.id==='disp')return'a été dispersé(e) '+o.cnt+' fois';
                  return o.label+' ('+o.cnt+'x)';
                });
                return(
                  <div key={a.eleve.id} style={{padding:'.75rem 1rem',background:'var(--surface2)',border:'1.5px solid rgba(220,38,38,.2)',borderRadius:'var(--r-s)'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.45rem'}}>
                      <span style={{fontSize:'1.1rem'}}>👤</span>
                      <span style={{fontWeight:800,fontSize:'.92rem'}}>{a.eleve.nom}</span>
                      <div style={{display:'flex',gap:'.2rem',marginLeft:'auto'}}>
                        {a.obs.map(function(o){return <span key={o.id} title={o.label+' ('+o.cnt+'x)'} style={{fontSize:'.9rem'}}>{o.emoji}</span>;})}
                      </div>
                    </div>
                    <div style={{fontSize:'.8rem',color:'var(--text2)',lineHeight:1.7,padding:'.45rem .65rem',background:'rgba(220,38,38,.05)',borderRadius:'var(--r-xs)',borderLeft:'3px solid var(--danger)'}}>
                      ⚠️ <strong>Attention</strong>, {(function(){var parts=a.eleve.nom.trim().split(/\s+/);return parts[parts.length-1];})()} {msgs.join(', ')}. Cela mériterait peut-être une <strong>observation Pronote</strong> ?
                    </div>
                    <div style={{marginTop:'.45rem',fontSize:'.72rem',color:'var(--text3)'}}>
                      {a.obs.map(function(o){return o.emoji+' '+o.label+' : '+o.cnt+'x';}).join('  ·  ')}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{padding:'.75rem 1.25rem',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
              <button className="btn btn-primary" onClick={function(){setAlertPopup(null);}}>Fermer</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modale nouveau devoir ── */}
      {showNewDevoir&&(
        <div className="moverlay" onClick={function(e){if(e.target===e.currentTarget)setShowNewDevoir(false);}}>
          <div className="modal" style={{maxWidth:380}}>
            <div className="modal-hd">
              <div><h2>📋 Nouveau devoir</h2><div className="modal-hd-sub">{cur?cur.name:''}</div></div>
              <button className="close-btn" onClick={function(){setShowNewDevoir(false);}}>×</button>
            </div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
              <div className="field">
                <label>Titre *</label>
                <input autoFocus type="text" placeholder="Ex: Exercices p.42, Rédaction…" value={devoirForm.titre}
                  onChange={function(e){setDevoirForm(function(f){return Object.assign({},f,{titre:e.target.value});});}}
                  onKeyDown={function(e){if(e.key==='Enter')addDevoir();}}
                  style={{width:'100%',padding:'.42rem .65rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface2)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.85rem',boxSizing:'border-box'}}/>
              </div>
              <div className="field">
                <label>Date de rendu</label>
                <input type="date" value={devoirForm.dateRendu}
                  onChange={function(e){setDevoirForm(function(f){return Object.assign({},f,{dateRendu:e.target.value});});}}
                  style={{padding:'.38rem .65rem',border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface2)',color:'var(--text)',fontFamily:'Roboto,sans-serif',fontSize:'.8rem'}}/>
              </div>
              <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
                <button className="btn" onClick={function(){setShowNewDevoir(false);}}>Annuler</button>
                <button className="btn btn-primary" onClick={addDevoir} disabled={!devoirForm.titre.trim()}>Créer</button>
              </div>
            </div>
          </div>
        </div>
      )}

    </div>
    </div>
  );
}

/* ══ MODULE 5 — DASHBOARD ════════════════════════════════════════════════ */
function Dashboard({profile,onNav}){
  const[blocks]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-edt')||'[]')}catch{return[]}});
  const[taches,setTaches]=useState(()=>{try{return JSON.parse(localStorage.getItem('dash-taches')||'[]')}catch{return[]}});
  const[travailRapide,setTravailRapide]=useState(()=>{try{return JSON.parse(localStorage.getItem('dash-travail-rapide')||'[]')}catch{return[]}});
  const[notes,setNotes]=useState(()=>{try{return JSON.parse(localStorage.getItem('dash-notes')||'[]')}catch{return[]}});
  const[newNote,setNewNote]=useState('');
  const[newTache,setNewTache]=useState('');
  const[ctxMenu,setCtxMenu]=useState(null);
  const[ctxTravail,setCtxTravail]=useState('');
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const[fiches,setFiches]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-fiches')||'{}')}catch{return{}}});
  const[dashAlertPopup,setDashAlertPopup]=useState(null);
  const[showVeillePopup,setShowVeillePopup]=useState(false);
  const[fichesPopupDash,setFichesPopupDash]=useState(null);
  const[fichesPopupDashSel,setFichesPopupDashSel]=useState(null);
  const getFichesForBlock=(block)=>{
    if(block.classId&&fiches[block.classId]) return{classId:block.classId,list:(fiches[block.classId]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date))};
    const bt=(block.title||'').toUpperCase();
    const m=classes.find(c=>bt.includes(c.name.toUpperCase())||c.name.toUpperCase().includes(bt.slice(0,6)));
    if(m&&fiches[m.id]) return{classId:m.id,list:(fiches[m.id]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date))};
    return{classId:null,list:[]};
  };

  const now=new Date();
  const dayIdx=now.getDay()===0?6:now.getDay()-1;
  const hour=now.getHours();

  // ── Salutation contextuelle ──
  const vacancesDash=(()=>{try{return JSON.parse(localStorage.getItem('cdc-vacances')||'[]');}catch{return[];}})();
  const todayIso=isoDate(now);
  const isEnVacances=vacancesDash.some(v=>todayIso>=v.debut&&todayIso<=v.fin);
  const prenom=profile?.prenom||'';
  let greeting='Bonjour';
  if(hour>=12&&hour<18)greeting='Bonne après-midi';
  else if(hour>=18)greeting='Bonsoir';
  let greetingMsg=greeting+(prenom?', '+prenom:'')+' !';
  if(isEnVacances){
    const phrases=['pense à profiter de tes vacances !','tu mérites de te reposer 😴','l\'école peut attendre… enfin presque 😄','profite, ClassPro sera encore là à la rentrée !'];
    greetingMsg=greeting+(prenom?', '+prenom:'')+' — '+phrases[Math.floor(Math.random()*phrases.length)];
  }

  // ── Prochaines vacances + compte à rebours ──
  const nextVac=(()=>{
    const sorted=vacancesDash.filter(v=>v.fin>=todayIso).sort((a,b)=>a.debut.localeCompare(b.debut));
    return sorted[0]||null;
  })();
  const daysToNextVac=nextVac?(()=>{
    const d=new Date(nextVac.debut+'T12:00');
    return Math.ceil((d-now)/(864e5));
  })():null;

  const refWeekADash=(()=>{const s=localStorage.getItem('cdc-edt-refA');return s?new Date(s):getMondayOf(new Date());})();
  const todayMonday=getMondayOf(now);
  const todayWeekType=getWeekType(todayMonday,refWeekADash);

  // Popup veille de vacances — déclencher une seule fois par jour
  const dismissVeillePopup=()=>{localStorage.setItem('dash-veille-seen',todayIso);setShowVeillePopup(false);};
  // Ouvrir automatiquement si veille de vacances et pas encore vu aujourd'hui
  React.useEffect(()=>{
    if(daysToNextVac===1&&localStorage.getItem('dash-veille-seen')!==todayIso){
      setShowVeillePopup(true);
    }
  },[]);
  const todayBlocks=blocks.filter(b=>{
    if(b.day!==dayIdx)return false;
    const w=b.weeks||'AB';
    return w==='AB'||w===todayWeekType;
  }).sort((a,b)=>a.startH*60+a.startM-(b.startH*60+b.startM));
  const tomorrowDayIdx=(dayIdx+1)%5;
  const tomorrowMonday=tomorrowDayIdx===0?new Date(todayMonday.getTime()+7*24*60*60*1000):todayMonday;
  const tomorrowWeekType=getWeekType(tomorrowMonday,refWeekADash);
  const nextDayBlocks=blocks.filter(b=>{
    if(b.day!==tomorrowDayIdx)return false;
    const w=b.weeks||'AB';
    return w==='AB'||w===tomorrowWeekType;
  }).sort((a,b)=>a.startH*60+a.startM-(b.startH*60+b.startM));

  // ── Alertes comportement (suivi de classe) ──
  const alertConfig=(()=>{try{return JSON.parse(localStorage.getItem('sc-alert-config')||'null')||{};}catch{return{};}})();
  const allSessions=(()=>{try{return JSON.parse(localStorage.getItem('sc-sessions')||'{}');}catch{return{};}})();
  const alertesComportementData=(()=>{
    const found=[];
    classes.forEach(cls=>{
      const sess=allSessions[cls.id]||[];
      cls.eleves.forEach(el=>{
        const counts={};
        OBS.forEach(o=>{counts[o.id]=0;});
        sess.forEach(s=>{OBS.forEach(o=>{if(s.obs&&s.obs[el.id+'_'+o.id])counts[o.id]++;});});
        const triggered=OBS.filter(o=>{const seuil=alertConfig[o.id];return seuil!=null&&counts[o.id]>=seuil;})
          .map(o=>({...o,cnt:counts[o.id]}));
        if(triggered.length>0)found.push({eleve:el,obs:triggered,className:cls.name});
      });
      // Alertes travaux non rendus
      const seuilDv=alertConfig['dv'];
      if(seuilDv!=null){
        const allDevoirs=(()=>{try{return JSON.parse(localStorage.getItem('cdc-devoirs')||'[]');}catch{return[];}})();
        const clsDevoirs=allDevoirs.filter(d=>d.classId===cls.id);
        const dvMap={};
        clsDevoirs.forEach(dv=>{(dv.eleves||[]).forEach(el=>{
          if(el.statut==='nonrendu'||el.statut==='retard'){
            if(!dvMap[el.eleveid])dvMap[el.eleveid]={eleveid:el.eleveid,nom:el.elevenom,cnt:0};
            dvMap[el.eleveid].cnt++;
          }
        });});
        Object.values(dvMap).filter(x=>x.cnt>=seuilDv).forEach(x=>{
          const elObj=cls.eleves.find(e=>e.id===x.eleveid)||{id:x.eleveid,nom:x.nom};
          if(!found.some(f=>f.eleve.id===elObj.id&&f.className===cls.name)){
            found.push({eleve:elObj,obs:[{id:'dv',label:x.cnt+' travail'+(x.cnt>1?'x':'')+' non rendu'+(x.cnt>1?'s':''),emoji:'📋',k:'neg',cnt:x.cnt}],className:cls.name});
          }
        });
      }
    });
    return found;
  })();

  // Compteur alertes = comportement + travaux (tout géré via SuiviClasse)
  const alertes=alertesComportementData.map(a=>a.eleve.nom);

  // Alertes rencontres parents actives
  const alertesRencontres=(()=>{try{return JSON.parse(localStorage.getItem('cdc-rencontres')||'[]').filter(r=>r.alerte&&!r.alerteVue);}catch{return[];}})();

  const saveTaches=t=>{setTaches(t);localStorage.setItem('dash-taches',JSON.stringify(t));};
  const saveTravailRapide=t=>{setTravailRapide(t);localStorage.setItem('dash-travail-rapide',JSON.stringify(t));};
  const saveNotes=n=>{setNotes(n);localStorage.setItem('dash-notes',JSON.stringify(n));};

  const addTache=()=>{if(!newTache.trim())return;saveTaches([{id:Date.now(),txt:newTache.trim(),done:false},...taches]);setNewTache('');};
  const toggleTache=id=>saveTaches(taches.map(t=>t.id===id?{...t,done:!t.done}:t));
  const delTache=id=>saveTaches(taches.filter(t=>t.id!==id));
  const addNote=()=>{if(!newNote.trim())return;saveNotes([{id:Date.now(),txt:newNote.trim()},...notes].slice(0,10));setNewNote('');};
  const delNote=id=>saveNotes(notes.filter(x=>x.id!==id));

  const openCtx=(e,block)=>{e.preventDefault();setCtxMenu({block,x:e.clientX,y:e.clientY});setCtxTravail('');};
  const addTravailRapide=()=>{
    if(!ctxTravail.trim())return;
    const tr={id:Date.now(),titre:ctxTravail.trim(),coursTitle:ctxMenu.block.title,date:isoDate(now)};

                      <div style={{fontWeight:700,fontSize:'.85rem'}}>{f.titre}</div>
                      <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
                        {(f.absents||[]).length>0&&<span style={{fontSize:'.68rem',color:'var(--danger)',fontWeight:600}}>🙋 {f.absents.length} absent{f.absents.length>1?'s':''}</span>}
                        <div style={{fontSize:'.72rem',color:'var(--text3)'}}>{f.date&&new Date(f.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
                        <span style={{fontSize:'.75rem',color:'var(--accent)'}}>→</span>
                      </div>
                    </div>
                    {f.objectif&&<div style={{fontSize:'.76rem',color:'var(--text2)',marginTop:'.28rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>🎯 {f.objectif.replace(/<[^>]+>/g,'')}</div>}
                  </div>
                ))}
              </>
            )}
          </div>
        </div>
      </div>
    )}
  </>);
}

/* ══ MODULE 6 — TRAVAUX NON RENDUS ═══════════════════════════════════════ */
const STATUTS=[
  {id:'rendu',    label:'Rendu',     cls:'st-rendu'},
  {id:'retard',   label:'En retard', cls:'st-retard'},
  {id:'nonrendu', label:'Non rendu', cls:'st-nonrendu'},
  {id:'dispense', label:'Dispensé',  cls:'st-dispense'},
];
function TravNonRendus(){
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const[devoirs,setDevoirs]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-devoirs')||'[]')}catch{return[]}});
  const[selCls,setSelCls]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[vueMode,setVueMode]=useState('classe');
  const[form,setForm]=useState({titre:'',dateRendu:'',classId:''});

  useEffect(()=>{localStorage.setItem('cdc-devoirs',JSON.stringify(devoirs))},[devoirs]);

  const clsDev=devoirs.filter(d=>d.classId===selCls);
  const selClass=classes.find(c=>c.id===selCls);

  const getAlertEleves=()=>{
    if(!selCls)return[];
    const counts={};
    devoirs.filter(d=>d.classId===selCls).forEach(d=>{
      d.eleves&&d.eleves.forEach(el=>{
        if(el.statut==='nonrendu'||el.statut==='retard'){counts[el.eleveid]=(counts[el.eleveid]||{nom:el.elevenom,cnt:0});counts[el.eleveid].cnt++;}
      });
    });
    return Object.values(counts).filter(x=>x.cnt>=3);
  };
  const alertes=getAlertEleves();

  const addDevoir=()=>{
    if(!form.titre.trim()||!form.classId)return;
    const cls=classes.find(c=>c.id===form.classId);
    if(!cls)return;
    const eleves=cls.eleves.map(e=>({eleveid:e.id,elevenom:e.nom,statut:'nonrendu',relances:0}));
    const dv={id:'dv'+Date.now(),titre:form.titre,dateRendu:form.dateRendu,classId:form.classId,className:cls.name};
    dv.eleves=eleves;
    setDevoirs(p=>[...p,dv]);
    setSelCls(form.classId);
    setShowAdd(false);setForm({titre:'',dateRendu:'',classId:''});
  };
  const setStatut=(dvId,eleveId,statut)=>{
    setDevoirs(p=>p.map(d=>{
      if(d.id!==dvId)return d;
      return{...d,eleves:d.eleves.map(e=>e.eleveid===eleveId?{...e,statut}:e)};
    }));
  };
  const addRelance=(dvId,eleveId)=>{
    setDevoirs(p=>p.map(d=>{
      if(d.id!==dvId)return d;
      return{...d,eleves:d.eleves.map(e=>e.eleveid===eleveId?{...e,relances:(e.relances||0)+1}:e)};
    }));
  };
  const delDevoir=id=>{if(confirm('Supprimer ce devoir ?'))setDevoirs(p=>p.filter(d=>d.id!==id));};

  // Vue par élève: regroup
  const vueEleve=selClass?selClass.eleves.map(el=>{
    const devs=clsDev.map(d=>{const ev=d.eleves&&d.eleves.find(e=>e.eleveid===el.id);return ev?{...ev,dvTitre:d.titre,dvDate:d.dateRendu,dvId:d.id}:null;}).filter(Boolean);
    return{...el,devoirs:devs};
  }):[];

  return(<>
    <div className="page-hd">
      <div><div className="phd-badge">📋 Travaux</div><div className="phd-title">Suivi des travaux non rendus</div>
        <div className="phd-sub">{selClass?selClass.name+' · '+clsDev.length+' devoir(s)':'Sélectionnez une classe'}</div>
      </div>
      <div className="phd-actions">
        <div className="seg">
          <button className={vueMode==='classe'?'on':''} onClick={()=>setVueMode('classe')}>Par devoir</button>
          <button className={vueMode==='eleve'?'on':''} onClick={()=>setVueMode('eleve')}>Par élève</button>
        </div>
        <button className="btn btn-white" onClick={()=>setShowAdd(true)}>+ Devoir</button>
      </div>
    </div>
    <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
      {/* Sidebar classes */}
      <div className="tnr-sidebar">
        <div style={{padding:'.55rem .875rem',fontSize:'.62rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',borderBottom:'1px solid var(--border)'}}>Classes</div>
        {classes.length===0&&<div style={{padding:'.875rem',fontSize:'.76rem',color:'var(--text3)',fontStyle:'italic'}}>Créez des classes dans Suivi de classe</div>}
        {classes.map(c=>{
          const cnt=devoirs.filter(d=>d.classId===c.id&&d.eleves&&d.eleves.some(e=>e.statut==='nonrendu'||e.statut==='retard')).length;
          return(
            <button key={c.id} className={`tnr-class-btn ${selCls===c.id?'on':''}`} onClick={()=>setSelCls(c.id)}>
              {c.name}
              {cnt>0&&<span style={{background:'var(--danger)',color:'#fff',borderRadius:99,fontSize:'.6rem',fontWeight:700,padding:'.08rem .42rem'}}>{cnt}</span>}
            </button>
          );
        })}
      </div>
      {/* Main area */}
      <div className="tnr-main">
        {alertes.length>0&&alertes.map(a=>(
          <div key={a.nom} className="tnr-alerte">⚠️ <strong>{a.nom}</strong> — {a.cnt} travaux non rendus ce mois</div>
        ))}
        {!selCls?<div style={{color:'var(--text3)',textAlign:'center',padding:'3rem',fontSize:'.85rem',fontStyle:'italic'}}>← Sélectionnez une classe</div>:
        vueMode==='classe'?(
          clsDev.length===0?<div style={{color:'var(--text3)',textAlign:'center',padding:'2rem',fontSize:'.82rem'}}>Aucun devoir pour cette classe.<br/><button className="btn btn-primary" style={{marginTop:'.65rem'}} onClick={()=>setShowAdd(true)}>+ Ajouter un devoir</button></div>:
          clsDev.map(dv=>(
            <div key={dv.id} className="tnr-devoir-card">
              <div className="tnr-dv-hd">
                <div>
                  <div className="tnr-dv-title">{dv.titre}</div>
                  <div className="tnr-dv-meta">{dv.className}{dv.dateRendu&&' · À rendre le '+new Date(dv.dateRendu + 'T12:00').toLocaleDateString('fr-FR')}</div>
                  <div style={{display:'flex',gap:'.5rem',marginTop:'.3rem',fontSize:'.68rem',color:'var(--text2)'}}>
                    {['rendu','retard','nonrendu','dispense'].map(st=>{const cnt=dv.eleves.filter(e=>e.statut===st).length;return cnt>0?<span key={st}>{cnt} {STATUTS.find(s=>s.id===st)?.label.toLowerCase()}</span>:null})}
                  </div>
                </div>
                <button onClick={()=>delDevoir(dv.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:'.85rem',padding:'.2rem .4rem',borderRadius:'var(--r-xs)'}} title="Supprimer">🗑️</button>
              </div>
              <div className="tnr-dv-body">
                {dv.eleves.map(el=>{
                  const st=STATUTS.find(s=>s.id===el.statut);
                  return(
                    <div key={el.eleveid} className="tnr-eleve-row">
                      <span style={{flex:1,fontWeight:500}}>{el.elevenom}</span>
                      <div style={{display:'flex',gap:'.22rem',flexWrap:'wrap'}}>
                        {STATUTS.map(s=>(
                          <span key={s.id} className={`tnr-statut ${s.cls} ${el.statut===s.id?'':'opacity'}`}
                            style={{opacity:el.statut===s.id?1:.4}}
                            onClick={()=>setStatut(dv.id,el.eleveid,s.id)}>{s.label}</span>
                        ))}
                      </div>
                      <span className="tnr-relance-badge" onClick={()=>addRelance(dv.id,el.eleveid)} title="Ajouter une relance">
                        🔔 {el.relances||0}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))
        ):(
          /* Vue par élève */
          vueEleve.length===0?<div style={{color:'var(--text3)',textAlign:'center',padding:'2rem',fontSize:'.82rem'}}>Aucun élève dans cette classe.</div>:
          vueEleve.map(el=>(
            <div key={el.id} className="tnr-devoir-card">
              <div className="tnr-dv-hd">
                <div className="tnr-dv-title">{el.nom}</div>
              </div>
              <div className="tnr-dv-body">
                {el.devoirs.length===0?<div style={{fontSize:'.75rem',color:'var(--text3)',fontStyle:'italic'}}>Aucun devoir assigné</div>:
                el.devoirs.map(d=>{
                  const st=STATUTS.find(s=>s.id===d.statut);
                  return(
                    <div key={d.dvId} className="tnr-eleve-row">
                      <span style={{flex:1,fontWeight:500}}>{d.dvTitre}</span>
                      {d.dvDate&&<span style={{fontSize:'.67rem',color:'var(--text3)'}}>{new Date(d.dvDate + 'T12:00').toLocaleDateString('fr-FR')}</span>}
                      <span className={`tnr-statut ${st?.cls}`}>{st?.label}</span>
                      <span className="tnr-relance-badge" onClick={()=>addRelance(d.dvId,el.id)}>🔔 {d.relances||0}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))
        )}
      </div>
    </div>
    {showAdd&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
        <div className="modal" style={{maxWidth:420}}>
          <div className="modal-hd"><div><h2>Nouveau devoir</h2></div><button className="close-btn" onClick={()=>setShowAdd(false)}>×</button></div>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            <div className="field"><label>Titre du devoir *</label><input type="text" placeholder="Ex: Exercice p.45, Rédaction…" value={form.titre} autoFocus onChange={e=>setForm(f=>({...f,titre:e.target.value}))}/></div>
            <div className="field"><label>Classe *</label>
              <select value={form.classId} onChange={e=>setForm(f=>({...f,classId:e.target.value}))}>
                <option value="">— Choisir une classe —</option>
                {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div className="field"><label>Date de rendu prévue</label><input type="date" value={form.dateRendu} onChange={e=>setForm(f=>({...f,dateRendu:e.target.value}))}/></div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setShowAdd(false)}>Annuler</button>
              <button className="btn btn-primary" onClick={addDevoir} disabled={!form.titre.trim()||!form.classId}>Créer</button>
            </div>
          </div>
        </div>
      </div>
    )}
  </>);
}

// Mini éditeur rich text pour les champs de fiche
function RichField({value, onChange, placeholder, minHeight=70}){
  const ref=useRef(null);
  const savedSel=useRef(null);
  const isEditing=useRef(false);

  useEffect(()=>{
    if(ref.current && !isEditing.current){
      ref.current.innerHTML = value||'';
    }
  },[value]);

  const saveSelection=()=>{
    const sel=window.getSelection();
    if(sel&&sel.rangeCount>0) savedSel.current=sel.getRangeAt(0).cloneRange();
  };
  const restoreSelection=()=>{
    if(!savedSel.current) return;
    const sel=window.getSelection();
    if(sel){sel.removeAllRanges();sel.addRange(savedSel.current);}
  };
  const exec=(cmd,val=null)=>{
    restoreSelection();
    document.execCommand(cmd,false,val);
    ref.current?.focus();
    onChange(ref.current?.innerHTML||'');
  };

  const FONTS_RF=[
    {v:'Roboto,sans-serif',     label:'Roboto'},
    {v:'Roboto Slab,serif',     label:'Slab'},
    {v:'Georgia,serif',         label:'Georgia'},
    {v:'Arial,sans-serif',      label:'Arial'},
    {v:'Courier New,monospace', label:'Mono'},
    {v:'Comic Sans MS,cursive', label:'Comic'},
  ];

  const Btn=({cmd,val=null,title,children})=>(
    <button type="button" title={title}
      onMouseDown={e=>{e.preventDefault();saveSelection();}}
      onClick={()=>exec(cmd,val)}
      style={{height:22,minWidth:22,padding:'0 4px',border:'1px solid var(--border)',borderRadius:3,
        background:'var(--surface)',color:'var(--text)',cursor:'pointer',fontSize:'.72rem',
        fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      {children}
    </button>
  );

  return(
    <div style={{border:'1.5px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface2)',overflow:'hidden',transition:'border-color .15s'}}
      onFocusCapture={e=>{e.currentTarget.style.borderColor='var(--accent)';}}
      onBlurCapture={e=>{
        // Ne pas déclencher le blur si le focus reste dans ce composant
        if(e.currentTarget.contains(e.relatedTarget)) return;
        e.currentTarget.style.borderColor='var(--border)';
        isEditing.current=false;
      }}>
      {/* Barre outils ligne 1 : formatage + alignement */}
      <div onMouseDown={e=>e.preventDefault()}
        style={{display:'flex',gap:3,padding:'4px 6px 2px',borderBottom:'1px solid var(--border)',background:'var(--surface)',flexWrap:'wrap',alignItems:'center'}}>
        <Btn cmd="bold"              title="Gras"><b>B</b></Btn>
        <Btn cmd="italic"            title="Italique"><i>I</i></Btn>
        <Btn cmd="underline"         title="Souligné"><u>U</u></Btn>
        <div style={{width:1,background:'var(--border)',margin:'0 2px',alignSelf:'stretch'}}/>
        <Btn cmd="justifyLeft"       title="Aligner à gauche">⬅</Btn>
        <Btn cmd="justifyCenter"     title="Centrer">≡</Btn>
        <Btn cmd="justifyRight"      title="Aligner à droite">➡</Btn>
        <div style={{width:1,background:'var(--border)',margin:'0 2px',alignSelf:'stretch'}}/>
        <Btn cmd="insertUnorderedList" title="Liste à puces">•≡</Btn>
        <Btn cmd="insertOrderedList"   title="Liste numérotée">①</Btn>
        <div style={{width:1,background:'var(--border)',margin:'0 2px',alignSelf:'stretch'}}/>
        <Btn cmd="removeFormat"      title="Effacer formatage">✕</Btn>
      </div>
      {/* Barre outils ligne 2 : police */}
      <div onMouseDown={e=>e.preventDefault()}
        style={{display:'flex',gap:3,padding:'3px 6px',borderBottom:'1px solid var(--border)',background:'var(--surface)',alignItems:'center'}}>
        <span style={{fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',flexShrink:0,marginRight:2}}>Police :</span>
        {FONTS_RF.map(f=>(
          <button key={f.v} type="button"
            onMouseDown={e=>{e.preventDefault();saveSelection();}}
            onClick={()=>exec('fontName',f.v)}
            style={{height:20,padding:'0 5px',borderRadius:3,border:'1px solid var(--border)',
              background:'var(--surface2)',color:'var(--text)',cursor:'pointer',
              fontSize:'.62rem',fontWeight:600,fontFamily:f.v,flexShrink:0}}>
            {f.label}
          </button>
        ))}
      </div>
      {/* Zone de saisie */}
      <div ref={ref} contentEditable suppressContentEditableWarning
        onFocus={()=>{isEditing.current=true;}}
        onBlur={()=>{isEditing.current=false;onChange(ref.current?.innerHTML||'');}}
        onInput={()=>onChange(ref.current?.innerHTML||'')}
        onKeyUp={saveSelection} onMouseUp={saveSelection}
        data-ph={placeholder}
        style={{minHeight,padding:'.55rem .75rem',outline:'none',fontFamily:'Roboto,sans-serif',
          fontSize:'.8rem',lineHeight:1.55,color:'var(--text)',
          whiteSpace:'pre-wrap',wordBreak:'break-word'}}/>
    </div>
  );
}

function CahierSeance(){
  const[classes]=useState(()=>{try{return JSON.parse(localStorage.getItem('sc-classes')||'[]')}catch{return[]}});
  const[fiches,setFiches]=useState(()=>{try{return JSON.parse(localStorage.getItem('cdc-fiches')||'{}')}catch{return{}}});
  const[selCls,setSelCls]=useState(null);
  const[selFiche,setSelFiche]=useState(null);
  const[showNew,setShowNew]=useState(false);
  const[newForm,setNewForm]=useState({date:isoDate(new Date()),titre:''});
  const[showPurge,setShowPurge]=useState(false);
  const[purgeTarget,setPurgeTarget]=useState('current');
  const[draft,setDraft]=useState(null); // brouillon local de la fiche en cours d'édition
  const[savedOk,setSavedOk]=useState(false); // flash confirmation sauvegarde
  const[sidebarPopup,setSidebarPopup]=useState(null); // fiche cliquée dans sidebar pour popup récap
  const[popupEditMode,setPopupEditMode]=useState(false);

  useEffect(()=>{localStorage.setItem('cdc-fiches',JSON.stringify(fiches))},[fiches]);

  const clsFiches=(fiches[selCls]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const fiche=selFiche?clsFiches.find(f=>f.id===selFiche):null;
  const cls=classes.find(c=>c.id===selCls);

  // Init draft quand on change de fiche
  React.useEffect(()=>{
    const arr=fiches[selCls]||[];
    const found=selFiche?arr.find(f=>f.id===selFiche):null;
    if(found) setDraft({...found});
    else setDraft(null);
    setSavedOk(false);
  },[selFiche,selCls]); // eslint-disable-line

  const createFiche=()=>{
    if(!selCls||!newForm.titre.trim())return;
    const f={id:'f'+Date.now(),date:newForm.date,titre:newForm.titre,objectif:'',activite:'',devoirs:'',documents:'',aRevoir:'',incidents:'',absents:[],aRelancer:[]};
    setFiches(p=>{const arr=[...(p[selCls]||[]),f];return{...p,[selCls]:arr}});
    setSelFiche(f.id);setDraft({...f});setShowNew(false);setNewForm({date:isoDate(new Date()),titre:''});
  };

  // Met à jour le brouillon local seulement
  const updateDraft=(key,val)=>{
    setDraft(d=>d?{...d,[key]:val}:d);
  };

  // Sauvegarde le brouillon dans fiches
  const saveFiche=()=>{
    if(!draft||!selCls||!selFiche)return;
    setFiches(p=>{
      const arr=(p[selCls]||[]).map(f=>f.id===selFiche?{...draft}:f);
      return{...p,[selCls]:arr};
    });
    setSavedOk(true);
    setTimeout(()=>setSavedOk(false),2000);
  };

  // Sauvegarde popup récap (depuis sidebar)
  const savePopupFiche=()=>{
    if(!sidebarPopup||!selCls)return;
    setFiches(p=>{
      const arr=(p[selCls]||[]).map(f=>f.id===sidebarPopup.id?{...sidebarPopup}:f);
      return{...p,[selCls]:arr};
    });
    setSidebarPopup(null);
  };

  const updateFiche=(key,val)=>{ // gardé pour toggleAbsent/toggleRelancer qui sauvegardent direct
    setFiches(p=>{
      const arr=(p[selCls]||[]).map(f=>f.id===selFiche?{...f,[key]:val}:f);
      return{...p,[selCls]:arr};
    });
    setDraft(d=>d?{...d,[key]:val}:d);
  };
  const toggleAbsent=(eleveId)=>{
    if(!fiche)return;
    const already=(fiche.absents||[]).includes(eleveId);
    updateFiche('absents',already?(fiche.absents||[]).filter(x=>x!==eleveId):[...(fiche.absents||[]),eleveId]);
  };
  const toggleRelancer=(eleveId)=>{
    if(!fiche)return;
    const already=(fiche.aRelancer||[]).includes(eleveId);
    updateFiche('aRelancer',already?(fiche.aRelancer||[]).filter(x=>x!==eleveId):[...(fiche.aRelancer||[]),eleveId]);
  };
  const delFiche=id=>{
    if(!confirm('Supprimer cette fiche ?'))return;
    setFiches(p=>{const arr=(p[selCls]||[]).filter(f=>f.id!==id);return{...p,[selCls]:arr}});
    if(selFiche===id){setSelFiche(null);setDraft(null);}
  };

  return(<>
    <div className="page-hd">
      <div><div className="phd-badge">📓 Carnet de bord</div><div className="phd-title">Fiches de cours</div>
        <div className="phd-sub">{cls?cls.name+' · '+clsFiches.length+' fiche(s)':'Sélectionnez une classe'}</div>
      </div>
      <div className="phd-actions">
        {selCls&&<button className="btn btn-white" onClick={()=>setShowNew(true)}>+ Nouvelle fiche</button>}
        <button className="btn btn-danger" style={{opacity:.85,fontSize:'.75rem'}} onClick={()=>{setPurgeTarget(selCls?'current':'all');setShowPurge(true);}}>
          🗑️ Purger le carnet
        </button>
      </div>
    </div>

    {/* ── Modale purge carnet ── */}
    {showPurge&&(
      <div className="moverlay" onClick={e=>e.target===e.currentTarget&&setShowPurge(false)}>
        <div className="modal" style={{maxWidth:400}}>
          <div className="modal-hd">
            <div><h2>🗑️ Purger le carnet de bord</h2></div>
            <button className="close-btn" onClick={()=>setShowPurge(false)}>×</button>
          </div>
          <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <div style={{fontSize:'.82rem',color:'var(--text2)',lineHeight:1.6}}>
              Choisissez ce que vous souhaitez supprimer. Cette action est <strong>irréversible</strong>.
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'.4rem'}}>
              {selCls&&cls&&(
                <label style={{display:'flex',alignItems:'center',gap:'.65rem',padding:'.65rem .875rem',background:purgeTarget==='current'?'rgba(220,38,38,.07)':'var(--surface2)',border:`1px solid ${purgeTarget==='current'?'rgba(220,38,38,.3)':'var(--border)'}`,borderRadius:'var(--r-s)',cursor:'pointer'}}>
                  <input type="radio" name="purgeTarget" value="current" checked={purgeTarget==='current'} onChange={()=>setPurgeTarget('current')} style={{accentColor:'var(--danger)'}}/>
                  <div>
                    <div style={{fontWeight:700,fontSize:'.82rem'}}>Fiches de {cls.name} uniquement</div>

          </div>

    <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>

        {classes.map(c=>(
          <button key={c.id} className={`cs-seance-item ${selCls===c.id?'on':''}`} style={{border:'none',width:'100%',textAlign:'left',background:'none',cursor:'pointer',borderLeft:'3px solid transparent'}}
            onClick={()=>{setSelCls(c.id);setSelFiche(null);}}>

        {selCls&&<>
          <div style={{padding:'.5rem .875rem',fontSize:'.6rem',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',borderBottom:'1px solid var(--border)',borderTop:'2px solid var(--border)',marginTop:'.5rem'}}>Séances</div>

                <div className="cs-sec-label">📄 Manque de photocopie

    </div>
    {sidebarPopup&&(
      <div className="moverlay" onClick={e=>{

        setSidebarPopup(null);
      }}>
        <div className="modal" style={{maxWidth:560,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>

            <div>
              <h2>📓 {sidebarPopup.titre}</h2>
              <div className="modal-hd-sub">{sidebarPopup.date&&new Date(sidebarPopup.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>

            <div style={{display:'flex',gap:'.4rem',alignItems:'center'}}>
              <button title={popupEditMode?'Mode lecture':'Modifier la fiche'} onClick={()=>setPopupEditMode(m=>!m)}

              </button>
              {/* En mode édition : bouton Annuler visible + ✕ verrouillé */}
              {popupEditMode&&(
                <button onClick={()=>{setPopupEditMode(false);}}

                  Annuler

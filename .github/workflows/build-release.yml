# ═══════════════════════════════════════════════════════════════════════════════
# ClassPro Desktop — Build & Release automatiques
#
# SE DÉCLENCHE : quand tu crées un tag git commençant par "v" (ex: v1.0.0)
# RÉSULTAT    : un .exe Windows + un .dmg macOS attachés à la Release GitHub
#
# UTILISATION :
#   git tag v1.0.0
#   git push origin v1.0.0
#   → GitHub crée la Release et attache les installeurs automatiquement
# ═══════════════════════════════════════════════════════════════════════════════

name: Build & Release

on:
  push:
    tags:
      - 'v*'          # déclenché sur v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # permet aussi de lancer manuellement depuis l'interface GitHub

jobs:

  # ── BUILD WINDOWS (.exe) ────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefact Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 5

  # ── BUILD macOS (.dmg) ──────────────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS (.dmg)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Build macOS (Intel + Apple Silicon)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Note : sans certificat Apple, le .dmg sera "non signé".
          # Les utilisateurs devront faire clic-droit → Ouvrir la première fois.
          # Pour signer : ajouter CSC_LINK et CSC_KEY_PASSWORD dans les secrets GitHub.

      - name: Upload artefact macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: dist/*.dmg
          retention-days: 5

  # ── CRÉATION DE LA RELEASE GITHUB ──────────────────────────────────────────
  release:
    name: 🚀 Créer la Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour créer la Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Récupérer les artefacts Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Récupérer les artefacts macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: artifacts/

      - name: Extraire la version du tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "ClassPro Desktop ${{ steps.version.outputs.version }}"
          body: |
            ## ClassPro Desktop ${{ steps.version.outputs.version }}

            ### 📥 Téléchargement

            | Système | Fichier | Instructions |
            |---------|---------|--------------|
            | 🪟 Windows | `ClassPro-Desktop-Setup-*.exe` | Double-clic → Suivant → Terminer |
            | 🍎 macOS (Intel) | `ClassPro-Desktop-*-x64.dmg` | Ouvre → Glisse dans Applications |
            | 🍎 macOS (Apple Silicon M1/M2/M3) | `ClassPro-Desktop-*-arm64.dmg` | Ouvre → Glisse dans Applications |

            > **macOS — première ouverture :** si un message "développeur non identifié" apparaît,
            > faire **clic-droit sur l'app → Ouvrir** (une seule fois).

            ### 🔄 Mise à jour depuis une version précédente
            - **Windows** : lancer le nouvel installeur, il remplace l'ancienne version automatiquement
            - **macOS** : glisser la nouvelle version dans Applications (remplace l'ancienne)

            ---
            *Vos données (fichiers JSON) ne sont jamais effacées lors d'une mise à jour.*
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
